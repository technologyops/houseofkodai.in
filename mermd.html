<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MDE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<style>
:root {
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefed;--border:#e0deda;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --accent:#5b4cdb;--accent2:#ede9ff;--danger:#c0392b;--dirty:#e67e22;
  --topbar-h:40px;--tab-h:44px;--toolbar-h:38px;--status-h:26px;--radius:8px;
  --drag-w:4px;
}
.dark{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--border:#3a3a37;
  --text:#e8e8e4;--text2:#9b9b97;--text3:#6b6b67;
  --accent:#8b7cf6;--accent2:#2a2445;--danger:#e74c3c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--text)}

/* ── TOP BAR ── */
#topbar{height:var(--topbar-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;background:var(--bg2);flex-shrink:0;z-index:10}
#topbar h1{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:-.01em}
.top-btn{background:none;border:1px solid transparent;color:var(--text2);cursor:pointer;padding:3px 9px;border-radius:5px;font-size:12px;font-weight:500;line-height:1.6;transition:all .12s;white-space:nowrap}
.top-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.top-btn.active{background:var(--accent2);color:var(--accent);border-color:var(--accent)}
#topbar-center{display:flex;align-items:center;gap:4px;margin:0 8px}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:4px}
.tb-sep-v{width:1px;height:18px;background:var(--border);margin:0 4px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}
#main{display:flex;flex:1;overflow:hidden;position:relative}

/* panes */
.pane{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
.pane.hidden{display:none!important}

/* drag handles */
.drag-handle{width:var(--drag-w);background:var(--border);cursor:col-resize;flex-shrink:0;position:relative;transition:background .15s;z-index:5}
.drag-handle:hover,.drag-handle.dragging{background:var(--accent)}
.drag-handle::after{content:'';position:absolute;top:0;left:-4px;right:-4px;bottom:0}
.drag-handle.hidden{display:none!important}

/* ── EXPLORER ── */
#exp-inner{display:flex;flex-direction:column;height:100%}
#exp-header{padding:8px 10px 6px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;background:var(--bg2)}
#exp-top{display:flex;align-items:center;justify-content:space-between}
#exp-top h2{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
#search-box{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;outline:none}
#search-box:focus{border-color:var(--accent)}
#file-list{flex:1;overflow-y:auto;padding:4px}
.file-item{display:flex;align-items:center;padding:6px 8px;border-radius:6px;cursor:pointer;gap:6px}
.file-item:hover{background:var(--bg3)}
.file-item.active{background:var(--accent2)}
.file-item.active .fi-name{color:var(--accent);font-weight:500}
.fi-icon{font-size:12px;flex-shrink:0;opacity:.5}
.fi-info{flex:1;min-width:0}
.fi-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.fi-dirty{width:6px;height:6px;border-radius:50%;background:var(--dirty);flex-shrink:0}
.fi-del{opacity:0;background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;font-size:15px;line-height:1}
.file-item:hover .fi-del{opacity:1}
.fi-del:hover{color:var(--danger)}
#empty-state{text-align:center;padding:40px 12px;color:var(--text3);font-size:12px;line-height:1.9}

/* ── EDITOR ── */
#toolbar{height:var(--toolbar-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 6px;gap:2px;background:var(--bg2);flex-shrink:0;overflow-x:auto}
.tb-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:3px 7px;border-radius:5px;font-size:13px;font-weight:500;line-height:1.5;white-space:nowrap;flex-shrink:0}
.tb-btn:hover{background:var(--bg3);color:var(--text)}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0}
#file-title{flex:1;min-width:60px;background:none;border:none;color:var(--text);font-size:13px;font-weight:500;outline:none;padding:3px 6px;border-radius:5px}
#file-title:hover,#file-title:focus{background:var(--bg3)}
#dirty-dot{width:7px;height:7px;border-radius:50%;background:var(--dirty);display:none;flex-shrink:0}
#editor-wrap{flex:1;display:flex;overflow:hidden}
#line-nums{padding:10px 0;background:var(--bg2);border-right:1px solid var(--border);color:var(--text3);font-family:'SF Mono','Fira Code',monospace;font-size:13px;line-height:1.7;text-align:right;min-width:42px;overflow:hidden;user-select:none;flex-shrink:0}
#line-nums span{display:block;padding:0 8px 0 4px}
#editor{flex:1;padding:10px 12px;font-family:'SF Mono','Fira Code',monospace;font-size:13px;line-height:1.7;border:none;outline:none;resize:none;background:var(--bg);color:var(--text);overflow-y:auto}
#status-bar{height:var(--status-h);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:14px;background:var(--bg2);font-size:11px;color:var(--text3);flex-shrink:0}
#no-file{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text3);gap:10px;font-size:13px}
#no-file button{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500}

/* ── PREVIEW ── */
#preview-header{height:var(--toolbar-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;background:var(--bg2);flex-shrink:0;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
#preview{flex:1;overflow-y:auto;padding:18px 22px;line-height:1.75}
#preview h1,#preview h2,#preview h3,#preview h4{margin:1.1em 0 .35em;font-weight:600;line-height:1.3}
#preview h1{font-size:1.65em}#preview h2{font-size:1.3em}#preview h3{font-size:1.08em}
#preview p{margin:.55em 0}
#preview a{color:var(--accent)}
#preview code{font-family:'SF Mono','Fira Code',monospace;font-size:.87em;background:var(--bg3);padding:.12em .38em;border-radius:3px}
#preview pre{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;overflow-x:auto;margin:.7em 0}
#preview pre code{background:none;padding:0;font-size:.84em}
#preview blockquote{border-left:3px solid var(--accent);padding:.1em 0 .1em 12px;color:var(--text2);margin:.7em 0}
#preview ul,#preview ol{padding-left:1.5em;margin:.5em 0}
#preview li{margin:.18em 0}
#preview table{border-collapse:collapse;width:100%;margin:.7em 0;font-size:.95em}
#preview th,#preview td{border:1px solid var(--border);padding:5px 9px;text-align:left}
#preview th{background:var(--bg2);font-weight:600}
#preview img{max-width:100%}
#preview hr{border:none;border-top:1px solid var(--border);margin:1em 0}
#preview input[type=checkbox]{margin-right:5px}
.mermaid svg{max-width:100%}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:22px;width:310px;max-width:90vw}
#modal h3{font-size:15px;font-weight:600;margin-bottom:7px}
#modal p{color:var(--text2);font-size:13px;line-height:1.5;margin-bottom:18px}
#modal-btns{display:flex;gap:8px;justify-content:flex-end}
.m-btn{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.m-btn.primary{background:var(--accent);color:#fff}
.m-btn.danger{background:var(--danger);color:#fff}
.m-btn.ghost{background:var(--bg3);color:var(--text)}

/* ── MOBILE TABS ── */
#mobile-tabs{display:none;height:var(--tab-h);border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.m-tab{flex:1;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent}
.m-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:767px){
  #explorer-pane,#editor-pane,#preview-pane{position:absolute;top:0;left:0;width:100%!important;height:100%;border:none;transition:transform .22s ease}
  .drag-handle{display:none!important}
  #main{position:relative;overflow:hidden}
  #preview-pane{width:100%!important}
  #mobile-tabs{display:flex}
  .pane-0 #explorer-pane{transform:translateX(0)}
  .pane-0 #editor-pane{transform:translateX(100%)}
  .pane-0 #preview-pane{transform:translateX(200%)}
  .pane-1 #explorer-pane{transform:translateX(-100%)}
  .pane-1 #editor-pane{transform:translateX(0)}
  .pane-1 #preview-pane{transform:translateX(100%)}
  .pane-2 #explorer-pane{transform:translateX(-200%)}
  .pane-2 #editor-pane{transform:translateX(-100%)}
  .pane-2 #preview-pane{transform:translateX(0)}
  .pane.hidden{display:flex!important}
}
@media(min-width:768px){
  #mobile-tabs{display:none!important}
  #explorer-pane,#editor-pane,#preview-pane{position:static;transform:none!important}
}
</style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <h1>MDE</h1>
    <div class="tb-sep-v"></div>
    <!-- Pane toggles -->
    <div id="topbar-center">
      <button class="top-btn active" id="tog-exp" onclick="panes.toggle('exp')" title="Toggle explorer">⊞ Files</button>
      <button class="top-btn active" id="tog-ed"  onclick="panes.toggle('ed')"  title="Toggle editor">✎ Editor</button>
      <button class="top-btn active" id="tog-pv"  onclick="panes.toggle('pv')"  title="Toggle preview">◻ Preview</button>
    </div>
    <div class="tb-sep-v"></div>
    <div id="topbar-right">
      <button class="top-btn" onclick="ops.importFile()" title="Import .md">↑ Import</button>
      <button class="top-btn" onclick="ops.exportFile()" title="Export .md">↓ Export</button>
      <button class="top-btn" onclick="ops.print()" title="Print to PDF">⎙ Print</button>
      <div class="tb-sep-v"></div>
      <button class="top-btn" id="theme-btn" onclick="theme.toggle()" title="Toggle theme (Ctrl+D)">◐</button>
    </div>
  </div>

  <!-- MOBILE TABS -->
  <div id="mobile-tabs">
    <button class="m-tab active" onclick="mobile.go(0)">Files</button>
    <button class="m-tab" onclick="mobile.go(1)">Editor</button>
    <button class="m-tab" onclick="mobile.go(2)">Preview</button>
  </div>

  <!-- MAIN -->
  <div id="main" class="pane-0">
    <!-- Explorer pane -->
    <div class="pane" id="explorer-pane">
      <div id="exp-inner">
        <div id="exp-header">
          <div id="exp-top">
            <h2>Files</h2>
            <button class="tb-btn" onclick="fileOps.newFile()" title="New (Ctrl+N)" style="font-size:17px;padding:1px 5px">+</button>
          </div>
          <input id="search-box" type="search" placeholder="Search files…" oninput="explorer.onSearch(this.value)" autocomplete="off">
        </div>
        <div id="file-list"></div>
      </div>
    </div>

    <!-- Drag handle 1 (exp | ed) -->
    <div class="drag-handle" id="dh1" data-left="exp" data-right="ed"></div>

    <!-- Editor pane -->
    <div class="pane" id="editor-pane">
      <div id="toolbar">
        <input id="file-title" type="text" placeholder="untitled.md" onblur="fileOps.renameActive(this.value)" onkeydown="if(event.key==='Enter')this.blur()">
        <div id="dirty-dot" title="Unsaved"></div>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt.wrap('**','**')" title="Bold"><b>B</b></button>
        <button class="tb-btn" onclick="fmt.wrap('*','*')" title="Italic"><i>I</i></button>
        <button class="tb-btn" onclick="fmt.wrap('`','`')" title="Code" style="font-family:monospace">`</button>
        <button class="tb-btn" onclick="fmt.link()" title="Link">⎋</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt.insertBlock('```mermaid\nflowchart TD\n  A --> B\n```')" title="Mermaid">⬡</button>
        <button class="tb-btn" onclick="fmt.heading()" title="Heading">H</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fileOps.save()" title="Save (Ctrl+S)" style="color:var(--accent);font-weight:600">Save</button>
      </div>
      <div id="no-file">
        <div style="font-size:28px">📄</div>
        <div>No file open</div>
        <button onclick="fileOps.newFile()">New file</button>
      </div>
      <div id="editor-wrap" style="display:none;flex:1;overflow:hidden">
        <div id="line-nums"></div>
        <textarea id="editor" spellcheck="true" oninput="editorEv.onInput()" onscroll="editorEv.syncScroll()" onkeydown="editorEv.onKeyDown(event)" placeholder="Start writing…"></textarea>
      </div>
      <div id="status-bar">
        <span id="st-pos">Ln 1, Col 1</span>
        <span id="st-words">0 words</span>
        <span id="st-chars">0 chars</span>
        <span style="margin-left:auto">UTF-8</span>
      </div>
    </div>

    <!-- Drag handle 2 (ed | pv) -->
    <div class="drag-handle" id="dh2" data-left="ed" data-right="pv"></div>

    <!-- Preview pane -->
    <div class="pane" id="preview-pane">
      <div id="preview-header">Preview</div>
      <div id="preview"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title"></h3>
    <p id="modal-msg"></p>
    <div id="modal-btns"></div>
  </div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────
const store = {
  IDX:'md_files_index', FK:id=>'md_file:'+id, AK:'md_active_file', TK:'md_theme',
  LAYOUT:'md_pane_layout',
  getIndex(){try{return JSON.parse(localStorage.getItem(this.IDX)||'[]')}catch{return[]}},
  setIndex(a){localStorage.setItem(this.IDX,JSON.stringify(a))},
  getFile(id){try{return JSON.parse(localStorage.getItem(this.FK(id)))}catch{return null}},
  saveFile(f){localStorage.setItem(this.FK(f.id),JSON.stringify(f))},
  deleteFile(id){localStorage.removeItem(this.FK(id));this.setIndex(this.getIndex().filter(i=>i!==id))},
  loadAll(){return this.getIndex().map(id=>this.getFile(id)).filter(Boolean)},
  getActive(){return localStorage.getItem(this.AK)},
  setActive(id){id?localStorage.setItem(this.AK,id):localStorage.removeItem(this.AK)},
  getTheme(){return localStorage.getItem(this.TK)||'light'},
  setTheme(t){localStorage.setItem(this.TK,t)},
  getLayout(){try{return JSON.parse(localStorage.getItem(this.LAYOUT))}catch{return null}},
  setLayout(l){localStorage.setItem(this.LAYOUT,JSON.stringify(l))}
};

// ── STATE ─────────────────────────────────────────────────
const state = {
  files:[], activeId:null, dirtyContent:'', isDirty:false,
  searchQuery:'', mobilePane:0,
  panes:{exp:true, ed:true, pv:true},
  sizes:{exp:220, ed:null, pv:null} // px for exp, null = flex for ed+pv
};
const getActive = () => state.files.find(f=>f.id===state.activeId)||null;

// ── PANE MANAGEMENT ───────────────────────────────────────
const panes = {
  MIN_PX: 160,

  toggle(key) {
    // At least 2 panes must be visible
    const vis = Object.values(state.panes).filter(Boolean).length;
    if (state.panes[key] && vis <= 2) {
      // If trying to hide when only 2 visible, swap which one is hidden
    }
    state.panes[key] = !state.panes[key];
    // Ensure at least 2 visible
    const nowVis = Object.values(state.panes).filter(Boolean).length;
    if (nowVis < 2) state.panes[key] = true; // revert
    this.apply();
    this.saveLayout();
  },

  apply() {
    const {exp, ed, pv} = state.panes;
    const epEl = document.getElementById('explorer-pane');
    const edEl = document.getElementById('editor-pane');
    const pvEl = document.getElementById('preview-pane');
    const dh1  = document.getElementById('dh1');
    const dh2  = document.getElementById('dh2');

    epEl.classList.toggle('hidden', !exp);
    edEl.classList.toggle('hidden', !ed);
    pvEl.classList.toggle('hidden', !pv);
    dh1.classList.toggle('hidden', !exp || !ed);
    dh2.classList.toggle('hidden', !ed || !pv || (!ed && !exp));

    // If explorer hidden, dh2 might need to show between exp-area and pv
    // Recompute dh2: show if there's a left pane and pv is visible
    const leftVisible = exp || ed;
    dh2.classList.toggle('hidden', !leftVisible || !pv || !(exp&&!ed) && !(ed));

    // Update toggle buttons
    document.getElementById('tog-exp').classList.toggle('active', exp);
    document.getElementById('tog-ed').classList.toggle('active', ed);
    document.getElementById('tog-pv').classList.toggle('active', pv);

    // Apply flex sizes
    this.applySizes();
  },

  applySizes() {
    const {exp, ed, pv} = state.panes;
    const epEl = document.getElementById('explorer-pane');
    const edEl = document.getElementById('editor-pane');
    const pvEl = document.getElementById('preview-pane');

    // Explorer: fixed width
    if (exp) {
      epEl.style.width = state.sizes.exp + 'px';
      epEl.style.flex = 'none';
    }
    // Editor + Preview share remaining space
    const edFlex = state.sizes.ed || 1;
    const pvFlex = state.sizes.pv || 1;
    if (ed) { edEl.style.flex = edFlex; edEl.style.width = ''; }
    if (pv) { pvEl.style.flex = pvFlex; pvEl.style.width = ''; }
  },

  saveLayout() {
    store.setLayout({ panes: state.panes, sizes: state.sizes });
  },

  loadLayout() {
    const l = store.getLayout();
    if (!l) return;
    if (l.panes) Object.assign(state.panes, l.panes);
    if (l.sizes) Object.assign(state.sizes, l.sizes);
  }
};

// ── DRAG-TO-RESIZE ────────────────────────────────────────
const drag = {
  init() {
    ['dh1','dh2'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('mousedown', e => this.start(e, el));
      el.addEventListener('touchstart', e => this.start(e.touches[0], el), {passive:true});
    });
  },

  start(e, handle) {
    const main = document.getElementById('main');
    const leftId  = handle.dataset.left;  // 'exp' or 'ed'
    const rightId = handle.dataset.right; // 'ed' or 'pv'
    const leftEl  = leftId==='exp' ? document.getElementById('explorer-pane')
                                   : document.getElementById('editor-pane');
    const rightEl = rightId==='ed' ? document.getElementById('editor-pane')
                                   : document.getElementById('preview-pane');

    if (leftEl.classList.contains('hidden') || rightEl.classList.contains('hidden')) return;

    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const startX  = e.clientX;
    const mainRect = main.getBoundingClientRect();
    const leftW0  = leftEl.getBoundingClientRect().width;
    const rightW0 = rightEl.getBoundingClientRect().width;
    const totalW  = leftW0 + rightW0;
    const MIN = panes.MIN_PX;

    const onMove = ev => {
      const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
      const dx = cx - startX;
      let newLeft  = Math.max(MIN, Math.min(totalW - MIN, leftW0 + dx));
      let newRight = totalW - newLeft;

      if (leftId === 'exp') {
        state.sizes.exp = newLeft;
        leftEl.style.width = newLeft + 'px';
        leftEl.style.flex = 'none';
      } else {
        // ed resizing against pv — use flex ratios
        state.sizes.ed = newLeft;
        state.sizes.pv = newRight;
        leftEl.style.flex = newLeft;
        rightEl.style.flex = newRight;
        leftEl.style.width = '';
        rightEl.style.width = '';
      }
      if (rightId === 'pv' && leftId === 'ed') { /* handled above */ }
      else if (rightId === 'ed') {
        // explorer vs editor
        state.sizes.ed = null; // let editor flex
      }
    };

    const onUp = () => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      panes.saveLayout();
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, {passive:true});
    window.addEventListener('touchend', onUp);
  }
};

// ── THEME ─────────────────────────────────────────────────
const theme = {
  init(){const t=store.getTheme();if(t==='dark')this.apply('dark')},
  apply(t){
    document.body.classList.toggle('dark',t==='dark');
    document.getElementById('hljs-theme').href = t==='dark'
      ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
      : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    mermaid.initialize({startOnLoad:false, theme:t==='dark'?'dark':'default'});
    store.setTheme(t);
    preview.render();
  },
  toggle(){this.apply(document.body.classList.contains('dark')?'light':'dark')}
};

// ── MODAL ─────────────────────────────────────────────────
const modal = {
  show(title, msg, buttons) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').textContent = msg;
    const b = document.getElementById('modal-btns');
    b.innerHTML = '';
    buttons.forEach(btn => {
      const el = document.createElement('button');
      el.className = 'm-btn ' + (btn.cls||'ghost');
      el.textContent = btn.label;
      el.onclick = () => { this.hide(); btn.action(); };
      b.appendChild(el);
    });
    document.getElementById('modal-overlay').classList.add('show');
  },
  hide(){document.getElementById('modal-overlay').classList.remove('show')}
};
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target===e.currentTarget) modal.hide();
});

// ── FILE OPERATIONS ───────────────────────────────────────
const fileOps = {
  newFile() {
    this._checkDirty(() => {
      const id = 'f_' + Date.now();
      const f = {id, name:'untitled.md', content:'', createdAt:Date.now(), updatedAt:Date.now()};
      store.saveFile(f);
      const idx = store.getIndex(); idx.unshift(id); store.setIndex(idx);
      state.files.unshift(f);
      this.open(id);
      setTimeout(() => { const t=document.getElementById('file-title'); t.focus(); t.select(); }, 60);
    });
  },

  open(id) {
    const f = state.files.find(f=>f.id===id);
    if (!f) return;
    Object.assign(state, {activeId:id, dirtyContent:f.content, isDirty:false});
    store.setActive(id);
    const ed = document.getElementById('editor');
    ed.value = f.content;
    editorUI.updateLineNums();
    editorUI.updateStatus();
    document.getElementById('file-title').value = f.name;
    preview.render();
    render();
    if (window.innerWidth < 768) mobile.go(1);
  },

  save() {
    if (!state.activeId) return;
    const f = getActive(); if (!f) return;
    f.content = state.dirtyContent; f.updatedAt = Date.now();
    store.saveFile(f);
    Object.assign(state, {isDirty:false});
    editorUI.renderDirty();
    explorer.render();
  },

  renameActive(val) {
    if (!state.activeId) return;
    let name = val.trim() || 'untitled.md';
    if (!name.endsWith('.md')) name += '.md';
    const f = getActive(); if (!f) return;
    f.name = name; f.updatedAt = Date.now();
    store.saveFile(f);
    document.getElementById('file-title').value = name;
    explorer.render();
  },

  deleteFile(id, e) {
    e && e.stopPropagation();
    const f = state.files.find(f=>f.id===id); if (!f) return;
    modal.show('Delete file', `Delete "${f.name}"? Cannot be undone.`, [
      {label:'Cancel', cls:'ghost', action:()=>{}},
      {label:'Delete', cls:'danger', action:() => {
        store.deleteFile(id);
        state.files = state.files.filter(f=>f.id!==id);
        if (state.activeId===id) {
          const next = state.files[0];
          if (next) this.open(next.id);
          else { Object.assign(state,{activeId:null,dirtyContent:'',isDirty:false}); store.setActive(null); render(); }
        } else render();
      }}
    ]);
  },

  _checkDirty(cb) {
    if (!state.isDirty) { cb(); return; }
    const f = getActive();
    modal.show('Unsaved changes', `"${f?.name}" has unsaved changes.`, [
      {label:'Discard', cls:'ghost', action:cb},
      {label:'Save & continue', cls:'primary', action:()=>{ this.save(); cb(); }}
    ]);
  }
};

// ── EXPLORER ──────────────────────────────────────────────
const explorer = {
  onSearch(q) { state.searchQuery = q; this.render(); },

  score(f, q) {
    if (!q) return {match:true, sub:'', score:0};
    const lq = q.toLowerCase(); let score=0, sub='';
    if (f.name.toLowerCase().includes(lq)) score += 3;
    for (const ln of f.content.split('\n')) {
      if (ln.startsWith('#') && ln.toLowerCase().includes(lq)) { score+=2; sub=ln.replace(/^#+\s*/,''); break; }
    }
    if (!sub) {
      const ci = f.content.toLowerCase().indexOf(lq);
      if (ci>=0) { score+=1; const s=Math.max(0,ci-18); sub=(s>0?'…':'')+f.content.slice(s,ci+36).replace(/\n/g,' ')+'…'; }
    }
    return {match:score>0, sub, score};
  },

  render() {
    const q = state.searchQuery.trim();
    const files = state.files.map(f=>({f,...this.score(f,q)}))
      .filter(r=>r.match||!q)
      .sort((a,b)=>b.score-a.score||b.f.updatedAt-a.f.updatedAt);
    const list = document.getElementById('file-list');
    if (!files.length) {
      list.innerHTML = `<div id="empty-state">${q?`No results for "${q}"`:'No files.<br>Click + to create one.'}</div>`;
      return;
    }
    list.innerHTML = '';
    files.forEach(({f,sub}) => {
      const isAct = f.id===state.activeId;
      const isDrt = isAct && state.isDirty;
      const date  = new Date(f.updatedAt).toLocaleDateString(undefined,{month:'short',day:'numeric'});
      const div   = document.createElement('div');
      div.className = 'file-item'+(isAct?' active':'');
      div.onclick = () => { if (f.id===state.activeId) return; fileOps._checkDirty(()=>fileOps.open(f.id)); };
      div.innerHTML = `<span class="fi-icon">📄</span>
        <div class="fi-info">
          <div class="fi-name">${this._hl(f.name,q)}</div>
          <div class="fi-sub">${sub?this._hl(sub,q):date}</div>
        </div>
        ${isDrt?'<div class="fi-dirty"></div>':''}
        <button class="fi-del" onclick="fileOps.deleteFile('${f.id}',event)">×</button>`;
      list.appendChild(div);
    });
  },

  _hl(s,q){
    const esc=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(!q)return esc;
    const eq=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return esc.replace(new RegExp('('+eq+')','gi'),'<mark style="background:var(--accent2);color:var(--accent);border-radius:2px">$1</mark>');
  }
};

// ── EDITOR UI ─────────────────────────────────────────────
const editorUI = {
  render() {
    const has = !!state.activeId;
    document.getElementById('no-file').style.display = has?'none':'flex';
    document.getElementById('editor-wrap').style.display = has?'flex':'none';
    const f = getActive();
    document.getElementById('file-title').value = f?f.name:'';
    this.renderDirty();
  },
  renderDirty() {
    document.getElementById('dirty-dot').style.display = state.isDirty?'block':'none';
  },
  updateLineNums() {
    const ed = document.getElementById('editor');
    const n  = ed.value.split('\n').length;
    let h = '';
    for (let i=1;i<=n;i++) h+=`<span>${i}</span>`;
    document.getElementById('line-nums').innerHTML = h;
  },
  updateStatus() {
    const ed  = document.getElementById('editor');
    const val = ed.value, pos = ed.selectionStart;
    const pre = val.slice(0,pos);
    const ln  = pre.split('\n').length;
    const col = pre.split('\n').pop().length+1;
    const wds = val.trim()?val.trim().split(/\s+/).length:0;
    document.getElementById('st-pos').textContent   = `Ln ${ln}, Col ${col}`;
    document.getElementById('st-words').textContent = `${wds} words`;
    document.getElementById('st-chars').textContent = `${val.length} chars`;
  },
  syncScroll() {
    const ed = document.getElementById('editor');
    document.getElementById('line-nums').scrollTop = ed.scrollTop;
  }
};

function render() { explorer.render(); editorUI.render(); }

// ── EDITOR EVENTS ─────────────────────────────────────────
let pvTimer = null;
const editorEv = {
  onInput() {
    const val = document.getElementById('editor').value;
    const f = getActive();
    const was = state.isDirty;
    state.dirtyContent = val;
    state.isDirty = f ? val !== f.content : val.length > 0;
    if (was !== state.isDirty) editorUI.renderDirty();
    editorUI.updateLineNums();
    editorUI.updateStatus();
    explorer.render();
    clearTimeout(pvTimer);
    pvTimer = setTimeout(()=>preview.render(), 150);
  },
  onKeyDown(e) {
    if (e.key==='Tab') {
      e.preventDefault();
      const ed=e.target, s=ed.selectionStart, end=ed.selectionEnd;
      if (e.shiftKey) {
        const before=ed.value.slice(0,s), ls=before.lastIndexOf('\n')+1;
        const line=ed.value.slice(ls);
        if (line.startsWith('  ')){ed.value=ed.value.slice(0,ls)+ed.value.slice(ls+2);ed.selectionStart=ed.selectionEnd=Math.max(s-2,ls);}
      } else {
        ed.value=ed.value.slice(0,s)+'  '+ed.value.slice(end);
        ed.selectionStart=ed.selectionEnd=s+2;
      }
      this.onInput();
    }
    editorUI.updateStatus();
  },
  syncScroll(){editorUI.syncScroll()}
};
document.getElementById('editor').addEventListener('keyup',()=>editorUI.updateStatus());
document.getElementById('editor').addEventListener('click',()=>editorUI.updateStatus());

// ── PREVIEW ───────────────────────────────────────────────
const preview = {
  render() {
    const content = state.activeId ? state.dirtyContent : '';
    const pv = document.getElementById('preview');
    const merms = [];
    const processed = content.replace(/```mermaid\n([\s\S]*?)```/g,(_,code)=>{
      const id='mmd-'+merms.length;
      merms.push({id,code:code.trim()});
      return `<div class="mermaid" id="${id}">${code.trim()}</div>`;
    });
    marked.setOptions({breaks:true,gfm:true});
    let html = marked.parse(processed);
    html = html.replace(/<p>(<div class="mermaid"[\s\S]*?<\/div>)<\/p>/g,'$1');
    pv.innerHTML = html;
    pv.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
    if (merms.length) {
      const dark = document.body.classList.contains('dark');
      mermaid.initialize({startOnLoad:false,theme:dark?'dark':'default',securityLevel:'loose'});
      merms.forEach(({id,code})=>{
        const el=document.getElementById(id);
        if (el) mermaid.run({nodes:[el]}).catch(()=>{el.innerHTML=`<pre style="color:var(--danger);font-size:12px">${code}</pre>`;});
      });
    }
    pv.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.disabled=true);
  }
};

// ── FORMATTING ────────────────────────────────────────────
const fmt = {
  wrap(b,a){
    const ed=document.getElementById('editor'),s=ed.selectionStart,e=ed.selectionEnd;
    const sel=ed.value.slice(s,e)||'text';
    ed.value=ed.value.slice(0,s)+b+sel+a+ed.value.slice(e);
    ed.selectionStart=s+b.length; ed.selectionEnd=s+b.length+sel.length;
    ed.focus(); editorEv.onInput();
  },
  link(){
    const ed=document.getElementById('editor'),s=ed.selectionStart,e=ed.selectionEnd;
    const sel=ed.value.slice(s,e)||'link text';
    const ins=`[${sel}](url)`;
    ed.value=ed.value.slice(0,s)+ins+ed.value.slice(e);
    ed.selectionStart=s+sel.length+3; ed.selectionEnd=s+sel.length+6;
    ed.focus(); editorEv.onInput();
  },
  heading(){
    const ed=document.getElementById('editor'),s=ed.selectionStart;
    const pre=ed.value.slice(0,s), ls=pre.lastIndexOf('\n')+1;
    const line=ed.value.slice(ls), m=line.match(/^(#{1,6}) /);
    if(m){ const nx=m[1].length>=3?'':m[1]+'# '; ed.value=ed.value.slice(0,ls)+(nx||'')+line.slice(m[0].length);}
    else { ed.value=ed.value.slice(0,ls)+'# '+line; }
    ed.selectionStart=ed.selectionEnd=ls+(m?(m[1].length>=3?0:m[1].length+2):2);
    ed.focus(); editorEv.onInput();
  },
  insertBlock(text){
    const ed=document.getElementById('editor'),s=ed.selectionStart;
    const ins='\n'+text+'\n';
    ed.value=ed.value.slice(0,s)+ins+ed.value.slice(s);
    ed.selectionStart=ed.selectionEnd=s+ins.length;
    ed.focus(); editorEv.onInput();
  }
};

// ── KEYBOARD SHORTCUTS ────────────────────────────────────
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey||e.metaKey;
  if (!ctrl) return;
  switch(e.key.toLowerCase()){
    case 's': e.preventDefault(); fileOps.save(); break;
    case 'n': e.preventDefault(); fileOps.newFile(); break;
    case 'p': e.preventDefault(); document.getElementById('search-box').focus(); break;
    case 'd': e.preventDefault(); theme.toggle(); break;
    case 'e': e.preventDefault(); ops.exportFile(); break;
    case 'w': e.preventDefault(); if(state.activeId) fileOps.deleteFile(state.activeId); break;
    case '\\': e.preventDefault(); panes.toggle('exp'); break;
  }
});

// ── OPS ───────────────────────────────────────────────────
const ops = {
  importFile(){
    const inp=document.createElement('input');
    inp.type='file'; inp.accept='.md,.markdown,.txt'; inp.multiple=true;
    inp.onchange=()=>{
      Array.from(inp.files).forEach(file=>{
        const r=new FileReader();
        r.onload=ev=>{
          const id='f_'+Date.now()+'_'+Math.random().toString(36).slice(2);
          const f={id,name:file.name,content:ev.target.result,createdAt:Date.now(),updatedAt:Date.now()};
          store.saveFile(f); const idx=store.getIndex(); idx.unshift(id); store.setIndex(idx);
          state.files.unshift(f); render();
        };
        r.readAsText(file);
      });
    };
    inp.click();
  },
  exportFile(){
    const f=getActive(); if(!f) return;
    const blob=new Blob([state.isDirty?state.dirtyContent:f.content],{type:'text/markdown'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=f.name; a.click();
  },
  print(){
    const content=state.dirtyContent;
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Print</title>
    <style>body{font-family:Georgia,serif;max-width:720px;margin:40px auto;line-height:1.7;color:#111}
    h1,h2,h3{margin:1em 0 .3em}code{background:#f4f4f2;padding:.1em .3em;border-radius:3px;font-size:.88em}
    pre{background:#f4f4f2;padding:14px;border-radius:6px;overflow-x:auto}
    blockquote{border-left:3px solid #888;padding-left:14px;color:#555;margin:1em 0}
    table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:6px 10px}
    @media print{body{margin:20px}}</style></head><body>`);
    w.document.write(marked.parse(content));
    w.document.write('</body></html>');
    w.document.close();
    w.onload=()=>{w.focus();w.print();};
  }
};

// ── MOBILE ────────────────────────────────────────────────
const mobile = {
  go(n){
    state.mobilePane=n;
    document.getElementById('main').className='pane-'+n;
    document.querySelectorAll('.m-tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  },
  initSwipe(){
    let x0=null;
    const main=document.getElementById('main');
    main.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
    main.addEventListener('touchend',e=>{
      if(x0===null)return;
      const dx=e.changedTouches[0].clientX-x0;
      if(Math.abs(dx)<50)return;
      this.go(dx<0?Math.min(2,state.mobilePane+1):Math.max(0,state.mobilePane-1));
      x0=null;
    },{passive:true});
  }
};

// ── BOOT ──────────────────────────────────────────────────
(function init(){
  theme.init();
  mermaid.initialize({startOnLoad:false, theme:store.getTheme()==='dark'?'dark':'default'});
  panes.loadLayout();

  state.files = store.loadAll();
  const toOpen = state.files.find(f=>f.id===store.getActive()) || state.files[0];
  if (toOpen) {
    state.activeId = toOpen.id;
    state.dirtyContent = toOpen.content;
    const ed = document.getElementById('editor');
    ed.value = toOpen.content;
    editorUI.updateLineNums();
    editorUI.updateStatus();
    document.getElementById('file-title').value = toOpen.name;
    preview.render();
  }

  panes.apply();
  render();
  drag.init();
  mobile.initSwipe();
})();
</script>
