<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Google Sans',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
.app{display:flex;flex-direction:column;width:100%;max-width:960px;height:100%}
.chat{flex:1;overflow-y:auto;padding:24px 24px 16px;display:flex;flex-direction:column;gap:28px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb{background:#cbd0d4;border-radius:8px}
.footer{padding:0 24px 24px;background:#fff}
.typing{padding-left:44px;display:flex;gap:4px;margin-top:4px}
.dot{width:6px;height:6px;background:#9aa0a6;border-radius:50%;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{transform:scale(.6);opacity:.4}30%{transform:scale(1);opacity:1}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(32,33,36,.95);color:#fff;padding:8px 18px;border-radius:40px;font-size:14px;font-weight:500;opacity:0;transition:.2s;pointer-events:none;z-index:2000;white-space:nowrap}
.toast.show{opacity:1}

/* markdown rendered content */
.md-body{font-size:15px;line-height:1.6;color:#1f1f1f}
.md-body p{margin-bottom:.75em}
.md-body p:last-child{margin-bottom:0}
.md-body h1,.md-body h2,.md-body h3{font-weight:600;margin:.75em 0 .4em}
.md-body h1{font-size:1.3em}.md-body h2{font-size:1.15em}.md-body h3{font-size:1em}
.md-body code{background:#f1f3f4;border-radius:4px;padding:1px 5px;font-family:monospace;font-size:13px}
.md-body pre{background:#f1f3f4;border-radius:8px;padding:12px 16px;overflow-x:auto;margin:.75em 0}
.md-body pre code{background:none;padding:0;font-size:13px}
.md-body ul,.md-body ol{padding-left:1.4em;margin:.5em 0}
.md-body li{margin:.2em 0}
.md-body blockquote{border-left:3px solid #dadce0;padding-left:12px;color:#5f6368;margin:.5em 0}
.md-body a{color:#1a73e8;text-decoration:none}.md-body a:hover{text-decoration:underline}
.md-body table{border-collapse:collapse;width:100%;margin:.75em 0;font-size:14px}
.md-body th,.md-body td{border:1px solid #dadce0;padding:6px 12px;text-align:left}
.md-body th{background:#f8f9fa;font-weight:600}
.md-body hr{border:none;border-top:1px solid #e2e6ea;margin:1em 0}

/* media rendered in messages */
.msg-media{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.msg-img{max-width:100%;max-height:400px;border-radius:10px;border:1px solid #e2e6ea;display:block}
.msg-video{max-width:100%;max-height:400px;border-radius:10px;display:block}
.msg-audio{width:100%;border-radius:8px}
.msg-pdf{width:100%;height:420px;border-radius:10px;border:1px solid #e2e6ea}
.msg-file-chip{display:inline-flex;align-items:center;gap:8px;background:#f1f3f4;border-radius:8px;padding:8px 12px;font-size:13px;color:#3c4043}
.msg-file-chip svg{width:18px;height:18px;fill:#5f6368;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <div class="chat" id="chatContainer"></div>
  <div class="footer"><chat-input id="input"></chat-input></div>
</div>
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" hidden multiple accept="image/*,video/*,audio/*,.pdf,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css">

<script>
const showToast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
};

// ── Floating Menu ──────────────────────────────────────────────
class FloatingMenu extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._items=[];this._anchor=null}
  set items(v){this._items=v;this.render()}
  connectedCallback(){
    document.addEventListener('click',e=>{
      if(this.hasAttribute('open')&&!e.composedPath().includes(this)&&!e.composedPath().includes(this._anchor))this.close()
    })
  }
  open(anchor){this._anchor=anchor;this.setAttribute('open','');requestAnimationFrame(()=>this.updatePosition())}
  close(){this.removeAttribute('open')}
  updatePosition(){
    if(!this._anchor)return;
    const r=this._anchor.getBoundingClientRect(),menu=this.shadowRoot.getElementById('mc');
    const flip=window.innerHeight-r.bottom<250;
    this.style.left=`${Math.min(r.left,window.innerWidth-260)}px`;
    if(flip){this.style.top='auto';this.style.bottom=`${window.innerHeight-r.top+8}px`}
    else{this.style.bottom='auto';this.style.top=`${r.bottom+8}px`}
  }
  render(){
    this.shadowRoot.innerHTML=`<style>:host{position:fixed;z-index:10000;visibility:hidden;opacity:0;transform:translateY(10px);transition:opacity .15s,transform .15s,visibility .15s;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.15),0 0 0 1px rgba(0,0,0,.05);min-width:240px;padding:8px 0;pointer-events:none}:host([open]){visibility:visible;opacity:1;transform:translateY(0);pointer-events:auto}.item{display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;color:#1f1f1f;fill:#5f6368}.item:hover{background:#f1f3f4}.divider{height:1px;background:#e2e6ea;margin:4px 0}svg{width:20px;height:20px}</style><div id="mc">${this._items.map((it,i)=>it.divider?'<div class="divider"></div>':`<div class="item" data-i="${i}">${it.icon||''}<span>${it.label}</span></div>`).join('')}</div>`;
    this.shadowRoot.querySelectorAll('.item').forEach(el=>{
      el.onclick=e=>{e.stopPropagation();const it=this._items[el.dataset.i];if(it.action)it.action();this.close()}
    });
  }
}
customElements.define('floating-menu',FloatingMenu);
const globalMenu=document.createElement('floating-menu');
document.body.appendChild(globalMenu);

// ── File helpers ───────────────────────────────────────────────
const fileType = f => {
  if(f.type.startsWith('image/'))return 'image';
  if(f.type.startsWith('video/'))return 'video';
  if(f.type.startsWith('audio/'))return 'audio';
  if(f.type==='application/pdf')return 'pdf';
  return 'text';
};
const fmtSize = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';

const readAsDataURL = f => new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f)});

// icon svgs for file chip
const fileIcon = type => ({
  image:'<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>',
  video:'<svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>',
  audio:'<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>',
  pdf:'<svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>',
  text:'<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM16 18H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>'
})[type]||'';

// ── Chip store (shared between component + send handler) ───────
let pendingFiles = []; // [{file, dataUrl, type, id}]
let chipListeners = [];
const onChipsChange = fn => { chipListeners.push(fn); return ()=>chipListeners=chipListeners.filter(f=>f!==fn); };
const notifyChips = () => chipListeners.forEach(fn=>fn([...pendingFiles]));
const addFiles = async files => {
  for(const f of files){
    const type=fileType(f);
    const dataUrl = (type==='image'||type==='video'||type==='audio'||type==='pdf') ? await readAsDataURL(f) : await f.text().catch(()=>null);
    pendingFiles.push({file:f,dataUrl,type,id:Math.random().toString(36).slice(2)});
  }
  notifyChips();
};
const removeFile = id => { pendingFiles=pendingFiles.filter(f=>f.id!==id); notifyChips(); };
const clearFiles = () => { pendingFiles=[]; notifyChips(); };

// ── User message component ─────────────────────────────────────
class UserMsg extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'})}
  set data({text,files}){
    const mediaHtml = files&&files.length ? files.map(f=>{
      if(f.type==='image')return `<img class="msg-img" src="${f.dataUrl}" alt="${f.file.name}">`;
      if(f.type==='video')return `<video class="msg-video" src="${f.dataUrl}" controls></video>`;
      if(f.type==='audio')return `<audio class="msg-audio" src="${f.dataUrl}" controls></audio>`;
      if(f.type==='pdf')return `<embed class="msg-pdf" src="${f.dataUrl}" type="application/pdf">`;
      return `<div class="msg-file-chip">${fileIcon(f.type)}<span>${f.file.name} · ${fmtSize(f.file.size)}</span></div>`;
    }).join('') : '';
    this.shadowRoot.innerHTML=`<style>
      :host{display:block}
      .h{display:flex;gap:12px;margin-bottom:6px;align-items:center}
      .a{width:32px;height:32px;background:#e8eaed;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      svg{width:20px;fill:#5f6368}
      strong{font-family:'Google Sans',sans-serif;font-size:15px}
      .t{padding-left:44px;font-size:16px;line-height:1.5;white-space:pre-wrap;font-family:'Google Sans',sans-serif}
      .media{padding-left:44px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
      .msg-img{max-width:100%;max-height:400px;border-radius:10px;border:1px solid #e2e6ea;display:block}
      .msg-video{max-width:100%;max-height:400px;border-radius:10px;display:block}
      .msg-audio{width:100%;border-radius:8px}
      .msg-pdf{width:100%;height:420px;border-radius:10px;border:1px solid #e2e6ea}
      .msg-file-chip{display:inline-flex;align-items:center;gap:8px;background:#f1f3f4;border-radius:8px;padding:8px 12px;font-size:13px;color:#3c4043;font-family:'Google Sans',sans-serif}
      .msg-file-chip svg{width:18px;height:18px;fill:#5f6368;flex-shrink:0}
    </style>
    <div class="h"><div class="a"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div><strong>You</strong></div>
    ${text?`<div class="t">${text}</div>`:''}
    ${mediaHtml?`<div class="media">${mediaHtml}</div>`:''}`;
  }
}
customElements.define('user-msg',UserMsg);

// ── Assistant message component ────────────────────────────────
class AssistantMsg extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'})}
  set text(v){this._text=v;this._render()}
  _render(){
    const safe = DOMPurify.sanitize(marked.parse(this._text||''),{FORBID_TAGS:['script','style','iframe'],FORBID_ATTR:['onerror','onload','onclick']});
    this.shadowRoot.innerHTML=`<style>
      :host{display:block}
      .h{display:flex;gap:12px;margin-bottom:6px;align-items:center}
      .a{width:32px;height:32px;background:#e9eef4;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      svg{width:20px;fill:#1a73e8}
      strong{font-family:'Google Sans',sans-serif;font-size:15px}
      .body{padding-left:44px}
      .md{font-size:15px;line-height:1.6;color:#1f1f1f;font-family:'Google Sans',sans-serif}
      .md p{margin-bottom:.7em}.md p:last-child{margin-bottom:0}
      .md h1,.md h2,.md h3{font-weight:600;margin:.75em 0 .35em}
      .md h1{font-size:1.3em}.md h2{font-size:1.1em}.md h3{font-size:1em}
      .md code{background:#f1f3f4;border-radius:4px;padding:1px 5px;font-family:monospace;font-size:13px}
      .md pre{background:#f1f3f4;border-radius:8px;padding:12px 16px;overflow-x:auto;margin:.75em 0}
      .md pre code{background:none;padding:0}
      .md ul,.md ol{padding-left:1.4em;margin:.4em 0}.md li{margin:.2em 0}
      .md blockquote{border-left:3px solid #dadce0;padding-left:12px;color:#5f6368;margin:.5em 0}
      .md a{color:#1a73e8;text-decoration:none}.md a:hover{text-decoration:underline}
      .md table{border-collapse:collapse;width:100%;margin:.75em 0;font-size:14px}
      .md th,.md td{border:1px solid #dadce0;padding:6px 12px;text-align:left}
      .md th{background:#f8f9fa;font-weight:600}
      .md img{max-width:100%;border-radius:8px}
      .md hr{border:none;border-top:1px solid #e2e6ea;margin:1em 0}
      .btns{display:flex;gap:6px;padding-left:44px;margin-top:6px}
      .btn{background:none;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;fill:#5f6368}
      .btn:hover{background:#f1f3f4}
      .btn svg{width:18px;height:18px}
    </style>
    <div class="h"><div class="a"><svg viewBox="0 0 24 24"><path d="M12 2L14.5 9.5 22 12 14.5 14.5 12 22 9.5 14.5 2 12 9.5 9.5 12 2z"/></svg></div><strong>Chat</strong></div>
    <div class="body"><div class="md">${safe}</div></div>
    <div class="btns">
      <button class="btn copy" title="Copy"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button>
      <button class="btn more" title="More"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
    </div>`;
    this.shadowRoot.querySelector('.copy').onclick=()=>{navigator.clipboard.writeText(this._text);showToast('✓ Copied')};
    this.shadowRoot.querySelector('.more').onclick=e=>{
      globalMenu.items=[
        {label:'Regenerate',icon:'<svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>',action:()=>showToast('🔄 Regenerating...')},
        {divider:true},
        {label:'Good response',icon:'<svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>',action:()=>showToast('👍 Thanks!')},
        {label:'Bad response',icon:'<svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>',action:()=>showToast('👎 Noted')},
      ];
      globalMenu.open(e.currentTarget);
    };
  }
}
customElements.define('assistant-msg',AssistantMsg);

// ── Chat input with file chips ─────────────────────────────────
class ChatInput extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'})}
  connectedCallback(){
    this.render();
    this.setup();
    this._unsub = onChipsChange(files=>this.renderChips(files));
    requestAnimationFrame(()=>this._focus());
  }
  disconnectedCallback(){if(this._unsub)this._unsub()}
  _focus(){const b=this.shadowRoot.getElementById('box');if(b)b.focus()}

  render(){
    this.shadowRoot.innerHTML=`<style>
      .plate{background:#f0f4f9;border-radius:28px;padding:4px 8px 6px;border:1px solid transparent;transition:.2s}
      .plate:focus-within{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.1)}
      #chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 8px 0;min-height:0}
      #chips:empty{display:none}
      .chip{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e6ea;border-radius:10px;padding:4px 8px 4px 6px;font-size:13px;color:#3c4043;font-family:'Google Sans',sans-serif;position:relative;max-width:200px}
      .chip.has-thumb{padding-left:4px}
      .chip-thumb{width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0}
      .chip-thumb-icon{width:32px;height:32px;border-radius:6px;background:#f1f3f4;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .chip-thumb-icon svg{width:18px;height:18px;fill:#5f6368}
      .chip-info{display:flex;flex-direction:column;min-width:0}
      .chip-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;font-size:12px;font-weight:500}
      .chip-size{font-size:11px;color:#80868b}
      .chip-x{background:none;border:none;cursor:pointer;padding:2px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#5f6368;flex-shrink:0}
      .chip-x:hover{background:#f1f3f4;color:#1f1f1f}
      .chip-x svg{width:14px;height:14px;fill:currentColor}
      textarea{width:100%;border:none;background:none;outline:none;padding:12px 4px 6px 12px;font-size:16px;font-family:'Google Sans',sans-serif;line-height:24px;resize:none;field-sizing:content;min-height:44px}
      .bar{display:flex;justify-content:space-between;align-items:center}
      .btn{background:none;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;fill:#444746}
      .btn:hover{background:rgba(0,0,0,.05)}
      #send{background:#0b57d0;fill:white;display:none;width:36px;height:36px}
      #send.active{display:flex}
      svg{width:22px;height:22px}
    </style>
    <div class="plate">
      <div id="chips"></div>
      <textarea id="box" placeholder="Ask anything" rows="1"></textarea>
      <div class="bar">
        <button class="btn" id="plus" aria-label="Attach"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
        <div style="display:flex;gap:2px">
          <button class="btn" aria-label="Microphone"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zM17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
          <button class="btn" id="send" aria-label="Send"><svg viewBox="0 0 24 24"><path d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59c.39-.39.39-1.02 0-1.41l-6.58-6.6c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z"/></svg></button>
        </div>
      </div>
    </div>`;
  }

  renderChips(files){
    const container=this.shadowRoot.getElementById('chips');
    container.innerHTML='';
    files.forEach(f=>{
      const chip=document.createElement('div');
      chip.className='chip'+(f.type==='image'?' has-thumb':'');
      let thumbHtml='';
      if(f.type==='image'&&f.dataUrl){
        thumbHtml=`<img class="chip-thumb" src="${f.dataUrl}" alt="">`;
      } else {
        thumbHtml=`<div class="chip-thumb-icon">${fileIcon(f.type)}</div>`;
      }
      chip.innerHTML=`${thumbHtml}<div class="chip-info"><span class="chip-name">${f.file.name}</span><span class="chip-size">${fmtSize(f.file.size)}</span></div><button class="chip-x" data-id="${f.id}" aria-label="Remove ${f.file.name}"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>`;
      chip.querySelector('.chip-x').onclick=e=>{e.stopPropagation();removeFile(f.id)};
      container.appendChild(chip);
    });
  }

  setup(){
    const box=this.shadowRoot.getElementById('box'), send=this.shadowRoot.getElementById('send');
    const update=()=>send.classList.toggle('active',box.value.trim().length>0||pendingFiles.length>0);
    box.oninput=update;

    // paste intercept
    box.addEventListener('paste',async e=>{
      const items=[...(e.clipboardData?.items||[])];
      const imageItems=items.filter(it=>it.type.startsWith('image/'));
      if(imageItems.length){
        e.preventDefault();
        const files=imageItems.map(it=>it.getAsFile()).filter(Boolean);
        await addFiles(files);
        update();
      }
    });

    const dispatch=async()=>{
      const text=box.value.trim();
      if(!text&&pendingFiles.length===0)return;
      const snapshot=[...pendingFiles];
      this.dispatchEvent(new CustomEvent('send',{detail:{text,files:snapshot},bubbles:true}));
      box.value=''; clearFiles(); update(); this._focus();
    };
    send.onclick=dispatch;
    box.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dispatch()}};

    this.shadowRoot.getElementById('plus').onclick=e=>{
      e.stopPropagation();
      globalMenu.items=[
        {label:'Upload from computer',icon:'<svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>',action:()=>document.getElementById('fileInput').click()},
        {label:'Take a photo',icon:'<svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>',action:()=>showToast('Camera not available in demo')},
      ];
      globalMenu.open(e.currentTarget);
    };
  }
}
customElements.define('chat-input',ChatInput);

// file input change handler
document.getElementById('fileInput').onchange=async e=>{
  await addFiles([...e.target.files]);
  e.target.value='';
};

// ── Stub responses ─────────────────────────────────────────────
const stubResponse = files => {
  if(!files||files.length===0) return null;
  const types=files.map(f=>f.type);
  const counts={image:0,video:0,audio:0,pdf:0,text:0};
  types.forEach(t=>counts[t]=(counts[t]||0)+1);
  const parts=[];
  if(counts.image) parts.push(`${counts.image} image${counts.image>1?'s':''}`);
  if(counts.video) parts.push(`${counts.video} video${counts.video>1?'s':''}`);
  if(counts.audio) parts.push(`${counts.audio} audio file${counts.audio>1?'s':''}`);
  if(counts.pdf)   parts.push(`${counts.pdf} PDF${counts.pdf>1?'s':''}`);
  if(counts.text)  parts.push(`${counts.text} document${counts.text>1?'s':''}`);
  const list=parts.join(', ').replace(/,([^,]*)$/,' and$1');
  return `I can see you've shared ${list}. Here's what I can help with:\n\n- **Describe or summarize** the content\n- **Answer questions** about it\n- **Extract text** or key information\n- **Compare** multiple files if you've uploaded more than one\n\nWhat would you like me to do?`;
};

const fallbackStubs=[
  "That's a great question. Here's a quick summary:\n\n- **Point one** — some relevant detail here\n- **Point two** — another important aspect to consider\n- **Point three** — and finally this\n\nLet me know if you'd like to go deeper on any of these.",
  "Sure! Here's a simple example in Python:\n\n```python\ndef greet(name: str) -> str:\n    return f\"Hello, {name}!\"\n\nprint(greet(\"world\"))\n```\n\nThis is a stub response — in production I'd call the real API.",
  "Interesting. A few things to consider:\n\n1. The first aspect worth noting is **context** — always matters.\n2. Second, **trade-offs** between approaches can vary significantly.\n3. Finally, **iteration** is usually the safest path.\n\n> \"Perfection is the enemy of good\" — Voltaire\n\nWant me to expand on any of these?",
];
let stubIdx=0;

// ── App logic ──────────────────────────────────────────────────
const chat=document.getElementById('chatContainer'), inputComp=document.getElementById('input');

inputComp.addEventListener('send',async e=>{
  const {text,files}=e.detail;
  const u=document.createElement('user-msg');
  u.data={text,files};
  chat.appendChild(u);

  const typing=document.createElement('div');
  typing.className='typing';
  typing.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(typing);
  chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'});

  await new Promise(r=>setTimeout(r,900));
  typing.remove();

  const a=document.createElement('assistant-msg');
  const reply = stubResponse(files) || fallbackStubs[stubIdx++%fallbackStubs.length];
  a.text=reply;
  chat.appendChild(a);
  chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'});
});

// initial greeting
const init=document.createElement('assistant-msg');
init.text="Hi! I'm a **chat demo** with full file support. You can:\n\n- Type a message and press **Enter** to send\n- Attach **images, video, audio, PDFs, or text files** via the + button\n- **Paste an image** directly from your clipboard\n- Remove files before sending with the **✕** on each chip\n\nAll responses here are stubs, but markdown renders properly — including `code`, tables, lists, and blockquotes.";
chat.appendChild(init);
</script>
