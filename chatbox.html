<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, viewport-fit=cover">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
/* ── theme tokens ───────────────────────────────────────────── */
:root {
  --bg:            #ffffff;
  --bg-secondary:  #f0f4f9;
  --bg-input:      #f0f4f9;
  --bg-code:       #f1f3f4;
  --bg-user-code:  #e2e6ea;
  --bg-th:         #f8f9fa;
  --bg-chip:       #ffffff;
  --bg-chip-icon:  #f1f3f4;
  --surface:       #ffffff;
  --border:        #e2e6ea;
  --border-table:  #dadce0;
  --text:          #1f1f1f;
  --text-secondary:#5f6368;
  --text-muted:    #9aa0a6;
  --text-chip:     #3c4043;
  --av-user:       #e8eaed;
  --av-asst:       #e9eef4;
  --av-icon-user:  #5f6368;
  --av-icon-asst:  #1a73e8;
  --link:          #1a73e8;
  --blockquote:    #dadce0;
  --footer-bg:     rgba(255,255,255,.92);
  --footer-border: rgba(0,0,0,.06);
  --input-focus-bg:#ffffff;
  --input-focus-shadow: 0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.1);
  --btn-hover:     rgba(0,0,0,.05);
  --menu-bg:       #ffffff;
  --menu-hover:    #f1f3f4;
  --kbd-bg:        #f1f3f4;
  --kbd-border:    #dadce0;
  --scrollbar:     #cbd0d4;
  --dot:           #9aa0a6;
  --hint:          #5f6368;
  --send-bg:       #0b57d0;
  --stop-bg:       #e8eaed;
  --stop-icon:     #444;
}
:root[data-theme="dark"] {
  --bg:            #1e1e1e;
  --bg-secondary:  #2a2a2a;
  --bg-input:      #2a2a2a;
  --bg-code:       #2d2d2d;
  --bg-user-code:  #333333;
  --bg-th:         #2d2d2d;
  --bg-chip:       #2d2d2d;
  --bg-chip-icon:  #383838;
  --surface:       #2a2a2a;
  --border:        #3c3c3c;
  --border-table:  #444444;
  --text:          #e8eaed;
  --text-secondary:#9aa0a6;
  --text-muted:    #6e7479;
  --text-chip:     #c4c7cb;
  --av-user:       #3c3c3c;
  --av-asst:       #1a3557;
  --av-icon-user:  #9aa0a6;
  --av-icon-asst:  #7baaf7;
  --link:          #7baaf7;
  --blockquote:    #444444;
  --footer-bg:     rgba(30,30,30,.92);
  --footer-border: rgba(255,255,255,.08);
  --input-focus-bg:#2a2a2a;
  --input-focus-shadow: 0 1px 3px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.3);
  --btn-hover:     rgba(255,255,255,.08);
  --menu-bg:       #2a2a2a;
  --menu-hover:    #333333;
  --kbd-bg:        #333333;
  --kbd-border:    #444444;
  --scrollbar:     #444444;
  --dot:           #6e7479;
  --hint:          #6e7479;
  --send-bg:       #1a73e8;
  --stop-bg:       #333333;
  --stop-icon:     #c4c7cb;
}

/* ── shared md styles (used in shadow roots via @import-like injection) ── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Google Sans',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;transition:background .2s,color .2s}

.app{display:flex;flex-direction:column;width:100%;max-width:960px;height:100%}
.chat{flex:1;overflow-y:auto;padding:24px max(24px,env(safe-area-inset-right)) 0 max(24px,env(safe-area-inset-left));display:flex;flex-direction:column;gap:28px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:8px}

.footer{position:fixed;bottom:0;left:0;right:0;padding:8px max(16px,env(safe-area-inset-right)) env(safe-area-inset-bottom,16px) max(16px,env(safe-area-inset-left));background:var(--footer-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--footer-border);z-index:100;transition:background .2s,border-color .2s}
.footer-inner{max-width:960px;margin:0 auto}

.typing{padding-left:44px;display:flex;gap:4px;align-items:center;height:28px}
.dot{width:6px;height:6px;background:var(--dot);border-radius:50%;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{transform:scale(.6);opacity:.4}30%{transform:scale(1);opacity:1}}

.toast{position:fixed;bottom:max(100px,calc(env(safe-area-inset-bottom) + 100px));left:50%;transform:translateX(-50%);background:rgba(32,33,36,.95);color:#fff;padding:8px 18px;border-radius:40px;font-size:14px;font-weight:500;opacity:0;transition:.2s;pointer-events:none;z-index:3000;white-space:nowrap}
.toast.show{opacity:1}

.hint-bar{display:flex;gap:16px;padding:6px 0 2px;opacity:.55;font-size:11px;color:var(--hint);user-select:none}
.hint-bar kbd{background:var(--kbd-bg);border:1px solid var(--kbd-border);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:10px;color:var(--text)}
</style>
</head>
<body>
<div class="app">
  <div class="chat" id="chatContainer" role="log" aria-live="polite" aria-label="Conversation"></div>
  <div class="footer">
    <div class="footer-inner">
      <chat-input id="input"></chat-input>
      <div class="hint-bar">
        <span><kbd>Enter</kbd> send</span>
        <span><kbd>Shift+Enter</kbd> newline</span>
        <span><kbd>↑</kbd> edit last</span>
        <span><kbd>Esc</kbd> cancel</span>
        <span><kbd>/</kbd> commands</span>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" hidden multiple accept="image/*,video/*,audio/*,.pdf,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css">

<script>
/* ── theme ──────────────────────────────────────────────────── */
const mq = window.matchMedia('(prefers-color-scheme: dark)');
const applyTheme = dark => document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
applyTheme(mq.matches);
mq.addEventListener('change', e => { if (!_themeManual) applyTheme(e.matches); });
let _themeManual = false;

function toggleDarkMode() {
  _themeManual = true;
  applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
}

/* ── shared shadow styles ───────────────────────────────────── */
// Injected into every shadow root so components read the document's CSS vars
const THEME_VARS = `
  :host { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
`;

/* Markdown prose styles shared by both user + assistant bubbles */
const MD_STYLES = `
  .md { font-size:15px; line-height:1.6; color:var(--text); font-family:'Google Sans',sans-serif; }
  .md .plain { white-space:pre-wrap; }
  .md p { margin-bottom:.7em; } .md p:last-child { margin-bottom:0; }
  .md h1,.md h2,.md h3 { font-weight:600; margin:.75em 0 .35em; color:var(--text); }
  .md h1 { font-size:1.3em; } .md h2 { font-size:1.1em; } .md h3 { font-size:1em; }
  .md strong { font-weight:600; } .md em { font-style:italic; }
  .md code { background:var(--bg-code); border-radius:4px; padding:1px 5px; font-family:monospace; font-size:13px; color:var(--text); }
  .md pre { background:var(--bg-code); border-radius:8px; padding:12px 16px; overflow-x:auto; margin:.75em 0; }
  .md pre code { background:none; padding:0; }
  .md ul,.md ol { padding-left:1.4em; margin:.4em 0; } .md li { margin:.2em 0; color:var(--text); }
  .md blockquote { border-left:3px solid var(--blockquote); padding-left:12px; color:var(--text-secondary); margin:.5em 0; }
  .md a { color:var(--link); text-decoration:none; } .md a:hover { text-decoration:underline; }
  .md table { border-collapse:collapse; width:100%; margin:.75em 0; font-size:14px; }
  .md th,.md td { border:1px solid var(--border-table); padding:6px 12px; text-align:left; color:var(--text); }
  .md th { background:var(--bg-th); font-weight:600; }
  .md img { max-width:100%; border-radius:8px; }
  .md hr { border:none; border-top:1px solid var(--border); margin:1em 0; }
`;

/* User bubble overrides code bg */
const MD_USER_STYLES = `
  .md code { background:var(--bg-user-code); }
  .md pre  { background:var(--bg-user-code); }
`;

/* ── DOMPurify config ───────────────────────────────────────── */
DOMPurify.addHook('afterSanitizeAttributes', node => {
  ['href','src'].forEach(attr => {
    if(attr in node) {
      const v = node.getAttribute(attr) || '';
      if(/^javascript:/i.test(v.replace(/\s/g,''))) node.removeAttribute(attr);
    }
  });
});
const PURIFY_CONFIG = {
  FORCE_BODY: true,
  ALLOWED_TAGS: ['p','br','strong','em','b','i','u','s','del','ins','h1','h2','h3','h4','h5','h6','ul','ol','li','blockquote','pre','code','table','thead','tbody','tr','th','td','a','img','hr','span','div'],
  ALLOWED_ATTR: ['href','src','alt','title','class','target','rel','colspan','rowspan','width','height'],
};
const sanitize = html => DOMPurify.sanitize(html, PURIFY_CONFIG);

/* ── markdown heuristic ─────────────────────────────────────── */
const MD_RE = /(?:^|\n)#{1,6} |[*_]{1,2}\S|`[^`]|\[.+?\]\(|^>\s|^\s*[-*+]\s|^\s*\d+\.\s|^-{3,}$|\|.+\|/m;
const looksLikeMd = t => MD_RE.test(t);
const renderText = t => t ? (looksLikeMd(t)
  ? sanitize(marked.parse(t))
  : `<span class="plain">${t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`)
  : '';

/* ── toast ──────────────────────────────────────────────────── */
let _toastTimer;
const showToast = (msg, dur=2000) => {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
};

/* ── file helpers ───────────────────────────────────────────── */
const fileType = f => {
  if(f.type.startsWith('image/')) return 'image';
  if(f.type.startsWith('video/')) return 'video';
  if(f.type.startsWith('audio/')) return 'audio';
  if(f.type === 'application/pdf') return 'pdf';
  return 'text';
};
const fmtSize = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';
const readAsDataURL = f => new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(f); });

const svgIcon = {
  image:'<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>',
  video:'<svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>',
  audio:'<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>',
  pdf:'<svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>',
  text:'<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM16 18H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
};

/* ── pending files ──────────────────────────────────────────── */
let pendingFiles = [];
let chipListeners = [];
const onChipsChange = fn => { chipListeners.push(fn); return () => { chipListeners = chipListeners.filter(f=>f!==fn); }; };
const notifyChips = () => chipListeners.forEach(fn => fn([...pendingFiles]));
const addFiles = async files => {
  for(const f of files){
    const type = fileType(f);
    const dataUrl = (type==='image'||type==='video'||type==='audio'||type==='pdf')
      ? await readAsDataURL(f) : await f.text().catch(()=>null);
    pendingFiles.push({file:f, dataUrl, type, id:Math.random().toString(36).slice(2)});
  }
  notifyChips();
};
const removeFile = id => { pendingFiles = pendingFiles.filter(f=>f.id!==id); notifyChips(); };
const clearFiles = () => { pendingFiles = []; notifyChips(); };

/* ── floating menu ──────────────────────────────────────────── */
class FloatingMenu extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._items=[];this._anchor=null;this._focused=-1}
  set items(v){this._items=v;this._focused=-1;this.render()}
  connectedCallback(){
    document.addEventListener('click',e=>{
      if(this.hasAttribute('open')&&!e.composedPath().includes(this)&&!e.composedPath().includes(this._anchor))this.close();
    });
    document.addEventListener('keydown',e=>this._onKey(e));
  }
  open(anchor){this._anchor=anchor;this._focused=-1;this.setAttribute('open','');requestAnimationFrame(()=>{this._updatePos();this._focusItem(0);})}
  close(){this.removeAttribute('open');this._focused=-1;if(this._anchor)this._anchor.focus();}
  _updatePos(){
    if(!this._anchor)return;
    const r=this._anchor.getBoundingClientRect();
    const flip=window.innerHeight-r.bottom<260;
    this.style.left=`${Math.min(r.left,window.innerWidth-264)}px`;
    if(flip){this.style.top='auto';this.style.bottom=`${window.innerHeight-r.top+6}px`;}
    else{this.style.bottom='auto';this.style.top=`${r.bottom+6}px`;}
  }
  _onKey(e){
    if(!this.hasAttribute('open'))return;
    if(e.key==='Escape'){e.preventDefault();this.close();return}
    if(e.key==='ArrowDown'){e.preventDefault();this._moveFocus(1);}
    if(e.key==='ArrowUp'){e.preventDefault();this._moveFocus(-1);}
    if(e.key==='Enter'||e.key===' '){
      e.preventDefault();
      const el=this.shadowRoot.querySelector('.item:focus');
      if(el){const it=this._items[+el.dataset.i];if(it?.action)it.action();this.close();}
    }
    if(e.key==='Tab'){e.preventDefault();this._moveFocus(e.shiftKey?-1:1);}
  }
  _moveFocus(dir){
    const els=[...this.shadowRoot.querySelectorAll('.item')];
    if(!els.length)return;
    this._focused=(this._focused+dir+els.length)%els.length;
    els[this._focused].focus();
  }
  _focusItem(i){const els=[...this.shadowRoot.querySelectorAll('.item')];if(els[i])els[i].focus();this._focused=i;}
  _select(i){const it=this._items[i];if(it?.action)it.action();this.close();}
  render(){
    this.shadowRoot.innerHTML=`<style>
      ${THEME_VARS}
      :host{position:fixed;z-index:10000;visibility:hidden;opacity:0;transform:translateY(8px);
        transition:opacity .12s,transform .12s,visibility .12s;
        background:var(--menu-bg);border-radius:16px;
        box-shadow:0 4px 20px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.08);
        min-width:248px;padding:6px 0;pointer-events:none}
      :host([open]){visibility:visible;opacity:1;transform:translateY(0);pointer-events:auto}
      .item{display:flex;align-items:center;gap:12px;padding:10px 18px;font-size:14px;font-weight:500;
        cursor:pointer;color:var(--text);fill:var(--text-secondary);outline:none;border:none;
        background:none;width:100%;text-align:left;font-family:'Google Sans',sans-serif;}
      .item:hover,.item:focus{background:var(--menu-hover)}
      .item .kbd{margin-left:auto;font-size:11px;color:var(--text-muted);background:var(--kbd-bg);border-radius:4px;padding:1px 5px;font-family:monospace}
      .divider{height:1px;background:var(--border);margin:4px 0}
      svg{width:20px;height:20px;flex-shrink:0}
    </style>
    ${this._items.map((it,i)=>it.divider
      ?'<div class="divider" role="separator"></div>'
      :`<button class="item" role="menuitem" tabindex="-1" data-i="${i}">${it.icon||''}<span>${it.label}</span>${it.kbd?`<span class="kbd">${it.kbd}</span>`:''}</button>`
    ).join('')}`;
    this.shadowRoot.querySelectorAll('.item').forEach(el=>{
      el.onclick=e=>{e.stopPropagation();this._select(+el.dataset.i);}
    });
  }
}
customElements.define('floating-menu', FloatingMenu);
const globalMenu = document.createElement('floating-menu');
globalMenu.setAttribute('role','menu');
document.body.appendChild(globalMenu);

/* ── command palette ────────────────────────────────────────── */
const COMMANDS = [
  {id:'new',   label:'New conversation',    kbd:'Ctrl+Shift+O', icon:'<svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>',                                                                                                                                                                                                           action:()=>location.reload()},
  {id:'search',label:'Search conversations',kbd:'Ctrl+K',       icon:'<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>',                                  action:()=>showToast('🔍 Search coming soon')},
  {id:'settings',label:'Settings',          kbd:'Ctrl+,',       icon:'<svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>', action:()=>showToast('⚙️ Settings coming soon')},
  {id:'theme', label:'Toggle dark mode',    kbd:'',             icon:'<svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>',                                                                                                                    action:toggleDarkMode},
  {id:'copy',  label:'Copy last response',  kbd:'',             icon:'<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>',                                                                                                              action:copyLastResponse},
  {id:'clear', label:'Clear conversation',  kbd:'',             icon:'<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>',                                                                                                                                                                  action:clearConversation},
];

class CommandPalette extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._filtered=COMMANDS;this._focused=0}
  connectedCallback(){this.render()}
  open(){this.setAttribute('open','');this.shadowRoot.getElementById('q').value='';this._filtered=COMMANDS;this._focused=0;this._renderList();requestAnimationFrame(()=>this.shadowRoot.getElementById('q').focus());}
  close(){this.removeAttribute('open')}
  _onKey(e){
    if(e.key==='Escape'){e.preventDefault();this.close();focusInput();return}
    if(e.key==='ArrowDown'){e.preventDefault();this._focused=(this._focused+1)%this._filtered.length;this._highlight();return}
    if(e.key==='ArrowUp'){e.preventDefault();this._focused=(this._focused-1+this._filtered.length)%this._filtered.length;this._highlight();return}
    if(e.key==='Enter'){e.preventDefault();this._exec(this._focused);return}
  }
  _highlight(){
    const items=this.shadowRoot.querySelectorAll('.cmd');
    items.forEach((el,i)=>el.classList.toggle('active',i===this._focused));

      </div>
    </div>`;
  }
  _renderChips(files){
    const c=this.shadowRoot.getElementById('chips');
    c.innerHTML='';
    files.forEach(f=>{
      const ch=document.createElement('div');
      ch.className='chip';
      const thumb=f.type==='image'&&f.dataUrl?`<img class="ct" src="${f.dataUrl}" alt="">` :`<div class="ci">${svgIcon[f.type]||svgIcon.text}</div>`;
      ch.innerHTML=`${thumb}<div class="cn"><b>${f.file.name}</b><small>${fmtSize(f.file.size)}</small></div><button class="cx" data-id="${f.id}" aria-label="Remove ${f.file.name}"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>`;
      ch.querySelector('.cx').onclick=e=>{e.stopPropagation();removeFile(f.id);};
      c.appendChild(ch);
    });
    this._updateSend();
  }
  _updateSend(){
    const box=this._box(), send=this._send();
    if(send) send.classList.toggle('active', box?.value.trim().length>0||pendingFiles.length>0);
  }
  setGenerating(v){
    this.shadowRoot.getElementById('send').classList.toggle('active',!v);
    this.shadowRoot.getElementById('stop').classList.toggle('active',v);
  }
  setup(){
    const box=this._box(), send=this._send(), stop=this.shadowRoot.getElementById('stop');
    box.oninput=()=>this._updateSend();
    box.addEventListener('paste',async e=>{
      const imgs=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));
      if(imgs.length){e.preventDefault();await addFiles(imgs.map(i=>i.getAsFile()).filter(Boolean));this._updateSend();}
    });
    this.shadowRoot.querySelector('.plate').addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
    this.shadowRoot.querySelector('.plate').addEventListener('drop',async e=>{e.preventDefault();const f=[...e.dataTransfer.files];if(f.length){await addFiles(f);this._updateSend();}});
    const dispatch=()=>{
      const text=box.value.trim();
      if(!text&&pendingFiles.length===0)return;
      const snap=[...pendingFiles];
      this.dispatchEvent(new CustomEvent('send',{detail:{text,files:snap},bubbles:true}));
      box.value='';clearFiles();this._updateSend();this.setGenerating(true);
    };
    send.onclick=dispatch;
    stop.onclick=()=>this.dispatchEvent(new CustomEvent('stop',{bubbles:true}));
    box.onkeydown=e=>{
      if(e.key==='/'&&box.value===''&&!e.ctrlKey&&!e.metaKey){e.preventDefault();palette.open();return}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dispatch();return}
      if(e.key==='Escape'){
        if(globalMenu.hasAttribute('open')){globalMenu.close();return}
        if(box.value){box.value='';this._updateSend();showToast('Input cleared');}
        return;
      }
      if(e.key==='ArrowUp'&&box.value===''&&msgHistory.length){
        e.preventDefault();
        if(_history.idx===-1){_history.draft=box.value;_history.idx=msgHistory.length-1;}
        else if(_history.idx>0){_history.idx--;}
        box.value=msgHistory[_history.idx];
        box.setSelectionRange(box.value.length,box.value.length);
        this._updateSend();return;
      }
      if(e.key==='ArrowDown'&&_history.idx!==-1){
        e.preventDefault();
        if(_history.idx<msgHistory.length-1){_history.idx++;box.value=msgHistory[_history.idx];}
        else{_history.idx=-1;box.value=_history.draft;}
        box.setSelectionRange(box.value.length,box.value.length);
        this._updateSend();return;
      }
    };
    this.shadowRoot.getElementById('plus').onclick=e=>{
      e.stopPropagation();
      globalMenu.items=[
        {label:'Upload from computer',icon:'<svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>',action:()=>document.getElementById('fileInput').click()},
        {divider:true},
        {label:'Commands',kbd:'/',icon:'<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>',action:()=>palette.open()},
      ];
      globalMenu.open(e.currentTarget);
    };
  }
}
customElements.define('chat-input', ChatInput);

/* ── file input ─────────────────────────────────────────────── */
document.getElementById('fileInput').onchange=async e=>{await addFiles([...e.target.files]);e.target.value='';};

/* ── global shortcuts ───────────────────────────────────────── */
document.addEventListener('keydown',e=>{
  const box=document.querySelector('chat-input')?.shadowRoot?.getElementById('box');
  const inInput=box&&(document.activeElement===box||document.activeElement?.shadowRoot?.contains(box));
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='/')){e.preventDefault();palette.open();return}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='O'){e.preventDefault();clearConversation();return}
  if((e.ctrlKey||e.metaKey)&&e.key===','){e.preventDefault();showToast('⚙️ Settings coming soon');return}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='C'){e.preventDefault();copyLastResponse();return}
  if(e.key==='?'&&!inInput&&!e.ctrlKey&&!e.metaKey){showToast('Shortcuts: Ctrl+K = commands · ↑ = recall · Esc = clear · / = palette',4000);return}
  if(e.key==='Escape'&&palette.hasAttribute('open')){palette.close();focusInput();return}
  if(!inInput&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1&&!palette.hasAttribute('open')){box?.focus();}
});

/* ── stubs ──────────────────────────────────────────────────── */
const stubForFiles=files=>{
  if(!files?.length)return null;
  const counts={};files.forEach(f=>counts[f.type]=(counts[f.type]||0)+1);
  const parts=Object.entries(counts).map(([t,n])=>`${n} ${t}${n>1?'s':''}`);
  return `I can see you've shared ${parts.join(', ')}. I can:\n\n- **Describe or summarise** the content\n- **Answer questions** about it\n- **Extract** key information\n\nWhat would you like?`;
};
const stubs=[
  "That's a great question. A few things worth considering:\n\n- **Context** always matters — the same answer can be right or wrong depending on the situation\n- **Trade-offs** between approaches vary significantly by scale and team\n- **Iteration** is almost always the safest path forward\n\n> *\"Perfection is the enemy of good\"* — Voltaire\n\nWant me to go deeper on any of these?",
  "Sure! Here's a quick Python example:\n\n```python\ndef greet(name: str) -> str:\n    return f\"Hello, {name}!\"\n\nprint(greet(\"world\"))  # Hello, world!\n```\n\nIn production this would hit the real API — but the markdown, code highlighting, and streaming all work the same way.",
  "Here's a summary:\n\n| Approach | Pros | Cons |\n|---|---|---|\n| Option A | Fast, simple | Less flexible |\n| Option B | Scalable | More complex |\n| Option C | Best of both | Higher cost |\n\nI'd lean toward **Option B** for most cases. What's your priority — speed or flexibility?",
  "Interesting — a few angles on this:\n\n1. The **technical** perspective: this is largely solved, the bottleneck is usually organisational\n2. The **product** angle: users rarely care how it works, only that it does\n3. The **long-term** view: choices made now compound, so defaults matter\n\nHappy to drill into any of these.",
];
let stubIdx=0, _generating=false, _stopRequested=false;

/* ── app ────────────────────────────────────────────────────── */
const chat=document.getElementById('chatContainer');
const inputComp=document.getElementById('input');

inputComp.addEventListener('send',async e=>{
  const {text,files}=e.detail;
  if(text)msgHistory.push(text);
  _history.idx=-1;
  const u=document.createElement('user-msg');
  u.data={text,files};
  chat.appendChild(u);
  const dots=document.createElement('div');
  dots.className='typing';
  dots.setAttribute('role','status');
  dots.setAttribute('aria-label','Generating response');
  dots.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(dots);
  scrollBottom();
  _stopRequested=false;_generating=true;
  await new Promise(r=>setTimeout(r,700+Math.random()*400));
  dots.remove();
  if(_stopRequested){_generating=false;inputComp.setGenerating(false);showToast('Stopped');return}
  const a=document.createElement('assistant-msg');
  const reply=stubForFiles(files)||stubs[stubIdx++%stubs.length];
  chat.appendChild(a);
  for(let i=0;i<reply.length;i++){
    if(_stopRequested)break;
    a.text=reply.slice(0,i+1);
    if(i%6===0)scrollBottom();
    await new Promise(r=>setTimeout(r,8));
  }
  if(!_stopRequested)a.text=reply;
  a.showButtons();
  _generating=false;inputComp.setGenerating(false);scrollBottom();
});

inputComp.addEventListener('stop',()=>{if(_generating){_stopRequested=true;showToast('⏹ Stopping…');}});

function scrollBottom(){chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'});}

/* ── visual viewport layout ─────────────────────────────────── */
(function(){
  const footer=document.querySelector('.footer');
  const vv=window.visualViewport;
  let rafId=null;
  function layout(){
    rafId=null;
    const vvTop=vv?vv.offsetTop:0;
    const vvH=vv?vv.height:window.innerHeight;
    const vvW=vv?vv.width:window.innerWidth;
    const scrollY=window.scrollY||0;
    const kbOffset=scrollY+(window.innerHeight-(vvTop+vvH));
    footer.style.bottom=`${kbOffset}px`;
    footer.style.width=`${vvW}px`;
    footer.style.left=`${vv?vv.offsetLeft:0}px`;
    footer.style.paddingBottom=kbOffset>0?'8px':'env(safe-area-inset-bottom,16px)';
    chat.style.paddingBottom=`${footer.getBoundingClientRect().height+24}px`;
  }
  function scheduleLayout(){if(rafId)return;rafId=requestAnimationFrame(layout);}
  if(vv){vv.addEventListener('resize',scheduleLayout);vv.addEventListener('scroll',scheduleLayout);}
  window.addEventListener('resize',scheduleLayout);
  layout();
})();

/* ── greeting ───────────────────────────────────────────────── */
const init=document.createElement('assistant-msg');
chat.appendChild(init);
init.text="Hi! I'm a **full-featured chat demo** with Claude-style UX.\n\n**Keyboard shortcuts**\n\n| Key | Action |\n|---|---|\n| `Enter` | Send message |\n| `Shift+Enter` | New line |\n| `↑` / `↓` | Cycle message history |\n| `Esc` | Clear input / close menus |\n| `/` | Open command palette |\n| `Ctrl+K` | Command palette |\n| `Ctrl+Shift+O` | New conversation |\n| `Ctrl+Shift+C` | Copy last response |\n| `?` | Shortcut reminder |\n\nYou can also **drag & drop** files onto the input, or **paste images** from your clipboard.\n\nTry typing `/` to open the **command palette**, or use the moon icon in the palette to **toggle dark mode**.";
init.showButtons();
</script>
