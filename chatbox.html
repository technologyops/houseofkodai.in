<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#fff;font-family:'Google Sans',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center}
.app{display:flex;flex-direction:column;width:100%;max-width:960px;height:100%}

/* chat scroll area */
.chat{flex:1;overflow-y:auto;padding:24px 24px 0;display:flex;flex-direction:column;gap:28px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb{background:#cbd0d4;border-radius:8px}

/* floating footer */
.footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:8px 16px env(safe-area-inset-bottom,16px);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid rgba(0,0,0,.06);
  z-index:100;
}
.footer-inner{max-width:960px;margin:0 auto}

/* typing dots */
.typing{padding-left:44px;display:flex;gap:4px;align-items:center;height:28px}
.dot{width:6px;height:6px;background:#9aa0a6;border-radius:50%;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{transform:scale(.6);opacity:.4}30%{transform:scale(1);opacity:1}}

/* toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(32,33,36,.95);color:#fff;padding:8px 18px;border-radius:40px;font-size:14px;font-weight:500;opacity:0;transition:.2s;pointer-events:none;z-index:3000;white-space:nowrap}
.toast.show{opacity:1}

/* keyboard shortcut hint bar */
.hint-bar{display:flex;gap:16px;padding:6px 0 2px;opacity:.55;font-size:11px;color:#5f6368;user-select:none}
.hint-bar kbd{background:#f1f3f4;border:1px solid #dadce0;border-radius:4px;padding:1px 5px;font-family:monospace;font-size:10px;color:#3c4043}
</style>
</head>
<body>
<div class="app">
  <div class="chat" id="chatContainer"></div>
  <div class="footer">
    <div class="footer-inner">
      <chat-input id="input"></chat-input>
      <div class="hint-bar" id="hintBar">
        <span><kbd>Enter</kbd> send</span>
        <span><kbd>Shift+Enter</kbd> newline</span>
        <span><kbd>↑</kbd> edit last</span>
        <span><kbd>Esc</kbd> cancel</span>
        <span><kbd>/</kbd> commands</span>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" hidden multiple accept="image/*,video/*,audio/*,.pdf,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css">

<script>
/* ── toast ──────────────────────────────────────────────────── */
let _toastTimer;
const showToast = (msg, dur=2000) => {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'), dur);
};

/* ── floating menu ──────────────────────────────────────────── */
class FloatingMenu extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._items=[];this._anchor=null;this._focused=-1}
  set items(v){this._items=v;this._focused=-1;this.render()}
  connectedCallback(){
    document.addEventListener('click',e=>{
      if(this.hasAttribute('open')&&!e.composedPath().includes(this)&&!e.composedPath().includes(this._anchor))this.close()
    });
    document.addEventListener('keydown',e=>this._onKey(e));
  }
  open(anchor){this._anchor=anchor;this._focused=-1;this.setAttribute('open','');requestAnimationFrame(()=>{this._updatePos();this._focusItem(0)})}
  close(){this.removeAttribute('open');this._focused=-1;if(this._anchor)this._anchor.focus()}
  _updatePos(){
    if(!this._anchor)return;
    const r=this._anchor.getBoundingClientRect();
    const flip=window.innerHeight-r.bottom<260;
    this.style.left=`${Math.min(r.left,window.innerWidth-264)}px`;
    if(flip){this.style.top='auto';this.style.bottom=`${window.innerHeight-r.top+6}px`}
    else{this.style.bottom='auto';this.style.top=`${r.bottom+6}px`}
  }
  _onKey(e){
    if(!this.hasAttribute('open'))return;
    const items=this._items.filter(i=>!i.divider);
    if(e.key==='Escape'){e.preventDefault();this.close();return}
    if(e.key==='ArrowDown'){e.preventDefault();this._moveFocus(1)}
    if(e.key==='ArrowUp'){e.preventDefault();this._moveFocus(-1)}
    if(e.key==='Enter'||e.key===' '){
      e.preventDefault();
      const el=this.shadowRoot.querySelector('.item:focus');
      if(el){const it=this._items[+el.dataset.i];if(it?.action)it.action();this.close()}
    }
    if(e.key==='Tab'){e.preventDefault();this._moveFocus(e.shiftKey?-1:1)}
  }
  _moveFocus(dir){
    const els=[...this.shadowRoot.querySelectorAll('.item')];
    if(!els.length)return;
    this._focused=(this._focused+dir+els.length)%els.length;
    els[this._focused].focus();
  }
  _focusItem(i){
    const els=[...this.shadowRoot.querySelectorAll('.item')];
    if(els[i])els[i].focus();
    this._focused=i;
  }
  _select(i){const it=this._items[i];if(it?.action)it.action();this.close()}
  render(){
    this.shadowRoot.innerHTML=`<style>
      :host{position:fixed;z-index:10000;visibility:hidden;opacity:0;transform:translateY(8px);
        transition:opacity .12s,transform .12s,visibility .12s;
        background:#fff;border-radius:16px;
        box-shadow:0 4px 20px rgba(0,0,0,.15),0 0 0 1px rgba(0,0,0,.05);
        min-width:248px;padding:6px 0;pointer-events:none;outline:none}
      :host([open]){visibility:visible;opacity:1;transform:translateY(0);pointer-events:auto}
      .item{display:flex;align-items:center;gap:12px;padding:10px 18px;font-size:14px;font-weight:500;
        cursor:pointer;color:#1f1f1f;fill:#5f6368;outline:none;border:none;background:none;width:100%;text-align:left}
      .item:hover,.item:focus{background:#f1f3f4}
      .item .kbd{margin-left:auto;font-size:11px;color:#9aa0a6;background:#f1f3f4;border-radius:4px;padding:1px 5px;font-family:monospace}
      .divider{height:1px;background:#e2e6ea;margin:4px 0}
      svg{width:20px;height:20px;flex-shrink:0}
    </style>
    ${this._items.map((it,i)=>it.divider
      ?'<div class="divider" role="separator"></div>'
      :`<button class="item" role="menuitem" tabindex="-1" data-i="${i}">${it.icon||''}<span>${it.label}</span>${it.kbd?`<span class="kbd">${it.kbd}</span>`:''}</button>`
    ).join('')}`;
    this.shadowRoot.querySelectorAll('.item').forEach(el=>{
      el.onclick=e=>{e.stopPropagation();this._select(+el.dataset.i)}
    });
  }
}
customElements.define('floating-menu',FloatingMenu);
const globalMenu=document.createElement('floating-menu');
globalMenu.setAttribute('role','menu');
document.body.appendChild(globalMenu);

/* ── file helpers ───────────────────────────────────────────── */
const fileType=f=>{
  if(f.type.startsWith('image/'))return 'image';
  if(f.type.startsWith('video/'))return 'video';
  if(f.type.startsWith('audio/'))return 'audio';
  if(f.type==='application/pdf')return 'pdf';
  return 'text';
};
const fmtSize=b=>b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';
const readAsDataURL=f=>new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f)});

const svgIcon={
  image:'<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>',
  video:'<svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>',
  audio:'<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>',
  pdf:'<svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>',
  text:'<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM16 18H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>'
};

/* ── pending files ──────────────────────────────────────────── */
let pendingFiles=[];
let chipListeners=[];
const onChipsChange=fn=>{chipListeners.push(fn);return()=>{chipListeners=chipListeners.filter(f=>f!==fn)}};
const notifyChips=()=>chipListeners.forEach(fn=>fn([...pendingFiles]));
const addFiles=async files=>{
  for(const f of files){
    const type=fileType(f);
    const dataUrl=(type==='image'||type==='video'||type==='audio'||type==='pdf')?await readAsDataURL(f):await f.text().catch(()=>null);
    pendingFiles.push({file:f,dataUrl,type,id:Math.random().toString(36).slice(2)});
  }
  notifyChips();
};
const removeFile=id=>{pendingFiles=pendingFiles.filter(f=>f.id!==id);notifyChips()};
const clearFiles=()=>{pendingFiles=[];notifyChips()};

/* ── command palette ────────────────────────────────────────── */
const COMMANDS=[
  {id:'new',label:'New conversation',kbd:'Ctrl+Shift+O',icon:'<svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>',action:()=>location.reload()},
  {id:'search',label:'Search conversations',kbd:'Ctrl+K',icon:'<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>',action:()=>showToast('🔍 Search coming soon')},
  {id:'settings',label:'Settings',kbd:'Ctrl+,',icon:'<svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>',action:()=>showToast('⚙️ Settings coming soon')},
  {id:'theme',label:'Toggle dark mode',kbd:'',icon:'<svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>',action:toggleDarkMode},
  {id:'copy',label:'Copy last response',kbd:'',icon:'<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>',action:copyLastResponse},
  {id:'clear',label:'Clear conversation',kbd:'',icon:'<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>',action:clearConversation},
];

/* ── command palette UI ─────────────────────────────────────── */
class CommandPalette extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._filtered=COMMANDS;this._focused=0}
  connectedCallback(){this.render()}
  open(){this.setAttribute('open','');this.shadowRoot.getElementById('q').value='';this._filtered=COMMANDS;this._focused=0;this._renderList();requestAnimationFrame(()=>this.shadowRoot.getElementById('q').focus())}
  close(){this.removeAttribute('open')}
  _onKey(e){
    if(e.key==='Escape'){e.preventDefault();this.close();focusInput();return}
    if(e.key==='ArrowDown'){e.preventDefault();this._focused=(this._focused+1)%this._filtered.length;this._highlight();return}
    if(e.key==='ArrowUp'){e.preventDefault();this._focused=(this._focused-1+this._filtered.length)%this._filtered.length;this._highlight();return}
    if(e.key==='Enter'){e.preventDefault();this._exec(this._focused);return}
  }
  _highlight(){
    const items=this.shadowRoot.querySelectorAll('.cmd');
    items.forEach((el,i)=>el.classList.toggle('active',i===this._focused));
    items[this._focused]?.scrollIntoView({block:'nearest'});
  }
  _exec(i){const cmd=this._filtered[i];if(cmd){cmd.action();this.close();focusInput()}}
  _filter(q){
    this._filtered=q?COMMANDS.filter(c=>c.label.toLowerCase().includes(q.toLowerCase())):COMMANDS;
    this._focused=0;this._renderList();
  }
  _renderList(){
    const list=this.shadowRoot.getElementById('list');
    list.innerHTML=this._filtered.map((c,i)=>`
      <button class="cmd${i===this._focused?' active':''}" data-i="${i}" role="option" aria-selected="${i===this._focused}">
        <span class="icon">${c.icon}</span>
        <span class="lbl">${c.label}</span>
        ${c.kbd?`<span class="kbd">${c.kbd}</span>`:''}
      </button>`).join('')||'<div class="empty">No results</div>';
    this.shadowRoot.querySelectorAll('.cmd').forEach(el=>{
      el.onmouseenter=()=>{this._focused=+el.dataset.i;this._highlight()};
      el.onclick=()=>this._exec(+el.dataset.i);
    });
  }
  render(){
    this.shadowRoot.innerHTML=`<style>
      :host{display:none;position:fixed;inset:0;z-index:9000;align-items:flex-start;justify-content:center;padding-top:80px}
      :host([open]){display:flex;animation:fi .1s ease}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.3)}
      .modal{position:relative;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);width:min(580px,92vw);overflow:hidden;max-height:60vh;display:flex;flex-direction:column}
      .search{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #e2e6ea;fill:#9aa0a6}
      .search svg{width:20px;height:20px;flex-shrink:0}
      #q{flex:1;border:none;outline:none;font-size:16px;font-family:'Google Sans',sans-serif;color:#1f1f1f;background:transparent}
      #q::placeholder{color:#9aa0a6}
      #list{overflow-y:auto;padding:6px 0}
      .cmd{display:flex;align-items:center;gap:12px;width:100%;padding:10px 18px;border:none;background:none;cursor:pointer;text-align:left;font-size:14px;font-family:'Google Sans',sans-serif;color:#1f1f1f;fill:#5f6368}
      .cmd.active,.cmd:hover{background:#f1f3f4}
      .icon svg{width:18px;height:18px}
      .lbl{flex:1}
      .kbd{font-size:11px;color:#9aa0a6;background:#f1f3f4;border-radius:4px;padding:2px 6px;font-family:monospace;white-space:nowrap}
      .empty{padding:24px;text-align:center;color:#9aa0a6;font-size:14px}
      .footer-hint{padding:8px 18px;font-size:11px;color:#9aa0a6;border-top:1px solid #e2e6ea;display:flex;gap:16px}
      .footer-hint kbd{background:#f1f3f4;border-radius:3px;padding:1px 5px;font-family:monospace}
    </style>
    <div class="backdrop"></div>
    <div class="modal" role="dialog" aria-label="Command palette">
      <div class="search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input id="q" placeholder="Type a command or search…" autocomplete="off" aria-autocomplete="list" aria-controls="list" role="combobox" aria-expanded="true"></div>
      <div id="list" role="listbox"></div>
      <div class="footer-hint"><span><kbd>↑↓</kbd> navigate</span><span><kbd>Enter</kbd> run</span><span><kbd>Esc</kbd> close</span></div>
    </div>`;
    const q=this.shadowRoot.getElementById('q');
    q.oninput=e=>this._filter(e.target.value);
    q.onkeydown=e=>this._onKey(e);
    this.shadowRoot.querySelector('.backdrop').onclick=()=>{this.close();focusInput()};
    this._renderList();
  }
}
customElements.define('command-palette',CommandPalette);
const palette=document.createElement('command-palette');
document.body.appendChild(palette);

/* ── dark mode ──────────────────────────────────────────────── */
let dark=false;
function toggleDarkMode(){
  dark=!dark;
  document.body.style.background=dark?'#1e1e1e':'#fff';
  document.body.style.color=dark?'#e8eaed':'#1f1f1f';
  document.querySelectorAll('.footer').forEach(el=>{
    el.style.background=dark?'rgba(30,30,30,.92)':'rgba(255,255,255,.92)';
    el.style.borderTopColor=dark?'rgba(255,255,255,.08)':'rgba(0,0,0,.06)';
  });
}

/* ── helpers ────────────────────────────────────────────────── */
function copyLastResponse(){
  const msgs=[...document.querySelectorAll('assistant-msg')];
  if(!msgs.length){showToast('Nothing to copy');return}
  const last=msgs[msgs.length-1];
  navigator.clipboard.writeText(last._text||'').then(()=>showToast('✓ Copied'));
}
function clearConversation(){
  const c=document.getElementById('chatContainer');
  c.innerHTML='';
  msgHistory.length=0;
  showToast('Conversation cleared');
}
function focusInput(){
  const box=document.querySelector('chat-input')?.shadowRoot?.getElementById('box');
  if(box)box.focus();
}

/* ── message history (for ↑ to recall) ─────────────────────── */
const msgHistory=[];
let historyIdx=-1;
let draftText='';

/* ── user-msg component ─────────────────────────────────────── */
class UserMsg extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'})}
  set data({text,files}){
    const mediaHtml=files?.length?files.map(f=>{
      if(f.type==='image')return `<img class="i" src="${f.dataUrl}" alt="${f.file.name}">`;
      if(f.type==='video')return `<video class="v" src="${f.dataUrl}" controls></video>`;
      if(f.type==='audio')return `<audio class="au" src="${f.dataUrl}" controls></audio>`;
      if(f.type==='pdf')return `<embed class="p" src="${f.dataUrl}" type="application/pdf">`;
      return `<div class="chip">${svgIcon.text}<span>${f.file.name} · ${fmtSize(f.file.size)}</span></div>`;
    }).join(''):'';
    this.shadowRoot.innerHTML=`<style>
      :host{display:block}
      .h{display:flex;gap:12px;margin-bottom:6px;align-items:center}
      .av{width:32px;height:32px;background:#e8eaed;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      svg{width:20px;fill:#5f6368}
      strong{font-family:'Google Sans',sans-serif;font-size:15px}
      .t{padding-left:44px;font-size:16px;line-height:1.5;white-space:pre-wrap;font-family:'Google Sans',sans-serif}
      .media{padding-left:44px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
      .i{max-width:100%;max-height:400px;border-radius:10px;border:1px solid #e2e6ea;display:block}
      .v{max-width:100%;max-height:400px;border-radius:10px;display:block}
      .au{width:100%;border-radius:8px}
      .p{width:100%;height:420px;border-radius:10px;border:1px solid #e2e6ea}
      .chip{display:inline-flex;align-items:center;gap:8px;background:#f1f3f4;border-radius:8px;padding:8px 12px;font-size:13px;color:#3c4043;font-family:'Google Sans',sans-serif}

    c.innerHTML='';
    files.forEach(f=>{
      const ch=document.createElement('div');
      ch.className='chip';
      const thumb=f.type==='image'&&f.dataUrl

      ch.innerHTML=`${thumb}<div class="cn"><b>${f.file.name}</b><small>${fmtSize(f.file.size)}</small></div><button class="cx" data-id="${f.id}" aria-label="Remove ${f.file.name}"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>`;
      ch.querySelector('.cx').onclick=e=>{e.stopPropagation();removeFile(f.id)};
      c.appendChild(ch);

  }

  _updateSend(){
    const box=this._box(), send=this._send();
    if(send) send.classList.toggle('active', box?.value.trim().length>0||pendingFiles.length>0);
  }

  setGenerating(v){
    this.shadowRoot.getElementById('send').classList.toggle('active',!v);
    this.shadowRoot.getElementById('stop').classList.toggle('active',v);
  }

  setup(){
    const box=this._box(), send=this._send(), stop=this.shadowRoot.getElementById('stop');
    box.oninput=()=>this._updateSend();

    /* paste images */
    box.addEventListener('paste',async e=>{
      const imgs=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));
      if(imgs.length){e.preventDefault();await addFiles(imgs.map(i=>i.getAsFile()).filter(Boolean));this._updateSend()}
    });

    /* drag-and-drop */
    this.shadowRoot.querySelector('.plate').addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy'});
    this.shadowRoot.querySelector('.plate').addEventListener('drop',async e=>{e.preventDefault();const f=[...e.dataTransfer.files];if(f.length){await addFiles(f);this._updateSend()}});

    const dispatch=()=>{
      const text=box.value.trim();
      if(!text&&pendingFiles.length===0)return;
      const snap=[...pendingFiles];
      this.dispatchEvent(new CustomEvent('send',{detail:{text,files:snap},bubbles:true}));
      box.value=''; clearFiles(); this._updateSend(); this.setGenerating(true);
    };

    send.onclick=dispatch;
    stop.onclick=()=>{this.dispatchEvent(new CustomEvent('stop',{bubbles:true}))};

    box.onkeydown=e=>{
      /* Slash at start → open command palette */
      if(e.key==='/'&&box.value===''&&!e.ctrlKey&&!e.metaKey){
        e.preventDefault(); palette.open(); return;
      }
      /* Enter = send; Shift+Enter = newline */
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dispatch();return}
      /* Escape: clear input or close menu */
      if(e.key==='Escape'){
        if(globalMenu.hasAttribute('open')){globalMenu.close();return}
        if(box.value){box.value='';this._updateSend();showToast('Input cleared')}
        return;
      }
      /* ↑ to recall last sent message */
      if(e.key==='ArrowUp'&&box.value===''&&msgHistory.length){
        e.preventDefault();
        if(historyIdx===-1){draftText=box.value;historyIdx=msgHistory.length-1}
        else if(historyIdx>0){historyIdx--}
        box.value=msgHistory[historyIdx];
        box.setSelectionRange(box.value.length,box.value.length);
        this._updateSend();return;
      }
      /* ↓ to go forward in history or restore draft */
      if(e.key==='ArrowDown'&&historyIdx!==-1){
        e.preventDefault();
        if(historyIdx<msgHistory.length-1){historyIdx++;box.value=msgHistory[historyIdx]}
        else{historyIdx=-1;box.value=draftText}
        box.setSelectionRange(box.value.length,box.value.length);
        this._updateSend();return;
      }
    };

    /* + button */
    this.shadowRoot.getElementById('plus').onclick=e=>{
      e.stopPropagation();
      globalMenu.items=[
        {label:'Upload from computer',icon:'<svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>',action:()=>document.getElementById('fileInput').click()},

        {divider:true},

      ];

  }

/* ── global keyboard shortcuts ──────────────────────────────── */
document.addEventListener('keydown',e=>{
  const box=document.querySelector('chat-input')?.shadowRoot?.getElementById('box');
  const active=document.activeElement;
  const inInput=box&&(document.activeElement===box||document.activeElement?.shadowRoot?.contains(box));

  /* Ctrl/Cmd+K or Ctrl+/ → command palette */
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='/')){e.preventDefault();palette.open();return}
  /* Ctrl/Cmd+Shift+O → new chat */
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='O'){e.preventDefault();clearConversation();return}
  /* Ctrl/Cmd+, → settings */
  if((e.ctrlKey||e.metaKey)&&e.key===','){e.preventDefault();showToast('⚙️ Settings coming soon');return}
  /* Ctrl/Cmd+Shift+C → copy last */
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='C'){e.preventDefault();copyLastResponse();return}
  /* ? → show shortcuts help (when not typing) */
  if(e.key==='?'&&!inInput&&!e.ctrlKey&&!e.metaKey){showShortcutsHelp();return}
  /* Esc closes palette */
  if(e.key==='Escape'&&palette.hasAttribute('open')){palette.close();focusInput();return}
  /* Any printable key when nothing focused → focus textarea */
  if(!inInput&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1&&!palette.hasAttribute('open')){
    box?.focus();
  }
});

  if(_stopRequested){_generating=false;inputComp.setGenerating(false);showToast('Stopped');return}

  const a=document.createElement('assistant-msg');
  const reply=stubForFiles(files)||stubs[stubIdx++%stubs.length];

  /* simulate streaming character by character */
  a.text='';
  chat.appendChild(a);
  const words=reply.split('');
  for(let i=0;i<words.length;i++){
    if(_stopRequested)break;
    a.text=reply.slice(0,i+1);
    if(i%6===0)scrollBottom();
    await new Promise(r=>setTimeout(r,8));
  }
  if(!_stopRequested)a.text=reply;
  _generating=false;
  inputComp.setGenerating(false);
  scrollBottom();
});

inputComp.addEventListener('stop',()=>{
  if(_generating){_stopRequested=true;showToast('⏹ Stopping…')}
});

function scrollBottom(){chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'})}

/* ── visual viewport: keep footer above keyboard ─────────────── */
(function(){
  const footer=document.querySelector('.footer');
  const vv=window.visualViewport;

  function layout(){
    const vvTop=vv?vv.offsetTop:0;
    const vvH=vv?vv.height:window.innerHeight;
    const vvW=vv?vv.width:window.innerWidth;
    const scrollY=window.scrollY||0;
    footer.style.bottom=`${scrollY+(window.innerHeight-(vvTop+vvH))}px`;
    footer.style.width=`${vvW}px`;
    footer.style.left=`${vv?vv.offsetLeft:0}px`;

    /* pad chat area so last message isn't hidden */
    const fh=footer.getBoundingClientRect().height;
    chat.style.paddingBottom=`${fh+24}px`;
  }

  if(vv){vv.addEventListener('resize',layout);vv.addEventListener('scroll',layout)}
  window.addEventListener('resize',layout);
  layout();
})();

/* ── initial greeting ────────────────────────────────────────── */
const init=document.createElement('assistant-msg');
init.text="Hi! I'm a **full-featured chat demo** with Claude-style UX.\n\n**Keyboard shortcuts**\n\n| Key | Action |\n|---|---|\n| `Enter` | Send message |\n| `Shift+Enter` | New line |\n| `↑` / `↓` | Cycle message history |\n| `Esc` | Clear input / close menus |\n| `/` | Open command palette |\n| `Ctrl+K` | Command palette |\n| `Ctrl+Shift+O` | New conversation |\n| `Ctrl+Shift+C` | Copy last response |\n| `?` | Shortcut reminder |\n\nYou can also **drag & drop** files onto the input, or **paste images** from your clipboard.";
chat.appendChild(init);
</script>
