.app{display:flex;flex-direction:column;width:100%;max-width:960px;height:100%}
.chat{flex:1;overflow-y:auto;padding:24px max(24px,env(safe-area-inset-right)) 24px max(24px,env(safe-area-inset-left));display:flex;flex-direction:column;gap:28px;scroll-behavior:smooth}

.hint-bar{display:flex;gap:16px;opacity:.5;font-size:11px;color:var(--hint);user-select:none;padding:2px 4px}

.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* ── Pending files ── */
let pendingFiles = [];
let chipListeners = [];
const onChipsChange = fn => { chipListeners.push(fn); return () => { chipListeners = chipListeners.filter(f=>f!==fn); }; };
const notifyChips = () => chipListeners.forEach(fn => fn([...pendingFiles]));
const addFiles = async files => {
  for (const f of files) {
    const type = fileType(f);
    const dataUrl = (['image','video','audio','pdf'].includes(type)) ? await readAsDataURL(f) : await f.text().catch(()=>null);
    pendingFiles.push({file:f, dataUrl, type, id:Math.random().toString(36).slice(2)});
  }
  notifyChips();
};
const restoreFiles = snap => { pendingFiles = snap.map(s=>({...s, id:Math.random().toString(36).slice(2)})); notifyChips(); };
const removeFile = id => { pendingFiles = pendingFiles.filter(f=>f.id!==id); notifyChips(); };
const clearFiles = () => { pendingFiles=[]; notifyChips(); };

  const dlBtn=mkCtrl(IC.dl,'Download'); dlBtn.style.display='none';
  const closeBtn=mkCtrl('<svg viewBox="0 0 24 24" width="22" height="22"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>','Close');
  toolbar.appendChild(dlBtn); toolbar.appendChild(closeBtn);
  const content=document.createElement('div');
  Object.assign(content.style,{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',position:'relative'});
  el.appendChild(content);
  const close=()=>{el.style.display='none';content.innerHTML='';dlBtn.style.display='none';dlBtn.onclick=null;document.body.style.overflow='';if(history.state?.lightbox)history.back();};
  closeBtn.onclick=close;
  el.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
  el.addEventListener('click',e=>{if(e.target===el||e.target===content)close();});
  window.addEventListener('popstate',e=>{if(el.style.display!=='none'&&!e.state?.lightbox)close();});
  const push=()=>history.pushState({lightbox:true},'');

  function openImage(src, alt, filename) {
    content.innerHTML=''; el.style.display='flex'; el.setAttribute('tabindex','-1'); el.focus(); push();
    dlBtn.style.display='flex'; dlBtn.onclick=()=>downloadDataUrl(src,filename||'image');
    const wrap=document.createElement('div');
    Object.assign(wrap.style,{width:'100%',height:'100%',position:'relative',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',cursor:'grab'});
    const img=document.createElement('img'); img.src=src; img.alt=alt||'';
    Object.assign(img.style,{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',userSelect:'none',pointerEvents:'none',transformOrigin:'center center',transition:'transform .05s'});
    wrap.appendChild(img); content.appendChild(wrap);
    let scale=1,ox=0,oy=0,drag=false,lx=0,ly=0,pd=null;
    const clamp=()=>{const mx=Math.max(0,(img.naturalWidth*scale-wrap.clientWidth)/2),my=Math.max(0,(img.naturalHeight*scale-wrap.clientHeight)/2);ox=Math.max(-mx,Math.min(mx,ox));oy=Math.max(-my,Math.min(my,oy));};
    const apply=()=>{img.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`;};
    wrap.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(.5,Math.min(8,scale*(e.deltaY>0?.9:1.1)));clamp();apply();},{passive:false});
    wrap.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;wrap.style.cursor='grabbing';});
    window.addEventListener('mousemove',e=>{if(!drag)return;ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;clamp();apply();});
    window.addEventListener('mouseup',()=>{drag=false;wrap.style.cursor='grab';});
    wrap.addEventListener('dblclick',()=>{scale=1;ox=0;oy=0;apply();});
  }
  function openVideo(src, filename) {
    content.innerHTML=''; el.style.display='flex'; el.setAttribute('tabindex','-1'); el.focus(); push();
    dlBtn.style.display='flex'; dlBtn.onclick=()=>downloadDataUrl(src,filename||'video');
    const wrap=document.createElement('div'); Object.assign(wrap.style,{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'});
    const video=document.createElement('video'); video.controls=true; video.autoplay=true; video.playsInline=true;
    Object.assign(video.style,{maxWidth:'100%',maxHeight:'calc(100% - 40px)',borderRadius:'10px',display:'block',colorScheme:'dark'});
    wrap.appendChild(video); content.appendChild(wrap); video.src=src; video.load();
  }
  return {openImage, openVideo, close};
})();

/* ── FloatingMenu ── */
class FloatingMenu extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._items=[];this._anchor=null;this._focused=-1;}
  set items(v){this._items=v;this._focused=-1;this._render();}
  connectedCallback(){
    this._onDocClick=e=>{if(this.hasAttribute('open')&&!e.composedPath().includes(this)&&!e.composedPath().includes(this._anchor))this.close();};
    this._onDocKey=e=>this._onKey(e);
    document.addEventListener('click',this._onDocClick);
    document.addEventListener('keydown',this._onDocKey);
  }
  disconnectedCallback(){document.removeEventListener('click',this._onDocClick);document.removeEventListener('keydown',this._onDocKey);}
  open(anchor){this._anchor=anchor;this.setAttribute('open','');requestAnimationFrame(()=>{this._pos();this._focusItem(0);});}
  close(){this.removeAttribute('open');if(this._anchor)this._anchor.focus();}
  _pos(){if(!this._anchor)return;const r=this._anchor.getBoundingClientRect(),flip=window.innerHeight-r.bottom<260;this.style.left=`${Math.min(r.left,window.innerWidth-264)}px`;if(flip){this.style.top='auto';this.style.bottom=`${window.innerHeight-r.top+6}px`;}else{this.style.bottom='auto';this.style.top=`${r.bottom+6}px`;}}
  _onKey(e){if(!this.hasAttribute('open'))return;if(e.key==='Escape'){e.preventDefault();this.close();return;}if(e.key==='ArrowDown'){e.preventDefault();this._moveFocus(1);}if(e.key==='ArrowUp'){e.preventDefault();this._moveFocus(-1);}if(e.key==='Enter'||e.key===' '){e.preventDefault();const el=this.shadowRoot.querySelector('.item:focus');if(el){this._items[+el.dataset.i]?.action?.();this.close();}}if(e.key==='Tab'){e.preventDefault();this._moveFocus(e.shiftKey?-1:1);}}
  _moveFocus(dir){const els=[...this.shadowRoot.querySelectorAll('.item')];if(!els.length)return;this._focused=(this._focused+dir+els.length)%els.length;els[this._focused].focus();}
  _focusItem(i){const els=[...this.shadowRoot.querySelectorAll('.item')];if(els[i])els[i].focus();this._focused=i;}
  _select(i){this._items[i]?.action?.();this.close();}
  _render(){
    this.shadowRoot.innerHTML=`<style>
      ${THEME_VARS}
      :host{position:fixed;z-index:10000;visibility:hidden;opacity:0;transform:translateY(8px);transition:opacity .12s,transform .12s,visibility .12s;background:var(--menu-bg);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.08);min-width:248px;padding:6px 0;pointer-events:none}
      :host([open]){visibility:visible;opacity:1;transform:translateY(0);pointer-events:auto}
      .item{display:flex;align-items:center;gap:12px;padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text);fill:var(--text-secondary);outline:none;border:none;background:none;width:100%;text-align:left;font-family:${FONT}}
      .item:hover,.item:focus{background:var(--menu-hover)}
      .kbd{margin-left:auto;font-size:11px;color:var(--text-muted);background:var(--kbd-bg);border-radius:4px;padding:1px 5px;font-family:monospace}
      .divider{height:1px;background:var(--border);margin:4px 0}
      svg{width:20px;height:20px;flex-shrink:0}
    </style>
    ${this._items.map((it,i)=>it.divider?'<div class="divider" role="separator"></div>':`<button class="item" role="menuitem" tabindex="-1" data-i="${i}">${it.icon||''}<span>${it.label}</span>${it.kbd?`<span class="kbd">${it.kbd}</span>`:''}</button>`).join('')}`;
    this.shadowRoot.querySelectorAll('.item').forEach(el=>{el.onclick=e=>{e.stopPropagation();this._select(+el.dataset.i);};});
  }
}
customElements.define('floating-menu',FloatingMenu);
const globalMenu=document.createElement('floating-menu');

/* ── Command palette ── */
const COMMANDS=[
  {id:'new',   label:'New conversation',   kbd:'Ctrl+Shift+O',icon:IC.plus,  action:()=>clearConversation()},
  {id:'theme', label:'Toggle dark mode',   kbd:'',            icon:IC.moon,  action:toggleDarkMode},
  {id:'copy',  label:'Copy last response', kbd:'Ctrl+Shift+C',icon:IC.copy,  action:()=>copyLastResponse()},
  {id:'clear', label:'Clear conversation', kbd:'',            icon:IC.trash, action:()=>clearConversation()},
];
class CommandPalette extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._filtered=COMMANDS;this._focused=0;}
  connectedCallback(){this._render();}
  open(){this.setAttribute('open','');this.shadowRoot.getElementById('q').value='';this._filtered=COMMANDS;this._focused=0;this._renderList();requestAnimationFrame(()=>this.shadowRoot.getElementById('q').focus());}
  close(){this.removeAttribute('open');}
  _onKey(e){if(e.key==='Escape'){e.preventDefault();this.close();focusInput();return;}if(e.key==='ArrowDown'){e.preventDefault();this._focused=(this._focused+1)%this._filtered.length;this._highlight();return;}if(e.key==='ArrowUp'){e.preventDefault();this._focused=(this._focused-1+this._filtered.length)%this._filtered.length;this._highlight();return;}if(e.key==='Enter'){e.preventDefault();this._exec(this._focused);return;}}
  _highlight(){const items=this.shadowRoot.querySelectorAll('.cmd');items.forEach((el,i)=>el.classList.toggle('active',i===this._focused));items[this._focused]?.scrollIntoView({block:'nearest'});}
  _exec(i){const cmd=this._filtered[i];if(cmd){cmd.action();this.close();focusInput();}}
  _filter(q){this._filtered=q?COMMANDS.filter(c=>c.label.toLowerCase().includes(q.toLowerCase())):COMMANDS;this._focused=0;this._renderList();}
  _renderList(){
    const list=this.shadowRoot.getElementById('list');
    list.innerHTML=this._filtered.map((c,i)=>`<button class="cmd${i===this._focused?' active':''}" data-i="${i}" role="option" aria-selected="${i===this._focused}"><span class="icon">${c.icon}</span><span class="lbl">${c.label}</span>${c.kbd?`<span class="kbd">${c.kbd}</span>`:''}</button>`).join('')||'<div class="empty">No results</div>';
    this.shadowRoot.querySelectorAll('.cmd').forEach(el=>{el.onmouseenter=()=>{this._focused=+el.dataset.i;this._highlight();};el.onclick=()=>this._exec(+el.dataset.i);});
  }
  _render(){
    this.shadowRoot.innerHTML=`<style>
      ${THEME_VARS}
      :host{display:none;position:fixed;inset:0;z-index:9000;align-items:flex-start;justify-content:center;padding-top:max(80px,calc(env(safe-area-inset-top)+24px))}
      :host([open]){display:flex;animation:fi .1s ease}@keyframes fi{from{opacity:0}to{opacity:1}}
      .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4)}
      .modal{position:relative;background:var(--surface);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.3);width:min(580px,92vw);overflow:hidden;max-height:60vh;display:flex;flex-direction:column}
      .search{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);fill:var(--text-muted)}
      .search svg{width:20px;height:20px;flex-shrink:0}
      #q{flex:1;border:none;outline:none;font-size:16px;font-family:${FONT};color:var(--text);background:transparent}
      #q::placeholder{color:var(--text-muted)}
      #list{overflow-y:auto;padding:6px 0;background:var(--surface)}
      .cmd{display:flex;align-items:center;gap:12px;width:100%;padding:10px 18px;border:none;background:none;cursor:pointer;text-align:left;font-size:14px;font-family:${FONT};color:var(--text);fill:var(--text-secondary)}
      .cmd.active,.cmd:hover{background:var(--menu-hover)}.icon svg{width:18px;height:18px}.lbl{flex:1}
      .kbd{font-size:11px;color:var(--text-muted);background:var(--kbd-bg);border-radius:4px;padding:2px 6px;font-family:monospace;white-space:nowrap}
      .empty{padding:24px;text-align:center;color:var(--text-muted);font-size:14px}
      .ftr{padding:8px 18px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);display:flex;gap:16px;background:var(--surface)}
      .ftr kbd{background:var(--kbd-bg);border-radius:3px;padding:1px 5px;font-family:monospace;color:var(--text)}
    </style>
    <div class="backdrop"></div>
    <div class="modal" role="dialog" aria-label="Command palette">
      <div class="search">${IC.search}<input id="q" placeholder="Type a command…" autocomplete="off" role="combobox" aria-expanded="true" aria-controls="list"></div>
      <div id="list" role="listbox"></div>
      <div class="ftr"><span><kbd>↑↓</kbd> navigate</span><span><kbd>Enter</kbd> run</span><span><kbd>Esc</kbd> close</span></div>
    </div>`;
    const q=this.shadowRoot.getElementById('q');
    q.oninput=e=>this._filter(e.target.value);
    q.onkeydown=e=>this._onKey(e);
    this.shadowRoot.querySelector('.backdrop').onclick=()=>{this.close();focusInput();};
    this._renderList();
  }
}
customElements.define('command-palette',CommandPalette);

/* ═══════════════════════════════════════════════
   FILE CARD — unified card rendered in chat messages
   ═══════════════════════════════════════════════ */
function buildFileCard(f) {
  const name = f.file?.name || 'File';
  const size = fmtSize(f.file?.size || 0);
  const src  = f.dataUrl || '';

  const wrap = document.createElement('div');

  /* ── IMAGE: frameless + hover toolbar ── */
  if (f.type === 'image') {
    wrap.style.cssText = 'position:relative;display:inline-block;max-width:100%;border-radius:12px;overflow:hidden;line-height:0';
    const img = document.createElement('img');
    img.src = src; img.alt = name;
    img.style.cssText = 'display:block;max-width:100%;max-height:360px;object-fit:cover;border-radius:12px;cursor:zoom-in';
    img.onclick = () => lb.openImage(src, name, name);

    const toolbar = document.createElement('div');
    toolbar.style.cssText = 'position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s;pointer-events:none';
    const mkHoverBtn = (svg, label, action) => {
      const b = document.createElement('button');
      b.innerHTML = svg; b.setAttribute('aria-label', label);
      b.style.cssText = 'width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);fill:#fff;backdrop-filter:blur(4px)';
      b.onclick = e => { e.stopPropagation(); action(); };
      return b;
    };
    toolbar.appendChild(mkHoverBtn(IC.dl, 'Download', () => downloadDataUrl(src, name)));
    toolbar.appendChild(mkHoverBtn(IC.open, 'Open in lightbox', () => lb.openImage(src, name, name)));
    wrap.appendChild(img); wrap.appendChild(toolbar);
    wrap.onmouseenter = () => { toolbar.style.opacity='1'; toolbar.style.pointerEvents='auto'; };
    wrap.onmouseleave = () => { toolbar.style.opacity='0'; toolbar.style.pointerEvents='none'; };
    return wrap;
  }

  /* ── CARD SHELL (video / audio / text / pdf) ── */
  wrap.style.cssText = 'width:100%';
  const card = document.createElement('div');
  card.className = 'card';
  wrap.appendChild(card);

  // Header
  const header = document.createElement('div');
  header.className = 'card-header';
  const iconEl = document.createElement('div');
  iconEl.className = 'card-icon';
  iconEl.innerHTML = IC[f.type] || IC.text;
  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.innerHTML = `<div class="card-name" title="${name}">${fmtName(name, 32)}</div><div class="card-sub">${f.type.toUpperCase()} · ${size}</div>`;
  header.appendChild(iconEl); header.appendChild(meta);
  card.appendChild(header);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';
  card.appendChild(body);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'card-footer';
  card.appendChild(footer);

  const mkAct = (svg, label, action) => {
    const b = document.createElement('button');
    b.className = 'act'; b.innerHTML = `${svg}<span>${label}</span>`;
    b.setAttribute('aria-label', label);
    b.onclick = e => { e.stopPropagation(); action(); };
    return b;
  };

  /* ── VIDEO ── */
  if (f.type === 'video') {
    let expanded = false;

    // Collapsed: poster placeholder + play overlay
    const poster = document.createElement('div');
    poster.style.cssText = 'position:relative;background:#000;cursor:pointer;min-height:140px;display:flex;align-items:center;justify-content:center';
    const vidThumb = document.createElement('video');
    vidThumb.src = src; vidThumb.preload = 'metadata';
    vidThumb.style.cssText = 'width:100%;max-height:240px;display:block;opacity:.7';
    const playOverlay = document.createElement('div');
    playOverlay.style.cssText = 'position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;fill:#1a73e8;pointer-events:none';
    playOverlay.innerHTML = IC.play;
    poster.appendChild(vidThumb); poster.appendChild(playOverlay);

    // Expanded: native player
    const player = document.createElement('video');
    player.src = src; player.controls = true; player.playsInline = true;
    player.style.cssText = 'width:100%;display:none;max-height:320px;background:#000';

    poster.onclick = () => {
      expanded = true;
      poster.style.display = 'none';
      player.style.display = 'block';
      player.play().catch(()=>{});
    };
    body.appendChild(poster); body.appendChild(player);

    footer.appendChild(mkAct(IC.dl, 'Download', () => downloadDataUrl(src, name)));
    const spacer = document.createElement('div'); spacer.className = 'act-spacer'; footer.appendChild(spacer);
    footer.appendChild(mkAct(IC.open, 'Open', () => lb.openVideo(src, name)));
    return wrap;
  }

  /* ── AUDIO ── */
  if (f.type === 'audio') {
    const audio = document.createElement('audio');
    audio.src = src; audio.preload = 'metadata';

    const inner = document.createElement('div');
    inner.style.cssText = 'padding:12px 14px;display:flex;flex-direction:column;gap:10px';

    // Scrubber
    const scrubWrap = document.createElement('div');
    scrubWrap.style.cssText = 'display:flex;flex-direction:column;gap:4px';
    const scrub = document.createElement('input');
    scrub.type='range'; scrub.min=0; scrub.max=100; scrub.value=0; scrub.step=.1;
    scrub.style.cssText = 'width:100%;height:4px;-webkit-appearance:none;appearance:none;border-radius:2px;background:var(--lb-scrub);outline:none;cursor:pointer;accent-color:var(--link)';
    const timeRow = document.createElement('div');
    timeRow.style.cssText = 'display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);font-family:monospace';
    const cur=document.createElement('span'); cur.textContent='0:00';
    const dur=document.createElement('span'); dur.textContent='0:00';
    timeRow.appendChild(cur); timeRow.appendChild(dur);
    scrubWrap.appendChild(scrub); scrubWrap.appendChild(timeRow);

    // Controls row
    const ctrlRow = document.createElement('div');
    ctrlRow.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:8px;fill:var(--text-secondary)';
    const mkAudioBtn = (svg, label, sz=36) => {
      const b=document.createElement('button'); b.innerHTML=svg; b.setAttribute('aria-label',label);
      b.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;border:none;cursor:pointer;background:var(--btn-hover);fill:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
      b.onmouseenter=()=>b.style.background='var(--border)'; b.onmouseleave=()=>b.style.background='var(--btn-hover)';
      return b;
    };
    const backBtn = mkAudioBtn(IC.back15, 'Back 15s');
    const playBtn = mkAudioBtn(IC.play, 'Play/Pause', 44);
    playBtn.style.background = 'var(--send-bg)'; playBtn.style.fill = '#fff';
    playBtn.onmouseenter=()=>playBtn.style.background='var(--link)'; playBtn.onmouseleave=()=>playBtn.style.background='var(--send-bg)';
    const fwdBtn = mkAudioBtn(IC.fwd15, 'Forward 15s');

    ctrlRow.appendChild(backBtn); ctrlRow.appendChild(playBtn); ctrlRow.appendChild(fwdBtn);
    inner.appendChild(scrubWrap); inner.appendChild(ctrlRow);
    body.appendChild(inner); body.appendChild(audio);

    audio.addEventListener('loadedmetadata',()=>{dur.textContent=fmtTime(audio.duration);scrub.max=audio.duration;});
    audio.addEventListener('timeupdate',()=>{cur.textContent=fmtTime(audio.currentTime);scrub.value=audio.currentTime;});
    audio.addEventListener('play',()=>{playBtn.innerHTML=IC.pause;});
    audio.addEventListener('pause',()=>{playBtn.innerHTML=IC.play;});
    audio.addEventListener('ended',()=>{playBtn.innerHTML=IC.play;});
    scrub.addEventListener('input',()=>{audio.currentTime=scrub.value;});
    playBtn.onclick=()=>audio.paused?audio.play():audio.pause();
    backBtn.onclick=()=>{audio.currentTime=Math.max(0,audio.currentTime-15);};
    fwdBtn.onclick=()=>{audio.currentTime=Math.min(audio.duration||0,audio.currentTime+15);};

    footer.appendChild(mkAct(IC.dl, 'Download', () => downloadDataUrl(src, name)));
    return wrap;
  }

  /* ── TEXT / MARKDOWN ── */
  if (f.type === 'text') {
    let expanded = false;
    const PREVIEW_LINES = 3;

    const preview = document.createElement('div');
    preview.style.cssText = 'padding:12px 14px;cursor:pointer;position:relative;user-select:none';

    // Clamp to 3 lines with fade
    const textDiv = document.createElement('div');
    textDiv.className = 'md';
    // For preview: plain text first 3 lines
    const rawLines = src.split('\n').slice(0, PREVIEW_LINES).join('\n');
    textDiv.innerHTML = renderMd(rawLines);
    textDiv.style.cssText = 'font-size:13px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;pointer-events:none';

    const fade = document.createElement('div');
    fade.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,var(--card-bg));border-radius:0 0 14px 14px';

    const hint = document.createElement('div');
    hint.style.cssText = 'margin-top:4px;font-size:11px;color:var(--link);font-family:'+FONT+';display:flex;align-items:center;gap:3px;fill:var(--link)';
    hint.innerHTML = `${IC.expand.replace('viewBox','style="width:13px;height:13px" viewBox')}<span>Show more</span>`;

    preview.appendChild(textDiv); preview.appendChild(fade); preview.appendChild(hint);

    // Full render (hidden initially)
    const full = document.createElement('div');
    full.className = 'md';
    full.innerHTML = renderMd(src);
    full.style.cssText = 'padding:12px 14px;font-size:13px;line-height:1.6;display:none;word-break:break-word;overflow-wrap:break-word;max-height:480px;overflow-y:auto';

    preview.onclick = () => {
      expanded = !expanded;
      preview.style.display = expanded ? 'none' : 'block';
      full.style.display = expanded ? 'block' : 'none';
    };

    body.appendChild(preview); body.appendChild(full);

    footer.appendChild(mkAct(IC.copy, 'Copy', () => { navigator.clipboard.writeText(src); showToast('✓ Copied'); }));
    const sp = document.createElement('div'); sp.className='act-spacer'; footer.appendChild(sp);
    footer.appendChild(mkAct(IC.dl, 'Download', () => {
      const blob = new Blob([src], {type:'text/plain'});
      downloadDataUrl(URL.createObjectURL(blob), name);
    }));
    return wrap;
  }

  /* ── PDF ── */
  if (f.type === 'pdf') {
    const pdfBody = document.createElement('div');
    pdfBody.style.cssText = 'padding:20px 14px;display:flex;align-items:center;gap:14px;cursor:pointer';
    pdfBody.title = 'Open PDF';
    const bigIcon = document.createElement('div');
    bigIcon.style.cssText = 'width:48px;height:48px;border-radius:10px;background:rgba(26,115,232,.1);display:flex;align-items:center;justify-content:center;fill:var(--av-icon-asst);flex-shrink:0';

    pdfBody.appendChild(bigIcon); pdfBody.appendChild(pdfMeta);
    pdfBody.onclick = () => window.open(src, '_blank');

    footer.appendChild(mkAct(IC.dl, 'Download', () => downloadDataUrl(src, name)));
    const sp = document.createElement('div'); sp.className='act-spacer'; footer.appendChild(sp);
    footer.appendChild(mkAct(IC.open, 'Open', () => window.open(src, '_blank')));
    return wrap;
  }

}

/* ── Image grid helper ── */
function buildImageGroup(imgFiles) {
  if (imgFiles.length === 1) return buildFileCard(imgFiles[0]);

  const grid = document.createElement('div');
  const cols = Math.min(imgFiles.length, 2);
  grid.style.cssText = `display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px`;

  imgFiles.forEach(f => {
    const cell = document.createElement('div');
    cell.style.cssText = 'position:relative;border-radius:10px;overflow:hidden;line-height:0';
    const img = document.createElement('img');
    img.src = f.dataUrl; img.alt = f.file?.name||'';
    img.style.cssText = 'display:block;width:100%;height:180px;object-fit:cover;cursor:zoom-in';
    img.onclick = () => lb.openImage(f.dataUrl, f.file?.name, f.file?.name);

    // compact header overlay
    const hdr = document.createElement('div');
    hdr.style.cssText = 'position:absolute;top:0;left:0;right:0;padding:6px 8px;background:linear-gradient(rgba(0,0,0,.5),transparent);display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .15s';
    hdr.innerHTML = `<span style="font-size:11px;font-weight:500;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:${FONT}">${fmtName(f.file?.name||'',16)}</span>`;

    const toolbar = document.createElement('div');
    toolbar.style.cssText = 'position:absolute;bottom:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;pointer-events:none';
    const mkHB = (svg, label, action) => {
      const b = document.createElement('button'); b.innerHTML=svg; b.setAttribute('aria-label',label);
      b.style.cssText='width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);fill:#fff';
      b.onclick=e=>{e.stopPropagation();action();};
      return b;
    };
    toolbar.appendChild(mkHB(IC.dl,'Download',()=>downloadDataUrl(f.dataUrl, f.file?.name)));
    toolbar.appendChild(mkHB(IC.open,'Lightbox',()=>lb.openImage(f.dataUrl, f.file?.name, f.file?.name)));

    cell.appendChild(img); cell.appendChild(hdr); cell.appendChild(toolbar);
    cell.onmouseenter=()=>{hdr.style.opacity='1';toolbar.style.opacity='1';toolbar.style.pointerEvents='auto';};
    cell.onmouseleave=()=>{hdr.style.opacity='0';toolbar.style.opacity='0';toolbar.style.pointerEvents='none';};
    grid.appendChild(cell);
  });
  return grid;
}

class ChatInput extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});}
  connectedCallback(){this._render();this._setup();this._unsub=onChipsChange(f=>this._renderChips(f));requestAnimationFrame(()=>this._box()?.focus());}

      .cn small{font-size:10px;color:var(--text-muted);font-family:${FONT};white-space:nowrap}

      .cx:hover{background:var(--menu-hover)}.cx svg{width:12px;height:12px;fill:currentColor}
      .cact{background:none;border:none;cursor:pointer;padding:2px;border-radius:4px;display:flex;align-items:center;justify-content:center;fill:var(--text-secondary);flex-shrink:0}

      textarea::placeholder{color:var(--text-muted)}
      textarea:disabled{opacity:.5;cursor:not-allowed}
      .bar{display:flex;justify-content:space-between;align-items:center}
      .btn{background:none;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;fill:var(--text-secondary);transition:background .15s}
      .btn:hover{background:var(--btn-hover)}.btn:focus-visible{outline:2px solid var(--link);outline-offset:2px;border-radius:50%}
      #send{background:var(--send-bg);fill:white;display:none;width:36px;height:36px;border-radius:50%;transition:transform .1s,background .2s}
      #send.visible{display:flex}#send:active{transform:scale(.92)}
      #stop{background:var(--stop-bg);fill:var(--stop-icon);display:none;width:36px;height:36px;border-radius:50%}
      #stop.visible{display:flex}
      svg{width:22px;height:22px}
    </style>
    <div class="plate">
      <div id="chips"></div>
      <textarea id="box" placeholder="Ask anything" rows="1" aria-label="Message input" aria-multiline="true"></textarea>
      <div class="bar">
        <button class="btn" id="plus" aria-label="Attach file">${IC.plus}</button>

          <button class="btn" id="stop" aria-label="Stop" title="Stop (Esc)">${IC.stop}</button>
        </div>
      </div>
    </div>`;
  }
  _renderChips(files){
    const c=this.shadowRoot.getElementById('chips'); c.innerHTML='';
    files.forEach(f=>{
      const ch=document.createElement('div'); ch.className='chip';
      const thumb = f.type==='image'&&f.dataUrl
        ? `<img class="ct" src="${f.dataUrl}" alt="">`
        : `<div class="ci">${IC[f.type]||IC.text}</div>`;

      // Action buttons: copy (text only), dl (text+pdf)
      const copyBtn = f.type==='text'&&f.dataUrl
        ? `<button class="cact chip-copy" title="Copy" data-content="${encodeURIComponent(f.dataUrl)}">${IC.copy.replace('viewBox','style="width:13px;height:13px" viewBox')}</button>` : '';
      const dlBtn = ['text','pdf'].includes(f.type)&&f.dataUrl
        ? `<button class="cact chip-dl" data-src="${f.type==='text'?'blob':f.dataUrl}" data-raw="${f.type==='text'?encodeURIComponent(f.dataUrl):''}" data-name="${f.file.name}" title="Download">${IC.dl.replace('viewBox','style="width:13px;height:13px" viewBox')}</button>` : '';

      ch.innerHTML=`${thumb}<div class="cn"><b title="${f.file.name}">${fmtName(f.file.name,12)}</b><small>${fmtSize(f.file.size)}</small></div>${copyBtn}${dlBtn}<button class="cx" data-id="${f.id}" aria-label="Remove ${f.file.name}"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>`;

      ch.querySelector('.cx').onclick=e=>{e.stopPropagation();removeFile(f.id);};
      ch.querySelector('.chip-copy')?.addEventListener('click',e=>{e.stopPropagation();navigator.clipboard.writeText(decodeURIComponent(e.currentTarget.dataset.content||'')).then(()=>showToast('✓ Copied'));});
      ch.querySelector('.chip-dl')?.addEventListener('click',e=>{
        e.stopPropagation();
        const el=e.currentTarget;
        if(el.dataset.raw){const blob=new Blob([decodeURIComponent(el.dataset.raw)],{type:'text/plain'});downloadDataUrl(URL.createObjectURL(blob),el.dataset.name);}
        else downloadDataUrl(el.dataset.src,el.dataset.name);
        showToast('⬇ Downloading…');
      });
      c.appendChild(ch);
    });
    this._updateSend();
  }
  _updateSend(){const box=this._box(),send=this._sendBtn();if(send)send.classList.toggle('visible',(box?.value.trim().length>0||pendingFiles.length>0)&&!this._generating);}
  setGenerating(v){
    this._generating=v;
    const box=this._box(),send=this._sendBtn(),stop=this.shadowRoot.getElementById('stop');
    if(box)box.disabled=v;if(send)send.classList.toggle('visible',!v);if(stop)stop.classList.toggle('visible',v);
    if(!v)this._updateSend();
  }
  setValue(text){const box=this._box();if(box){box.value=text;box.disabled=false;this._autoResize();this._updateSend();box.focus();box.setSelectionRange(text.length,text.length);}}
  _autoResize(){const box=this._box();if(!box)return;if(!CSS.supports('field-sizing','content')){box.style.height='auto';box.style.height=Math.min(box.scrollHeight,200)+'px';}}
  _dispatch(){
    const box=this._box(),text=box?.value.trim();
    if(!text&&pendingFiles.length===0)return;
    const snap=[...pendingFiles]; inputRecall.idx=-1;
    this.dispatchEvent(new CustomEvent('chat:send',{detail:{text,files:snap},bubbles:true,composed:true}));
    box.value='';if(!CSS.supports('field-sizing','content'))box.style.height='';
    clearFiles();this._updateSend();this.setGenerating(true);
  }
  _setup(){
    const box=this._box(),stop=this.shadowRoot.getElementById('stop');
    box.addEventListener('input',()=>{this._autoResize();this._updateSend();});
    box.addEventListener('paste',async e=>{const imgs=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));if(imgs.length){e.preventDefault();await addFiles(imgs.map(i=>i.getAsFile()).filter(Boolean));this._updateSend();}});
    this.shadowRoot.querySelector('.plate').addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
    this.shadowRoot.querySelector('.plate').addEventListener('drop',async e=>{e.preventDefault();const f=[...e.dataTransfer.files];if(f.length){await addFiles(f);this._updateSend();}});
    this._sendBtn().onclick=()=>this._dispatch();
    stop.onclick=()=>this.dispatchEvent(new CustomEvent('chat:stop',{bubbles:true,composed:true}));
    box.onkeydown=e=>{
      if(e.key==='/'&&box.value===''&&!e.ctrlKey&&!e.metaKey){e.preventDefault();palette.open();return;}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this._dispatch();return;}
      if(e.key==='Escape'){if(globalMenu.hasAttribute('open')){globalMenu.close();return;}if(box.value){box.value='';this._autoResize();this._updateSend();showToast('Input cleared');}return;}
      if(e.key==='ArrowUp'&&box.value===''&&inputHistory.length){e.preventDefault();if(inputRecall.idx===-1){inputRecall.draft=box.value;inputRecall.idx=inputHistory.length-1;}else if(inputRecall.idx>0)inputRecall.idx--;box.value=inputHistory[inputRecall.idx];this._autoResize();this._updateSend();box.setSelectionRange(box.value.length,box.value.length);return;}
      if(e.key==='ArrowDown'&&inputRecall.idx!==-1){e.preventDefault();if(inputRecall.idx<inputHistory.length-1){inputRecall.idx++;box.value=inputHistory[inputRecall.idx];}else{inputRecall.idx=-1;box.value=inputRecall.draft;}this._autoResize();this._updateSend();box.setSelectionRange(box.value.length,box.value.length);return;}
    };
    this.shadowRoot.getElementById('plus').onclick=e=>{
      e.stopPropagation();
      globalMenu.items=[
        {label:'Upload from computer',icon:'<svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>',action:()=>document.getElementById('fileInput').click()},
        {divider:true},
        {label:'Commands',kbd:'/',icon:'<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>',action:()=>palette.open()},
      ];
      globalMenu.open(e.currentTarget);
    };
  }
}

/* ── File input ── */

/* ── Global shortcuts ── */
document.addEventListener('keydown',e=>{
  const box=document.querySelector('chat-input')?.shadowRoot?.getElementById('box');
  const inInput=box&&(document.activeElement===box||document.activeElement?.shadowRoot?.contains(box));
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='/')){e.preventDefault();palette.open();return;}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='O'){e.preventDefault();clearConversation();return;}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='C'){e.preventDefault();copyLastResponse();return;}
  if(e.key==='?'&&!inInput&&!e.ctrlKey&&!e.metaKey){showToast('Ctrl+K=commands · ↑=recall · Esc=clear · /=palette',4000);return;}
  if(e.key==='Escape'&&palette.hasAttribute('open')){palette.close();focusInput();return;}
  if(!inInput&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1&&!palette.hasAttribute('open'))box?.focus();
});

function focusInput(){document.querySelector('chat-input')?.shadowRoot?.getElementById('box')?.focus();}
function copyLastResponse(){const msgs=[...document.querySelectorAll('assistant-msg')];if(!msgs.length){showToast('Nothing to copy');return;}navigator.clipboard.writeText(msgs[msgs.length-1]._text||'').then(()=>showToast('✓ Copied'));}
function clearConversation(){chat.innerHTML='';convHistory.length=0;inputHistory.length=0;inputRecall.idx=-1;showToast('Conversation cleared');}

let _scrollRaf=null;
const scrollBottom=()=>{if(_scrollRaf)return;_scrollRaf=requestAnimationFrame(()=>{chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'});_scrollRaf=null;});};

document.getElementById('chatContainer').addEventListener('chat:edit',e=>{
  const{el,text,files}=e.detail;
  const all=[...chat.children],idx=all.indexOf(el);
  all.slice(idx).forEach(n=>n.remove());
  convHistory.splice(idx);
  inputRecall.idx=-1;
  const inputComp=document.getElementById('chatInput');
  inputComp.setGenerating(false);inputComp.setValue(text||'');
  if(files?.length)restoreFiles(files);
});

/* ── Stubs ── */
const stubForFiles=files=>{
  if(!files?.length)return null;
  const counts={};files.forEach(f=>counts[f.type]=(counts[f.type]||0)+1);
  return `I can see you've shared ${Object.entries(counts).map(([t,n])=>`${n} ${t}${n>1?'s':''}`).join(', ')}. I can:\n\n- **Describe or summarise** the content\n- **Answer questions** about it\n- **Extract** key information\n\nWhat would you like?`;
};
const stubs=[
  "That's a great question. A few things worth considering:\n\n- **Context** always matters — the same answer can be right or wrong depending on the situation\n- **Trade-offs** between approaches vary significantly by scale and team\n- **Iteration** is almost always the safest path forward\n\n> *\"Perfection is the enemy of good\"* — Voltaire\n\nWant me to go deeper on any of these?",
  "Sure! Here's a quick Python example:\n\n```python\ndef greet(name: str) -> str:\n    return f\"Hello, {name}!\"\n\nprint(greet(\"world\"))  # Hello, world!\n```\n\nThis is a stub — in production this would stream from the real API.",
  "Here's a summary:\n\n| Approach | Pros | Cons |\n|---|---|---|\n| Option A | Fast, simple | Less flexible |\n| Option B | Scalable | More complex |\n| Option C | Best of both | Higher cost |\n\nI'd lean toward **Option B** for most cases. What's your priority?",
  "Interesting — a few angles:\n\n1. The **technical** perspective: largely solved, bottleneck is usually organisational\n2. The **product** angle: users care about outcomes, not implementation\n3. The **long-term** view: defaults compound, so choose carefully\n\nHappy to drill into any of these.",
];
let stubIdx=0,_generating=false,_stopRequested=false,_abortCtrl=null;

const chat=document.getElementById('chatContainer');
const chatInput=document.getElementById('chatInput');

chatInput.addEventListener('chat:send',async e=>{
  const{text,files}=e.detail;
  if(text)inputHistory.push(text);
  inputRecall.idx=-1;
  pushHistory('user',text,files);
  const u=document.createElement('user-msg');
  chat.appendChild(u); u.data={text,files};
  const dots=document.createElement('div');
  dots.className='typing';dots.setAttribute('role','status');dots.setAttribute('aria-label','Generating');
  dots.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(dots);scrollBottom();
  _stopRequested=false;_generating=true;_abortCtrl=new AbortController();
  await new Promise(r=>setTimeout(r,600+Math.random()*400));
  dots.remove();
  if(_stopRequested){_generating=false;chatInput.setGenerating(false);scrollBottom();showToast('Stopped');return;}
  const a=document.createElement('assistant-msg');
  const reply=stubForFiles(files)||stubs[stubIdx++%stubs.length];
  chat.appendChild(a);scrollBottom();
  for(let i=0;i<reply.length;i++){if(_stopRequested)break;a.text=reply.slice(0,i+1);scrollBottom();await new Promise(r=>setTimeout(r,8));}
  if(!_stopRequested){a.text=reply;pushHistory('assistant',reply);}
  a.finalize();_generating=false;chatInput.setGenerating(false);scrollBottom();
});

chatInput.addEventListener('chat:stop',()=>{if(_generating){_stopRequested=true;_abortCtrl?.abort();showToast('⏹ Stopping…');}});

const footer=document.querySelector('.footer');
new ResizeObserver(([entry])=>{chat.style.paddingBottom=`${entry.contentRect.height+16}px`;}).observe(footer);

/* ── Greeting ── */
const init=document.createElement('assistant-msg');
chat.appendChild(init);
requestAnimationFrame(()=>{
  init.text="Hi! Here's what's new in this build — a unified **card system** for all attachment types:\n\n**In the input box** chips are now compact pills: icon + name + size + copy/download/remove. No preview.\n\n**In chat**, each file type gets a proper card:\n- 🖼 **Images** — frameless, hover for Download + Open toolbar. 2–4 images become a 2-col grid\n- 🎬 **Video** — collapsed poster with ▶ overlay, click to expand inline player. Footer: Download + Open (lightbox)\n- 🎵 **Audio** — compact inline player with scrubber + skip±15s. Footer: Download\n- 📄 **Text/MD** — collapsed 3-line preview, click to expand full render inline. Footer: Copy + Download\n- 📋 **PDF** — click card body or footer Open → opens in new browser tab. Footer: Download + Open\n\nTry attaching different file types to see each card in action.";
  init.finalize();
});
</script>
</body>
</html>
