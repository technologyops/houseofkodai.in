<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, viewport-fit=cover">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#ffffff;--bg-input:#f0f4f9;--bg-code:#f1f3f4;--bg-th:#f8f9fa;
  --bg-chip:#ffffff;--bg-chip-icon:#f1f3f4;--surface:#ffffff;
  --border:#e2e6ea;--border-table:#dadce0;
  --text:#1f1f1f;--text-secondary:#5f6368;--text-muted:#9aa0a6;
  --av-user:#e8eaed;--av-asst:#e9eef4;--av-icon-user:#5f6368;--av-icon-asst:#1a73e8;
  --link:#1a73e8;--blockquote:#dadce0;--scrollbar:#cbd0d4;--dot:#9aa0a6;--hint:#5f6368;

  --kbd-bg:#f1f3f4;--kbd-border:#dadce0;--send-bg:#0b57d0;--stop-bg:#e8eaed;--stop-icon:#444;
  --input-focus-bg:#ffffff;--input-focus-shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.1);
  --footer-border:rgba(0,0,0,.06);--card-bg:#f8f9fa;--card-border:#e2e6ea;
  --lb-bg:rgba(255,255,255,.97);--lb-ctrl:rgba(0,0,0,.06);--lb-ctrl-hover:rgba(0,0,0,.12);
  --lb-text:#1f1f1f;--lb-scrub:#e2e6ea;--lb-time:#5f6368;
}
:root[data-theme="dark"] {
  --bg:#1e1e1e;--bg-input:#2a2a2a;--bg-code:#2d2d2d;--bg-th:#2d2d2d;
  --bg-chip:#2d2d2d;--bg-chip-icon:#383838;--surface:#2a2a2a;
  --border:#3c3c3c;--border-table:#444;
  --text:#e8eaed;--text-secondary:#9aa0a6;--text-muted:#6e7479;
  --av-user:#3c3c3c;--av-asst:#1a3557;--av-icon-user:#9aa0a6;--av-icon-asst:#7baaf7;
  --link:#7baaf7;--blockquote:#444;--scrollbar:#444;--dot:#6e7479;--hint:#6e7479;
  --btn-hover:rgba(255,255,255,.08);--menu-bg:#2a2a2a;--menu-hover:#333;
  --kbd-bg:#333;--kbd-border:#444;--send-bg:#1a73e8;--stop-bg:#333;--stop-icon:#c4c7cb;
  --input-focus-bg:#2a2a2a;--input-focus-shadow:0 1px 3px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.3);
  --footer-border:rgba(255,255,255,.08);--card-bg:#252525;--card-border:#3c3c3c;
  --lb-bg:rgba(18,18,18,.97);--lb-ctrl:rgba(255,255,255,.08);--lb-ctrl-hover:rgba(255,255,255,.15);
  --lb-text:#e8eaed;--lb-scrub:#3c3c3c;--lb-time:#9aa0a6;
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Google Sans',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;transition:background .2s,color .2s}
.app{display:flex;flex-direction:column;width:100%;max-width:960px;height:100%}
.chat{flex:1;overflow-y:auto;padding:24px max(24px,env(safe-area-inset-right)) 24px max(24px,env(safe-area-inset-left));display:flex;flex-direction:column;gap:28px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:8px}
.footer{padding:10px max(16px,env(safe-area-inset-right)) max(10px,calc(env(safe-area-inset-bottom)+6px)) max(16px,env(safe-area-inset-left));background:var(--bg);border-top:1px solid var(--footer-border);transition:background .2s,border-color .2s}
.footer-inner{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:4px}
.hint-bar{display:flex;gap:16px;opacity:.5;font-size:11px;color:var(--hint);user-select:none;padding:2px 4px}
.hint-bar kbd{background:var(--kbd-bg);border:1px solid var(--kbd-border);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:10px;color:var(--text)}
.typing{padding-left:44px;display:flex;gap:4px;align-items:center;height:28px}
.dot{width:6px;height:6px;background:var(--dot);border-radius:50%;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{transform:scale(.6);opacity:.4}30%{transform:scale(1);opacity:1}}
.toast{position:fixed;bottom:max(80px,calc(env(safe-area-inset-bottom)+80px));left:50%;transform:translateX(-50%);background:rgba(32,33,36,.95);color:#fff;padding:8px 18px;border-radius:40px;font-size:14px;font-weight:500;opacity:0;transition:.2s;pointer-events:none;z-index:3000;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="chat" id="chatContainer" role="log" aria-live="off" aria-label="Conversation"></div>
  <div class="footer">
    <div class="footer-inner">
      <chat-input id="chatInput"></chat-input>
      <div class="hint-bar">
        <span><kbd>Enter</kbd> send</span>
        <span><kbd>Shift+Enter</kbd> newline</span>
        <span><kbd>↑</kbd> recall</span>
        <span><kbd>Esc</kbd> clear</span>
        <span><kbd>/</kbd> commands</span>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>

let _themeManual = false;

/* ── Shared adopted stylesheet ── */
const sharedSheet = new CSSStyleSheet();
sharedSheet.replaceSync(`
  :host { color-scheme: light dark }
  * { box-sizing: border-box; margin: 0; padding: 0 }

  /* Markdown */
  .md { font-size: 15px; line-height: 1.6; color: var(--text); font-family: ${FONT} }
  .md .plain { white-space: pre-wrap; word-break: break-word }
  .md p { margin-bottom: .7em } .md p:last-child { margin-bottom: 0 }
  .md h1,.md h2,.md h3 { font-weight: 600; margin: .75em 0 .35em; color: var(--text) }
  .md h1 { font-size: 1.3em } .md h2 { font-size: 1.1em } .md h3 { font-size: 1em }
  .md strong { font-weight: 600 } .md em { font-style: italic }
  .md code { background: var(--bg-code); border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 13px }
  .md pre { background: var(--bg-code); border-radius: 8px; padding: 12px 16px; overflow-x: auto; margin: .75em 0 }
  .md pre code { background: none; padding: 0 }
  .md ul,.md ol { padding-left: 1.4em; margin: .4em 0 } .md li { margin: .2em 0 }
  .md blockquote { border-left: 3px solid var(--blockquote); padding-left: 12px; color: var(--text-secondary); margin: .5em 0 }
  .md a { color: var(--link); text-decoration: none } .md a:hover { text-decoration: underline }
  .md table { border-collapse: collapse; width: 100%; margin: .75em 0; font-size: 14px }
  .md th,.md td { border: 1px solid var(--border-table); padding: 6px 12px; text-align: left }
  .md th { background: var(--bg-th); font-weight: 600 }
  .md img { max-width: 100%; border-radius: 8px }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 1em 0 }

  /* Message layout */
  .msg-header { display: flex; gap: 12px; margin-bottom: 6px; align-items: center }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0 }
  .avatar svg { width: 20px; height: 20px }
  .avatar.user { background: var(--av-user); fill: var(--av-icon-user) }
  .avatar.asst { background: var(--av-asst); fill: var(--av-icon-asst) }
  .msg-name { font-family: ${FONT}; font-size: 15px; font-weight: 600; color: var(--text) }
  .msg-body { padding-left: 44px }

  /* Message action row (copy/regen/thumbs/more) */
  .action-row { display: flex; gap: 6px; padding-left: 44px; margin-top: 6px }
  .icon-btn { background: none; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    fill: var(--text-secondary); transition: background .15s }
  .icon-btn:hover { background: var(--btn-hover) }
  .icon-btn svg { width: 18px; height: 18px }
  .icon-btn:focus-visible { outline: 2px solid var(--link); outline-offset: 2px }
  .icon-btn.active-up { fill: #1a73e8 }
  .icon-btn.active-dn { fill: #ea4335 }

  /* ── File card ── */
  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; width: 100% }

  /* Header — always rendered, click target for toggle/open */
  .card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 8px 10px 12px;
    min-width: 0; user-select: none;
  }
  .card-header.clickable { cursor: pointer }
  .card-header.clickable:hover { background: var(--btn-hover) }
  .card-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-chip-icon);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; fill: var(--av-icon-asst) }
  .card-icon svg { width: 18px; height: 18px }
  .card-meta { display: flex; flex-direction: column; min-width: 0; flex: 1; overflow: hidden }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: ${FONT} }
  .card-sub { font-size: 11px; color: var(--text-muted); font-family: ${FONT}; white-space: nowrap }

  /* Header actions (right side) */
  .card-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0 }
  .card-btn { background: none; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    fill: var(--text-secondary); transition: background .15s; flex-shrink: 0 }
  .card-btn:hover { background: var(--btn-hover) }
  .card-btn svg { width: 16px; height: 16px }
  .card-btn:focus-visible { outline: 2px solid var(--link); outline-offset: 2px }

  /* Chevron toggle indicator */
  .card-chevron { display: flex; align-items: center; fill: var(--text-muted); margin-left: 2px; flex-shrink: 0 }
  .card-chevron svg { width: 16px; height: 16px }

  /* Card body — shown/hidden per type */
  .card-body { border-top: 1px solid var(--card-border) }

  /* Input chip */
  .chip { display: inline-flex; align-items: center; gap: 5px; background: var(--bg-chip);
    border: 1px solid var(--border); border-radius: 20px; padding: 4px 6px 4px 5px;
    max-width: min(220px,100%); min-width: 0; overflow: hidden }
  .chip-thumb-img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0 }
  .chip-thumb-icon { width: 24px; height: 24px; border-radius: 50%; background: var(--bg-chip-icon);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; fill: var(--av-icon-asst) }
  .chip-thumb-icon svg { width: 13px; height: 13px }
  .chip-meta { display: flex; flex-direction: column; min-width: 0; flex: 1; overflow: hidden }
  .chip-name { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 11px; font-weight: 600; color: var(--text); font-family: ${FONT} }
  .chip-size { font-size: 10px; color: var(--text-muted); font-family: ${FONT}; white-space: nowrap }
  .chip-remove { background: none; border: none; cursor: pointer; padding: 2px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); flex-shrink: 0; width: 18px; height: 18px }
  .chip-remove:hover { background: var(--menu-hover) }
  .chip-remove svg { width: 12px; height: 12px; fill: currentColor }
`);
const adoptSheet = root => { root.adoptedStyleSheets = [sharedSheet]; };

/* ════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════ */
DOMPurify.addHook('afterSanitizeAttributes', node => {
  ['href','src'].forEach(a => {
    if (a in node) { const v=(node.getAttribute(a)||'').replace(/\s/g,''); if(/^javascript:/i.test(v)) node.removeAttribute(a); }
  });
});
const PURIFY_CFG = { FORCE_BODY:true, ALLOWED_TAGS:['p','br','strong','em','b','i','u','s','del','ins','h1','h2','h3','h4','h5','h6','ul','ol','li','blockquote','pre','code','table','thead','tbody','tr','th','td','a','img','hr','span','div'], ALLOWED_ATTR:['href','src','alt','title','class','target','rel','colspan','rowspan','width','height'] };
const sanitize = html => DOMPurify.sanitize(html, PURIFY_CFG);
const MD_RE = /(?:^|\n)#{1,6} |[*_]{1,2}\S|`[^`]|\[.+?\]\(|^>\s|^\s*[-*+]\s|^\s*\d+\.\s|^-{3,}$|\|.+\|/m;
const looksLikeMd = t => MD_RE.test(t);
const renderMd = t => !t ? '' : looksLikeMd(t)
  ? sanitize(marked.parse(t))
  : `<span class="plain">${t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;

const fmtSize = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';
const fmtName = (n, max=24) => { const dot=n.lastIndexOf('.'); const base=dot>0?n.slice(0,dot):n; const ext=dot>0?n.slice(dot):''; return (base.length>max?base.slice(0,max)+'…':base)+ext; };
const fmtTime = s => { const m=Math.floor(s/60); return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`; };
const readAsDataURL = f => new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(f); });
const fileType = f => {
  if (f.type.startsWith('image/')) return 'image';
  if (f.type.startsWith('video/')) return 'video';
  if (f.type.startsWith('audio/')) return 'audio';
  if (f.type==='application/pdf') return 'pdf';
  if (f.type.startsWith('text/')||/\.(txt|md|csv|json|js|ts|py|html|css)$/i.test(f.name)) return 'text';
  return 'unknown';
};
const downloadDataUrl = (src, name) => { const a=document.createElement('a'); a.href=src; a.download=name||'download'; a.click(); };

let _toastTimer;
const showToast = (msg, dur=2000) => {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>el.classList.remove('show'), dur);
};

/* ════════════════════════════════════════════
   ELEMENT FACTORY
   ════════════════════════════════════════════ */
const el = (tag, props={}, ...children) => {
  const node = document.createElement(tag);
  const { cls, style, html, ...rest } = props;
  if (cls)   node.className = cls;
  if (style) node.style.cssText = style;
  if (html)  node.innerHTML = html;
  Object.entries(rest).forEach(([k,v]) => { if(k.startsWith('on')) node[k]=v; else node.setAttribute(k,v); });
  children.forEach(c => c && node.appendChild(typeof c==='string' ? document.createTextNode(c) : c));
  return node;
};

const makeIconBtn = (svg, label, onClick, extraCls='') => {
  const b = el('button', { cls: `icon-btn ${extraCls}`.trim(), 'aria-label': label, html: svg });
  b.onclick = onClick; return b;
};

  return b;
};

/* ════════════════════════════════════════════
   GLOBAL FLOATING MENU
   ════════════════════════════════════════════ */
class FloatingMenu extends HTMLElement {
  constructor(){ super(); this.attachShadow({mode:'open'}); this._items=[]; this._anchor=null; this._focused=-1; }
  set items(v){ this._items=v; this._focused=-1; this._render(); }
  connectedCallback(){
    this._onDocClick = e => { if(this.hasAttribute('open')&&!e.composedPath().includes(this)&&!e.composedPath().includes(this._anchor)) this.close(); };
    this._onDocKey = e => this._onKey(e);
    document.addEventListener('click', this._onDocClick);
    document.addEventListener('keydown', this._onDocKey);
  }
  disconnectedCallback(){ document.removeEventListener('click',this._onDocClick); document.removeEventListener('keydown',this._onDocKey); }
  open(anchor){ this._anchor=anchor; this.setAttribute('open',''); requestAnimationFrame(()=>{ this._pos(); this._focusItem(0); }); }
  close(){ this.removeAttribute('open'); if(this._anchor) this._anchor.focus(); }
  _pos(){
    if(!this._anchor) return;
    const r=this._anchor.getBoundingClientRect(), flip=window.innerHeight-r.bottom<220;
    this.style.left=`${Math.min(r.left, window.innerWidth-240)}px`;
    if(flip){ this.style.top='auto'; this.style.bottom=`${window.innerHeight-r.top+6}px`; }
    else { this.style.bottom='auto'; this.style.top=`${r.bottom+6}px`; }
  }
  _onKey(e){
    if(!this.hasAttribute('open')) return;
    if(e.key==='Escape'){ e.preventDefault(); this.close(); return; }
    if(e.key==='ArrowDown'){ e.preventDefault(); this._moveFocus(1); }
    if(e.key==='ArrowUp')  { e.preventDefault(); this._moveFocus(-1); }
    if(e.key==='Enter'||e.key===' '){ e.preventDefault(); const f=this.shadowRoot.querySelector('.item:focus'); if(f){ this._items[+f.dataset.i]?.action?.(); this.close(); } }
    if(e.key==='Tab'){ e.preventDefault(); this._moveFocus(e.shiftKey?-1:1); }
  }
  _moveFocus(d){ const els=[...this.shadowRoot.querySelectorAll('.item')]; if(!els.length)return; this._focused=(this._focused+d+els.length)%els.length; els[this._focused].focus(); }
  _focusItem(i){ const els=[...this.shadowRoot.querySelectorAll('.item')]; if(els[i])els[i].focus(); this._focused=i; }
  _select(i){ this._items[i]?.action?.(); this.close(); }
  _render(){
    this.shadowRoot.innerHTML=`<style>
      :host{position:fixed;z-index:10000;visibility:hidden;opacity:0;transform:translateY(6px);
        transition:opacity .12s,transform .12s,visibility .12s;background:var(--menu-bg);
        border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.2),0 0 0 1px rgba(0,0,0,.07);
        min-width:220px;padding:5px 0;pointer-events:none;font-family:${FONT}}
      :host([open]){visibility:visible;opacity:1;transform:translateY(0);pointer-events:auto}
      .item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;font-weight:500;
        cursor:pointer;color:var(--text);fill:var(--text-secondary);outline:none;border:none;
        background:none;width:100%;text-align:left}
      .item:hover,.item:focus{background:var(--menu-hover)}
      .divider{height:1px;background:var(--border);margin:4px 0}
      svg{width:16px;height:16px;flex-shrink:0}
    </style>
    ${this._items.map((it,i)=>it.divider
      ? '<div class="divider" role="separator"></div>'
      : `<button class="item" role="menuitem" tabindex="-1" data-i="${i}">${it.icon||''}<span>${it.label}</span></button>`
    ).join('')}`;
    this.shadowRoot.querySelectorAll('.item').forEach(e=>{ e.onclick=ev=>{ ev.stopPropagation(); this._select(+e.dataset.i); }; });
  }
}
customElements.define('floating-menu', FloatingMenu);
const globalMenu = el('floating-menu'); globalMenu.setAttribute('role','menu'); document.body.appendChild(globalMenu);

/* ════════════════════════════════════════════
   COMMAND PALETTE
   ════════════════════════════════════════════ */
const COMMANDS = [
  {id:'new',   label:'New conversation',   kbd:'Ctrl+Shift+O', icon:IC.plus,  action:()=>clearConversation()},
  {id:'theme', label:'Toggle dark mode',   kbd:'',             icon:IC.moon,  action:toggleDarkMode},
  {id:'copy',  label:'Copy last response', kbd:'Ctrl+Shift+C', icon:IC.copy,  action:()=>copyLastResponse()},
  {id:'clear', label:'Clear conversation', kbd:'',             icon:IC.trash, action:()=>clearConversation()},
];
class CommandPalette extends HTMLElement {
  constructor(){ super(); this.attachShadow({mode:'open'}); this._filtered=COMMANDS; this._focused=0; }
  connectedCallback(){ this._render(); }
  open(){ this.setAttribute('open',''); this.shadowRoot.getElementById('q').value=''; this._filtered=COMMANDS; this._focused=0; this._renderList(); requestAnimationFrame(()=>this.shadowRoot.getElementById('q').focus()); }
  close(){ this.removeAttribute('open'); }
  _onKey(e){
    if(e.key==='Escape'){ e.preventDefault(); this.close(); focusInput(); return; }
    if(e.key==='ArrowDown'){ e.preventDefault(); this._focused=(this._focused+1)%this._filtered.length; this._highlight(); return; }
    if(e.key==='ArrowUp')  { e.preventDefault(); this._focused=(this._focused-1+this._filtered.length)%this._filtered.length; this._highlight(); return; }
    if(e.key==='Enter'){ e.preventDefault(); this._exec(this._focused); return; }
  }
  _highlight(){ const its=this.shadowRoot.querySelectorAll('.cmd'); its.forEach((e,i)=>e.classList.toggle('active',i===this._focused)); its[this._focused]?.scrollIntoView({block:'nearest'}); }
  _exec(i){ const c=this._filtered[i]; if(c){ c.action(); this.close(); focusInput(); } }
  _filter(q){ this._filtered=q?COMMANDS.filter(c=>c.label.toLowerCase().includes(q.toLowerCase())):COMMANDS; this._focused=0; this._renderList(); }
  _renderList(){
    const list=this.shadowRoot.getElementById('list');
    list.innerHTML=this._filtered.map((c,i)=>`<button class="cmd${i===this._focused?' active':''}" data-i="${i}" role="option" aria-selected="${i===this._focused}"><span class="icon">${c.icon}</span><span class="lbl">${c.label}</span>${c.kbd?`<span class="kbd">${c.kbd}</span>`:''}</button>`).join('')||'<div class="empty">No results</div>';
    this.shadowRoot.querySelectorAll('.cmd').forEach(e=>{ e.onmouseenter=()=>{ this._focused=+e.dataset.i; this._highlight(); }; e.onclick=()=>this._exec(+e.dataset.i); });
  }
  _render(){
    this.shadowRoot.innerHTML=`<style>
      :host{display:none;position:fixed;inset:0;z-index:9000;align-items:flex-start;justify-content:center;padding-top:max(80px,calc(env(safe-area-inset-top)+24px))}
      :host([open]){display:flex;animation:fi .1s ease}@keyframes fi{from{opacity:0}to{opacity:1}}
      .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4)}
      .modal{position:relative;background:var(--surface);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.3);width:min(560px,92vw);overflow:hidden;max-height:60vh;display:flex;flex-direction:column}
      .search{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);fill:var(--text-muted)}
      .search svg{width:20px;height:20px;flex-shrink:0}
      #q{flex:1;border:none;outline:none;font-size:16px;font-family:${FONT};color:var(--text);background:transparent}
      #q::placeholder{color:var(--text-muted)}
      #list{overflow-y:auto;padding:6px 0;background:var(--surface)}
      .cmd{display:flex;align-items:center;gap:12px;width:100%;padding:10px 18px;border:none;background:none;cursor:pointer;text-align:left;font-size:14px;font-family:${FONT};color:var(--text);fill:var(--text-secondary)}
      .cmd.active,.cmd:hover{background:var(--menu-hover)}.icon svg{width:18px;height:18px}.lbl{flex:1}
      .kbd{font-size:11px;color:var(--text-muted);background:var(--kbd-bg);border-radius:4px;padding:2px 6px;font-family:monospace;white-space:nowrap}
      .empty{padding:24px;text-align:center;color:var(--text-muted);font-size:14px}
      .ftr{padding:8px 18px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);display:flex;gap:16px;background:var(--surface)}
      .ftr kbd{background:var(--kbd-bg);border-radius:3px;padding:1px 5px;font-family:monospace;color:var(--text)}
    </style>
    <div class="backdrop"></div>
    <div class="modal" role="dialog" aria-label="Command palette">
      <div class="search">${IC.search}<input id="q" placeholder="Type a command…" autocomplete="off" role="combobox" aria-expanded="true" aria-controls="list"></div>
      <div id="list" role="listbox"></div>
      <div class="ftr"><span><kbd>↑↓</kbd> navigate</span><span><kbd>Enter</kbd> run</span><span><kbd>Esc</kbd> close</span></div>
    </div>`;
    const q=this.shadowRoot.getElementById('q');
    q.oninput=e=>this._filter(e.target.value);
    q.onkeydown=e=>this._onKey(e);
    this.shadowRoot.querySelector('.backdrop').onclick=()=>{ this.close(); focusInput(); };
    this._renderList();
  }
}
customElements.define('command-palette', CommandPalette);
const palette = document.createElement('command-palette');
document.body.appendChild(palette);

/* ════════════════════════════════════════════
   LIGHTBOX
   ════════════════════════════════════════════ */
const lb = (() => {
  const overlay = el('div', { style:'display:none;position:fixed;inset:0;z-index:8000;background:var(--lb-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-direction:column;align-items:center;justify-content:center;padding:max(48px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(24px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))' });
  document.body.appendChild(overlay);
  const toolbar = el('div', { style:'position:absolute;top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));display:flex;gap:8px;z-index:1' });
  overlay.appendChild(toolbar);
  const mkCtrl = (svg, label) => {
    const b=el('button',{style:'width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--lb-ctrl);fill:var(--lb-text)','aria-label':label,html:svg});
    b.onmouseenter=()=>b.style.background='var(--lb-ctrl-hover)'; b.onmouseleave=()=>b.style.background='var(--lb-ctrl)'; return b;
  };
  const dlBtn=mkCtrl(IC.dl,'Download'); dlBtn.style.display='none';
  const closeBtn=mkCtrl('<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>','Close');
  toolbar.appendChild(dlBtn); toolbar.appendChild(closeBtn);
  const content=el('div',{style:'width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative'});
  overlay.appendChild(content);
  const close=()=>{ overlay.style.display='none'; content.innerHTML=''; dlBtn.style.display='none'; dlBtn.onclick=null; if(history.state?.lightbox) history.back(); };
  closeBtn.onclick=close;
  overlay.addEventListener('keydown',e=>{ if(e.key==='Escape') close(); });
  overlay.addEventListener('click',e=>{ if(e.target===overlay||e.target===content) close(); });
  window.addEventListener('popstate',e=>{ if(overlay.style.display!=='none'&&!e.state?.lightbox) close(); });
  const push=()=>history.pushState({lightbox:true},'');

  const openImage=(src,alt,filename)=>{
    content.innerHTML=''; overlay.style.display='flex'; overlay.setAttribute('tabindex','-1'); overlay.focus(); push();
    dlBtn.style.display='flex'; dlBtn.onclick=()=>downloadDataUrl(src,filename||'image');
    const wrap=el('div',{style:'width:100%;height:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:grab'});
    const img=el('img',{src,alt:alt||'',style:'max-width:100%;max-height:100%;object-fit:contain;user-select:none;pointer-events:none;transform-origin:center center;transition:transform .05s'});
    wrap.appendChild(img); content.appendChild(wrap);
    let scale=1,ox=0,oy=0,drag=false,lx=0,ly=0;
    const clamp=()=>{ const mx=Math.max(0,(img.naturalWidth*scale-wrap.clientWidth)/2),my=Math.max(0,(img.naturalHeight*scale-wrap.clientHeight)/2); ox=Math.max(-mx,Math.min(mx,ox)); oy=Math.max(-my,Math.min(my,oy)); };
    const apply=()=>{ img.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`; };
    wrap.addEventListener('wheel',e=>{ e.preventDefault(); scale=Math.max(.5,Math.min(8,scale*(e.deltaY>0?.9:1.1))); clamp(); apply(); },{passive:false});
    wrap.addEventListener('mousedown',e=>{ drag=true; lx=e.clientX; ly=e.clientY; wrap.style.cursor='grabbing'; });
    window.addEventListener('mousemove',e=>{ if(!drag)return; ox+=e.clientX-lx; oy+=e.clientY-ly; lx=e.clientX; ly=e.clientY; clamp(); apply(); });
    window.addEventListener('mouseup',()=>{ drag=false; wrap.style.cursor='grab'; });
    wrap.addEventListener('dblclick',()=>{ scale=1; ox=0; oy=0; apply(); });
  };
  const openVideo=(src,filename)=>{
    content.innerHTML=''; overlay.style.display='flex'; overlay.setAttribute('tabindex','-1'); overlay.focus(); push();
    dlBtn.style.display='flex'; dlBtn.onclick=()=>downloadDataUrl(src,filename||'video');
    const wrap=el('div',{style:'width:100%;height:100%;display:flex;align-items:center;justify-content:center'});
    const video=el('video',{style:'max-width:100%;max-height:calc(100% - 40px);border-radius:10px;display:block;color-scheme:dark',controls:'',playsinline:''});
    wrap.appendChild(video); content.appendChild(wrap); video.src=src; video.load(); video.play().catch(()=>{});
  };
  return {openImage, openVideo, close};
})();

/* ════════════════════════════════════════════
   CARD HEADER BUILDER
   Consistent across all file types.
   [icon] [name · sub]  ···  [Download] [⋯]
   ════════════════════════════════════════════ */
function makeCardHeader({ iconSvg, name, sub, onHeaderClick, menuItems, onDownload, showChevron=false }) {
  const header = el('div', { cls: 'card-header' + (onHeaderClick ? ' clickable' : '') });
  if (onHeaderClick) header.onclick = onHeaderClick;

  const icon = el('div', { cls: 'card-icon', html: iconSvg });
  const meta = el('div', { cls: 'card-meta' });
  meta.appendChild(el('div', { cls: 'card-name', title: name }, fmtName(name, 28)));
  const subEl = el('div', { cls: 'card-sub' }, sub);
  meta.appendChild(subEl);
  header.appendChild(icon); header.appendChild(meta);

  // Chevron (text/md toggle indicator)
  let chevronEl = null;
  if (showChevron) {
    chevronEl = el('div', { cls: 'card-chevron', html: IC.chevR });
    header.appendChild(chevronEl);
  }

  // Right-side actions
  const actions = el('div', { cls: 'card-actions' });
  actions.appendChild(makeCardBtn(IC.dl, 'Download', onDownload));
  const moreBtn = makeCardBtn(IC.more, 'More options', e => {
    globalMenu.items = menuItems;
    globalMenu.open(moreBtn);
  });
  moreBtn.setAttribute('aria-haspopup','menu');
  actions.appendChild(moreBtn);
  header.appendChild(actions);

  return { header, subEl, chevronEl };
}

/* ── Image ── */
function makeCardImage(f) {
  const { dataUrl: src, file: { name, size } } = f;
  const wrap = el('div', { style:'width:100%' });
  const card = el('div', { cls:'card' });
  wrap.appendChild(card);

  const { header } = makeCardHeader({
    iconSvg: IC.image, name, sub: `IMAGE · ${fmtSize(size)}`,
    onDownload: () => downloadDataUrl(src, name),
    menuItems: [
      { label:'Download', icon:IC.dl,   action:()=>downloadDataUrl(src, name) },
      { label:'Open',     icon:IC.open, action:()=>lb.openImage(src, name, name) },
    ],
  });
  card.appendChild(header);

  // Body: image, always visible, click = lightbox
  const body = el('div', { cls:'card-body', style:'line-height:0;cursor:zoom-in' });
  const img = el('img', { src, alt:name, style:'display:block;width:100%;max-height:360px;object-fit:cover' });
  img.onclick = () => lb.openImage(src, name, name);

  // Hover toolbar over image body
  const imgWrap = el('div', { style:'position:relative;overflow:hidden' });
  const hoverBar = el('div', { style:'position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s;pointer-events:none' });
  hoverBar.appendChild(makeHoverBtn(IC.dl,   'Download', () => downloadDataUrl(src, name)));
  hoverBar.appendChild(makeHoverBtn(IC.open, 'Lightbox', () => lb.openImage(src, name, name)));
  imgWrap.appendChild(img); imgWrap.appendChild(hoverBar);
  imgWrap.onmouseenter=()=>{ hoverBar.style.opacity='1'; hoverBar.style.pointerEvents='auto'; };
  imgWrap.onmouseleave=()=>{ hoverBar.style.opacity='0'; hoverBar.style.pointerEvents='none'; };
  body.appendChild(imgWrap);
  card.appendChild(body);
  return wrap;
}

/* ── Video ── */
function makeCardVideo(f) {
  const { dataUrl: src, file: { name, size } } = f;
  const wrap = el('div', { style:'width:100%' });
  const card = el('div', { cls:'card' });

/* ── Audio ── */
function makeCardAudio(f) {
  const { dataUrl: src, file: { name, size } } = f;
  const wrap = el('div', { style:'width:100%' });
  const card = el('div', { cls:'card' });
  wrap.appendChild(card);

  const { header } = makeCardHeader({
    iconSvg: IC.audio, name, sub: `AUDIO · ${fmtSize(size)}`,
    onDownload: () => downloadDataUrl(src, name),
    menuItems: [
      { label:'Download', icon:IC.dl, action:()=>downloadDataUrl(src, name) },
    ],
  });
  card.appendChild(header);

  // Body: player controls, always visible
  const body = el('div', { cls:'card-body', style:'padding:12px 14px' });
  const audio = el('audio', { src }); audio.preload='metadata';

  const scrub = el('input', { style:'width:100%;height:4px;-webkit-appearance:none;appearance:none;border-radius:2px;background:var(--lb-scrub);outline:none;cursor:pointer;accent-color:var(--link)' });
  scrub.type='range'; scrub.min=0; scrub.max=100; scrub.value=0; scrub.step=.1;
  const curEl=el('span',{},'0:00'), durEl=el('span',{},'0:00');
  const timeRow=el('div',{style:'display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);font-family:monospace;margin-top:4px'},curEl,durEl);

  const mkABtn=(svg,label,sz=36,pri=false)=>{
    const b=el('button',{style:`width:${sz}px;height:${sz}px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;`+(pri?'background:var(--send-bg);fill:#fff':'background:var(--btn-hover);fill:var(--text-secondary)'),'aria-label':label,html:svg});
    b.onmouseenter=()=>b.style.background=pri?'var(--link)':'var(--border)';
    b.onmouseleave=()=>b.style.background=pri?'var(--send-bg)':'var(--btn-hover)';
    return b;
  };
  const backBtn=mkABtn(IC.back15,'Back 15s');
  const playBtn=mkABtn(IC.play,'Play/Pause',44,true);
  const fwdBtn=mkABtn(IC.fwd15,'Forward 15s');
  const ctrlRow=el('div',{style:'display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px'},backBtn,playBtn,fwdBtn);

  audio.addEventListener('loadedmetadata',()=>{ durEl.textContent=fmtTime(audio.duration); scrub.max=audio.duration; });
  audio.addEventListener('timeupdate',()=>{ curEl.textContent=fmtTime(audio.currentTime); scrub.value=audio.currentTime; });
  audio.addEventListener('play', ()=>{ playBtn.innerHTML=IC.pause; });
  audio.addEventListener('pause',()=>{ playBtn.innerHTML=IC.play; });
  audio.addEventListener('ended',()=>{ playBtn.innerHTML=IC.play; });
  scrub.addEventListener('input',()=>{ audio.currentTime=scrub.value; });
  playBtn.onclick=()=>audio.paused?audio.play():audio.pause();
  backBtn.onclick=()=>{ audio.currentTime=Math.max(0,audio.currentTime-15); };
  fwdBtn.onclick=()=>{ audio.currentTime=Math.min(audio.duration||0,audio.currentTime+15); };

  body.appendChild(scrub); body.appendChild(timeRow); body.appendChild(ctrlRow); body.appendChild(audio);
  card.appendChild(body);
  return wrap;
}

/* ── Text / Markdown ── */
function makeCardText(f) {
  const { dataUrl: rawText, file: { name, size } } = f;
  const isMd = /\.(md|markdown)$/i.test(name) || looksLikeMd(rawText);
  const typeLabel = isMd ? 'MARKDOWN' : 'TEXT';

  const wrap = el('div', { style:'width:100%' });
  const card = el('div', { cls:'card' });
  wrap.appendChild(card);

  let expanded = false;

  const menuItems = [
    { label:'Copy',     icon:IC.copy, action:()=>{ navigator.clipboard.writeText(rawText); showToast('✓ Copied'); } },
    ...(isMd ? [{ label:'Copy as HTML', icon:IC.html, action:()=>{ navigator.clipboard.writeText(sanitize(marked.parse(rawText))); showToast('✓ HTML copied'); } }] : []),
    { divider:true },
    { label:'Download', icon:IC.dl, action:()=>{ const b=new Blob([rawText],{type:'text/plain'}); downloadDataUrl(URL.createObjectURL(b),name); } },
  ];

  const toggle = () => {
    expanded = !expanded;
    body.style.display = expanded ? 'block' : 'none';
    chevronEl.innerHTML = expanded ? IC.chevD : IC.chevR;
    subEl.textContent = `${typeLabel} · ${fmtSize(size)}${expanded ? ' · expanded' : ''}`;
  };

  const { header, subEl, chevronEl } = makeCardHeader({
    iconSvg: IC.text, name,
    sub: `${typeLabel} · ${fmtSize(size)}`,
    onHeaderClick: toggle,
    showChevron: true,
    onDownload: () => { const b=new Blob([rawText],{type:'text/plain'}); downloadDataUrl(URL.createObjectURL(b),name); },
    menuItems,
  });
  card.appendChild(header);

  // Body: full render, hidden by default
  const body = el('div', { cls:'card-body', style:'display:none' });
  const content = el('div', { cls:'md', style:'padding:14px 16px;font-size:13px;line-height:1.6;max-height:520px;overflow-y:auto;word-break:break-word', html:renderMd(rawText) });
  body.appendChild(content);
  card.appendChild(body);
  return wrap;
}

/* ── PDF ── */
function makeCardPdf(f) {
  const { dataUrl: src, file: { name, size } } = f;
  const wrap = el('div', { style:'width:100%' });
  const card = el('div', { cls:'card' });
  wrap.appendChild(card);

  const { header } = makeCardHeader({
    iconSvg: IC.pdf, name, sub: `PDF · ${fmtSize(size)} · click to open`,
    onHeaderClick: () => window.open(src, '_blank'),
    onDownload: () => downloadDataUrl(src, name),
    menuItems: [
      { label:'Download', icon:IC.dl,   action:()=>downloadDataUrl(src, name) },
      { label:'Open',     icon:IC.open, action:()=>window.open(src, '_blank') },
    ],
  });
  card.appendChild(header);
  // No body.
  return wrap;
}

/* ── Unknown ── */
function makeCardUnknown(f) {
  const { dataUrl: src, file: { name, size, type } } = f;
  const wrap = el('div', { style:'width:100%' });
  const card = el('div', { cls:'card' });
  wrap.appendChild(card);

  const { header } = makeCardHeader({
    iconSvg: IC.file, name, sub: `${(type||'FILE').toUpperCase()} · ${fmtSize(size)} · click to open`,
    onHeaderClick: () => src && window.open(src, '_blank'),
    onDownload: () => src && downloadDataUrl(src, name),
    menuItems: [
      { label:'Download', icon:IC.dl,   action:()=>src&&downloadDataUrl(src, name) },
      { label:'Open',     icon:IC.open, action:()=>src&&window.open(src, '_blank') },
    ],
  });
  card.appendChild(header);
  // No body.
  return wrap;
}

/* ── Dispatcher ── */
const FILE_CARD_MAKERS = { image:makeCardImage, video:makeCardVideo, audio:makeCardAudio, text:makeCardText, pdf:makeCardPdf };
const makeFileCard = f => (FILE_CARD_MAKERS[f.type] || makeCardUnknown)(f);

/* ── Image grid (2-col for multiple images) ── */
function makeImageGrid(imgs) {
  if (imgs.length===1) return makeCardImage(imgs[0]);
  const cols = Math.min(imgs.length, 2);
  const grid = el('div', { style:`display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px` });
  imgs.forEach(f => {
    const { dataUrl:src, file:{name} } = f;
    const cell = el('div', { style:'position:relative;border-radius:10px;overflow:hidden;line-height:0' });
    const img  = el('img', { src, alt:name, style:'display:block;width:100%;height:180px;object-fit:cover;cursor:zoom-in' });
    img.onclick = () => lb.openImage(src, name, name);
    const bar = el('div', { style:'position:absolute;bottom:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;pointer-events:none' });
    bar.appendChild(makeHoverBtn(IC.dl,   'Download', ()=>downloadDataUrl(src, name)));
    bar.appendChild(makeHoverBtn(IC.open, 'Lightbox', ()=>lb.openImage(src, name, name)));
    cell.appendChild(img); cell.appendChild(bar);
    cell.onmouseenter=()=>{ bar.style.opacity='1'; bar.style.pointerEvents='auto'; };
    cell.onmouseleave=()=>{ bar.style.opacity='0'; bar.style.pointerEvents='none'; };
    grid.appendChild(cell);
  });
  return grid;
}

/* ════════════════════════════════════════════
   FILE CHIP FACTORY
   ════════════════════════════════════════════ */
function makeFileChip(f, onRemove) {
  const name = f.file?.name || 'File';
  const chip = el('div', { cls:'chip' });
  if (f.type==='image'&&f.dataUrl) chip.appendChild(el('img',{cls:'chip-thumb-img',src:f.dataUrl,alt:''}));
  else { const ti=el('div',{cls:'chip-thumb-icon',html:IC[f.type]||IC.file}); chip.appendChild(ti); }
  const meta=el('div',{cls:'chip-meta'});
  meta.appendChild(el('b',{cls:'chip-name',title:name},fmtName(name,14)));
  meta.appendChild(el('small',{cls:'chip-size'},fmtSize(f.file?.size||0)));
  chip.appendChild(meta);
  const rm=el('button',{cls:'chip-remove','aria-label':`Remove ${name}`});
  rm.innerHTML='<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';
  rm.onclick=e=>{ e.stopPropagation(); onRemove(f.id); };
  chip.appendChild(rm);
  return chip;
}

/* ════════════════════════════════════════════
   MESSAGE FACTORIES
   ════════════════════════════════════════════ */
const makeAvatar = variant => {
  const av = el('div', { cls:`avatar ${variant}` });

  return av;
};

function makeUserMsg({ text, files }) {
  const host = document.createElement('div');

  shadow.appendChild(el('div',{cls:'msg-header'},makeAvatar('user'),el('span',{cls:'msg-name'},'You')));

function makeAssistantMsg() {
  const host = document.createElement('div');
  const shadow = host.attachShadow({ mode:'open' });
  adoptSheet(shadow);

  shadow.appendChild(el('div',{cls:'msg-header'},makeAvatar('asst'),el('span',{cls:'msg-name'},'Chat')));
  const body=el('div',{cls:'msg-body'});
  const contentEl=el('div',{cls:'md'});
  body.appendChild(contentEl); shadow.appendChild(body);
  const ar=el('div',{cls:'action-row',style:'display:none'}); shadow.appendChild(ar);

  let _text='';
  host.setText = v => { _text=v; contentEl.innerHTML=sanitize(marked.parse(v||'')); };
  host.getText = () => _text;

  host.finalize = () => {
    ar.style.display='flex';
    const copyBtn=makeIconBtn(IC.copy,'Copy',()=>{ navigator.clipboard.writeText(_text||''); showToast('✓ Copied'); });
    const regenBtn=makeIconBtn(IC.regen,'Regenerate',()=>{
      const last=convHistory.slice().reverse().find(h=>h.role==='user');
      if(!last){showToast('Nothing to regenerate');return;}
      const all=[...chat.children],idx=all.indexOf(host);
      if(idx>-1) all.slice(idx).forEach(n=>n.remove());
      convHistory.splice(convHistory.lastIndexOf(last)+1);
      chatInput.setGenerating(false);
      chatInput.dispatchEvent(new CustomEvent('chat:send',{detail:{text:last.content,files:last.files||[]},bubbles:true,composed:true}));
    });
    const upBtn=makeIconBtn(IC.up,'Good response',()=>{
      const was=upBtn.classList.contains('active-up');
      upBtn.classList.toggle('active-up',!was); dnBtn.classList.remove('active-dn');
      showToast(was?'Rating removed':'👍 Thanks!');
    });
    const dnBtn=makeIconBtn(IC.down,'Bad response',()=>{
      const was=dnBtn.classList.contains('active-dn');
      dnBtn.classList.toggle('active-dn',!was); upBtn.classList.remove('active-up');
      showToast(was?'Rating removed':'👎 Noted');
    });
    const moreBtn=makeIconBtn(IC.more,'More options',e=>{
      globalMenu.items=[
        {label:'Copy',          icon:IC.copy,  action:()=>{ navigator.clipboard.writeText(_text||''); showToast('✓ Copied'); }},
        {label:'Regenerate',    icon:IC.regen, action:()=>regenBtn.onclick()},
        {divider:true},
        {label:'Good response', icon:IC.up,    action:()=>upBtn.onclick()},
        {label:'Bad response',  icon:IC.down,  action:()=>dnBtn.onclick()},
      ];
      globalMenu.open(moreBtn);
    });
    moreBtn.setAttribute('aria-haspopup','menu');
    [copyBtn,regenBtn,upBtn,dnBtn,moreBtn].forEach(b=>ar.appendChild(b));
    const sr=el('div',{style:'position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)'});
    sr.setAttribute('aria-live','polite'); sr.setAttribute('aria-atomic','true');
    sr.textContent=_text; document.body.appendChild(sr); setTimeout(()=>sr.remove(),2000);
  };
  return host;
}

/* ════════════════════════════════════════════
   PENDING FILES STATE
   ════════════════════════════════════════════ */
let pendingFiles=[], chipListeners=[];
const onChipsChange=fn=>{ chipListeners.push(fn); return ()=>{ chipListeners=chipListeners.filter(f=>f!==fn); }; };
const notifyChips=()=>chipListeners.forEach(fn=>fn([...pendingFiles]));
const addFiles=async files=>{
  for(const f of files){
    const type=fileType(f);
    const dataUrl=(['image','video','audio','pdf'].includes(type))?await readAsDataURL(f):await f.text().catch(()=>null);
    pendingFiles.push({file:f,dataUrl,type,id:Math.random().toString(36).slice(2)});
  }
  notifyChips();
};
const restoreFiles=snap=>{ pendingFiles=snap.map(s=>({...s,id:Math.random().toString(36).slice(2)})); notifyChips(); };
const removeFile=id=>{ pendingFiles=pendingFiles.filter(f=>f.id!==id); notifyChips(); };
const clearFiles=()=>{ pendingFiles=[]; notifyChips(); };

/* ════════════════════════════════════════════
   CHAT INPUT
   ════════════════════════════════════════════ */
class ChatInput extends HTMLElement {
  constructor(){ super(); this.attachShadow({mode:'open'}); adoptSheet(this.shadowRoot); }
  connectedCallback(){ this._render(); this._setup(); this._unsub=onChipsChange(f=>this._renderChips(f)); requestAnimationFrame(()=>this._box()?.focus()); }
  disconnectedCallback(){ this._unsub?.(); }
  _box(){ return this.shadowRoot.getElementById('box'); }
  _sendBtn(){ return this.shadowRoot.getElementById('send'); }
  _render(){
    const s=document.createElement('style');
    s.textContent=`
      .plate{background:var(--bg-input);border-radius:28px;padding:4px 8px 6px;border:1px solid transparent;transition:background .2s,box-shadow .2s}
      .plate:focus-within{background:var(--input-focus-bg);box-shadow:var(--input-focus-shadow)}
      #chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 8px 0}
      #chips:empty{display:none}
      textarea{width:100%;border:none;background:none;outline:none;padding:12px 4px 6px 12px;font-size:16px;font-family:${FONT};line-height:24px;resize:none;field-sizing:content;min-height:44px;max-height:200px;overflow-y:auto;color:var(--text)}
      textarea::placeholder{color:var(--text-muted)}
      textarea:disabled{opacity:.5;cursor:not-allowed}
      .bar{display:flex;justify-content:space-between;align-items:center}
      .ibtn{background:none;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;fill:var(--text-secondary);transition:background .15s}
      .ibtn:hover{background:var(--btn-hover)}.ibtn:focus-visible{outline:2px solid var(--link);outline-offset:2px;border-radius:50%}
      #send{background:var(--send-bg);fill:white;display:none;width:36px;height:36px;border-radius:50%}
      #send.visible{display:flex}#send:active{transform:scale(.92)}
      #stop{background:var(--stop-bg);fill:var(--stop-icon);display:none;width:36px;height:36px;border-radius:50%}
      #stop.visible{display:flex}
      svg{width:22px;height:22px}
    `;
    this.shadowRoot.appendChild(s);
    const plate=el('div',{cls:'plate'});
    const chips=el('div',{id:'chips'});
    const box=el('textarea',{id:'box',placeholder:'Ask anything',rows:'1','aria-label':'Message input','aria-multiline':'true'});
    const plus=el('button',{cls:'ibtn',id:'plus','aria-label':'Attach file',html:IC.plus});
    const send=el('button',{cls:'ibtn',id:'send','aria-label':'Send',title:'Send (Enter)',html:IC.send});
    const stop=el('button',{cls:'ibtn',id:'stop','aria-label':'Stop',title:'Stop (Esc)',html:IC.stop});
    const bar=el('div',{cls:'bar'},plus,el('div',{style:'display:flex;gap:2px;align-items:center'},send,stop));
    plate.appendChild(chips); plate.appendChild(box); plate.appendChild(bar);
    this.shadowRoot.appendChild(plate);
  }
  _renderChips(files){
    const chips=this.shadowRoot.getElementById('chips');
    chips.innerHTML='';
    files.forEach(f=>chips.appendChild(makeFileChip(f,id=>removeFile(id))));
    this._updateSend();
  }
  _updateSend(){
    const s=this._sendBtn();
    if(s) s.classList.toggle('visible',(this._box()?.value.trim().length>0||pendingFiles.length>0)&&!this._generating);
  }
  setGenerating(v){
    this._generating=v;
    const box=this._box(),send=this._sendBtn(),stop=this.shadowRoot.getElementById('stop');
    if(box) box.disabled=v; if(send) send.classList.toggle('visible',!v); if(stop) stop.classList.toggle('visible',v);
    if(!v) this._updateSend();
  }
  setValue(text){
    const box=this._box(); if(!box) return;
    box.value=text; box.disabled=false; this._autoResize(); this._updateSend();
    box.focus(); box.setSelectionRange(text.length,text.length);
  }
  _autoResize(){
    const box=this._box(); if(!box) return;
    if(!CSS.supports('field-sizing','content')){ box.style.height='auto'; box.style.height=Math.min(box.scrollHeight,200)+'px'; }
  }
  _dispatch(){
    const box=this._box(),text=box?.value.trim();
    if(!text&&pendingFiles.length===0) return;
    const snap=[...pendingFiles]; inputRecall.idx=-1;
    this.dispatchEvent(new CustomEvent('chat:send',{detail:{text,files:snap},bubbles:true,composed:true}));
    box.value=''; if(!CSS.supports('field-sizing','content')) box.style.height='';
    clearFiles(); this._updateSend(); this.setGenerating(true);
  }
  _setup(){
    const box=this._box(),stop=this.shadowRoot.getElementById('stop'),plus=this.shadowRoot.getElementById('plus');
    box.addEventListener('input',()=>{ this._autoResize(); this._updateSend(); });
    box.addEventListener('paste',async e=>{ const imgs=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/')); if(imgs.length){e.preventDefault();await addFiles(imgs.map(i=>i.getAsFile()).filter(Boolean));this._updateSend();} });
    const plate=this.shadowRoot.querySelector('.plate');
    plate.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='copy'; });
    plate.addEventListener('drop',async e=>{ e.preventDefault(); const f=[...e.dataTransfer.files]; if(f.length){await addFiles(f);this._updateSend();} });
    this._sendBtn().onclick=()=>this._dispatch();
    stop.onclick=()=>this.dispatchEvent(new CustomEvent('chat:stop',{bubbles:true,composed:true}));
    plus.onclick=e=>{ e.stopPropagation();
      globalMenu.items=[
        {label:'Upload from computer',icon:'<svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>',action:()=>document.getElementById('fileInput').click()},
        {divider:true},
        {label:'Commands',kbd:'/',icon:'<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>',action:()=>palette.open()},
      ];
      globalMenu.open(plus);
    };
    box.onkeydown=e=>{
      if(e.key==='/'&&box.value===''&&!e.ctrlKey&&!e.metaKey){e.preventDefault();palette.open();return;}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this._dispatch();return;}
      if(e.key==='Escape'){if(globalMenu.hasAttribute('open')){globalMenu.close();return;}if(box.value){box.value='';this._autoResize();this._updateSend();showToast('Input cleared');}return;}
      if(e.key==='ArrowUp'&&box.value===''&&inputHistory.length){e.preventDefault();if(inputRecall.idx===-1){inputRecall.draft=box.value;inputRecall.idx=inputHistory.length-1;}else if(inputRecall.idx>0)inputRecall.idx--;box.value=inputHistory[inputRecall.idx];this._autoResize();this._updateSend();box.setSelectionRange(box.value.length,box.value.length);return;}
      if(e.key==='ArrowDown'&&inputRecall.idx!==-1){e.preventDefault();if(inputRecall.idx<inputHistory.length-1){inputRecall.idx++;box.value=inputHistory[inputRecall.idx];}else{inputRecall.idx=-1;box.value=inputRecall.draft;}this._autoResize();this._updateSend();box.setSelectionRange(box.value.length,box.value.length);return;}
    };
  }
}
customElements.define('chat-input', ChatInput);

/* File input */
const fileInput=el('input',{id:'fileInput',type:'file',style:'display:none',multiple:'',accept:'image/*,video/*,audio/*,.pdf,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css'});
document.body.appendChild(fileInput);
fileInput.onchange=async e=>{ await addFiles([...e.target.files]); e.target.value=''; };

/* ════════════════════════════════════════════
   CONVERSATION + ROUTING
   ════════════════════════════════════════════ */
const convHistory=[], inputHistory=[], inputRecall={idx:-1,draft:''};
const pushHistory=(role,content,files=null)=>{ const e={role,content}; if(files?.length)e.files=files; convHistory.push(e); };

let _scrollRaf=null;
const scrollBottom=()=>{ if(_scrollRaf)return; _scrollRaf=requestAnimationFrame(()=>{ chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'}); _scrollRaf=null; }); };

function focusInput(){ document.querySelector('chat-input')?.shadowRoot?.getElementById('box')?.focus(); }
function copyLastResponse(){
  const all=[...document.querySelectorAll('#chatContainer > div')].filter(n=>n.shadowRoot?.querySelector('.avatar.asst'));
  if(!all.length){showToast('Nothing to copy');return;}
  navigator.clipboard.writeText(all[all.length-1].getText?.()||'').then(()=>showToast('✓ Copied'));
}
function clearConversation(){ chat.innerHTML=''; convHistory.length=0; inputHistory.length=0; inputRecall.idx=-1; showToast('Conversation cleared'); }

document.addEventListener('keydown',e=>{
  const box=document.querySelector('chat-input')?.shadowRoot?.getElementById('box');
  const inInput=box&&(document.activeElement===box||document.activeElement?.shadowRoot?.contains(box));
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='/')) {e.preventDefault();palette.open();return;}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='O')    {e.preventDefault();clearConversation();return;}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='C')    {e.preventDefault();copyLastResponse();return;}
  if(e.key==='?'&&!inInput&&!e.ctrlKey&&!e.metaKey)      {showToast('Ctrl+K=commands · ↑=recall · Esc=clear · /=palette',4000);return;}
  if(e.key==='Escape'&&palette.hasAttribute('open'))      {palette.close();focusInput();return;}
  if(!inInput&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1&&!palette.hasAttribute('open')) box?.focus();
});

document.getElementById('chatContainer').addEventListener('chat:edit',e=>{
  const{el:msgEl,text,files}=e.detail;
  const all=[...chat.children],idx=all.indexOf(msgEl);
  all.slice(idx).forEach(n=>n.remove()); convHistory.splice(idx); inputRecall.idx=-1;
  chatInput.setGenerating(false); chatInput.setValue(text||'');
  if(files?.length) restoreFiles(files);
});

/* ════════════════════════════════════════════
   CHAT SEND / STOP
   ════════════════════════════════════════════ */
const chat=document.getElementById('chatContainer');
const chatInput=document.getElementById('chatInput');

const stubForFiles=files=>{
  if(!files?.length) return null;
  const counts={}; files.forEach(f=>counts[f.type]=(counts[f.type]||0)+1);
  return `I can see you've shared ${Object.entries(counts).map(([t,n])=>`${n} ${t}${n>1?'s':''}`).join(', ')}.\n\n- **Describe or summarise** the content\n- **Answer questions** about it\n- **Extract** key information\n\nWhat would you like?`;
};
const stubs=[
  "That's a great question. A few things worth considering:\n\n- **Context** always matters — the same answer can be right or wrong depending on the situation\n- **Trade-offs** between approaches vary significantly by scale and team\n- **Iteration** is almost always the safest path forward\n\n> *\"Perfection is the enemy of good\"* — Voltaire\n\nWant me to go deeper on any of these?",
  "Sure! Here's a quick Python example:\n\n```python\ndef greet(name: str) -> str:\n    return f\"Hello, {name}!\"\n\nprint(greet(\"world\"))  # Hello, world!\n```\n\nThis is a stub — in production this would stream from the real API.",
  "Here's a summary:\n\n| Approach | Pros | Cons |\n|---|---|---|\n| Option A | Fast, simple | Less flexible |\n| Option B | Scalable | More complex |\n| Option C | Best of both | Higher cost |\n\nI'd lean toward **Option B** for most cases. What's your priority?",
  "Interesting — a few angles:\n\n1. The **technical** perspective: largely solved, bottleneck is usually organisational\n2. The **product** angle: users care about outcomes, not implementation\n3. The **long-term** view: defaults compound, so choose carefully\n\nHappy to drill into any of these.",
];
let stubIdx=0,_generating=false,_stopRequested=false,_abortCtrl=null;

chatInput.addEventListener('chat:send',async e=>{
  const{text,files}=e.detail;
  if(text) inputHistory.push(text); inputRecall.idx=-1;
  pushHistory('user',text,files);
  chat.appendChild(makeUserMsg({text,files}));
  const dots=el('div',{cls:'typing',role:'status','aria-label':'Generating'});
  dots.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(dots); scrollBottom();
  _stopRequested=false; _generating=true; _abortCtrl=new AbortController();
  await new Promise(r=>setTimeout(r,600+Math.random()*400));
  dots.remove();
  if(_stopRequested){_generating=false;chatInput.setGenerating(false);scrollBottom();showToast('Stopped');return;}
  const aMsg=makeAssistantMsg();
  const reply=stubForFiles(files)||stubs[stubIdx++%stubs.length];
  chat.appendChild(aMsg); scrollBottom();
  for(let i=0;i<reply.length;i++){if(_stopRequested)break;aMsg.setText(reply.slice(0,i+1));scrollBottom();await new Promise(r=>setTimeout(r,8));}
  if(!_stopRequested){aMsg.setText(reply);pushHistory('assistant',reply);}
  aMsg.finalize(); _generating=false; chatInput.setGenerating(false); scrollBottom();
});

chatInput.addEventListener('chat:stop',()=>{ if(_generating){_stopRequested=true;_abortCtrl?.abort();showToast('⏹ Stopping…');} });

new ResizeObserver(([entry])=>{ chat.style.paddingBottom=`${entry.contentRect.height+16}px`; }).observe(document.querySelector('.footer'));

/* ════════════════════════════════════════════
   GREETING
   ════════════════════════════════════════════ */
const greeting=makeAssistantMsg();
chat.appendChild(greeting);
requestAnimationFrame(()=>{
  greeting.setText(`Hi! Here's the consistent card model now in place:\n\n**Every card header:** \`[icon] [name · type · size] ··· [⬇] [⋯]\`\n\nHeader is always the single click target — opens/toggles, never duplicated elsewhere.\n\n**Per type:**\n- 🖼 **Image** — body always visible (image itself), hover toolbar overlaid. Header: Download + ⋯ (Download, Open)\n- 🎬 **Video** — body always visible (poster → inline player). Header: Download + ⋯ (Download, Open)\n- 🎵 **Audio** — body always visible (scrubber + controls). Header: Download + ⋯ (Download)\n- 📄 **Text/MD** — no preview. Header click toggles body on/off, chevron indicates state. ⋯ menu: Copy, Copy as HTML (MD only), Download\n- 📋 **PDF** — header only, click opens new tab. Header: Download + ⋯ (Download, Open)\n- 📁 **Unknown** — header only, click attempts open. Header: Download + ⋯ (Download, Open)\n\nTry attaching different file types.`);
  greeting.finalize();
});
</script>
