<html lang="en">
<head>

<style>
:root {
  --bg:#fff;--bg-input:#f0f4f9;--bg-code:#f1f3f4;--bg-th:#f8f9fa;
  --bg-chip:#fff;--bg-chip-icon:#f1f3f4;--surface:#fff;
  --border:#e2e6ea;--border-table:#dadce0;
  --text:#1f1f1f;--text-secondary:#5f6368;--text-muted:#9aa0a6;
  --av-me:#e8eaed;--av-you:#e9eef4;--av-icon-me:#5f6368;--av-icon-you:#1a73e8;
  --link:#1a73e8;--blockquote:#dadce0;--scrollbar:#cbd0d4;--dot:#9aa0a6;--hint:#5f6368;
  --btn-hover:rgba(0,0,0,.05);--menu-bg:#fff;--menu-hover:#f1f3f4;
  --kbd-bg:#f1f3f4;--send-bg:#0b57d0;--stop-bg:#e8eaed;--stop-icon:#444;

  --lb-text:#1f1f1f;--lb-scrub:#e2e6ea;
  --highlight:rgba(255,213,0,.35);
}
:root[data-theme="dark"] {
  --bg:#1e1e1e;--bg-input:#2a2a2a;--bg-code:#2d2d2d;--bg-th:#2d2d2d;
  --bg-chip:#2d2d2d;--bg-chip-icon:#383838;--surface:#2a2a2a;
  --border:#3c3c3c;--border-table:#444;
  --text:#e8eaed;--text-secondary:#9aa0a6;--text-muted:#6e7479;
  --av-me:#3c3c3c;--av-you:#1a3557;--av-icon-me:#9aa0a6;--av-icon-you:#7baaf7;
  --link:#7baaf7;--blockquote:#444;--scrollbar:#444;--dot:#6e7479;--hint:#6e7479;
  --btn-hover:rgba(255,255,255,.08);--menu-bg:#2a2a2a;--menu-hover:#333;
  --kbd-bg:#333;--send-bg:#1a73e8;--stop-bg:#333;--stop-icon:#c4c7cb;

  --footer-border:rgba(255,255,255,.08);--card-bg:#252525;--card-border:#3c3c3c;
  --lb-bg:rgba(18,18,18,.97);--lb-ctrl:rgba(255,255,255,.08);--lb-ctrl-hover:rgba(255,255,255,.15);
  --lb-text:#e8eaed;--lb-scrub:#3c3c3c;
  --highlight:rgba(255,213,0,.2);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Google Sans',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;transition:background .2s,color .2s}
.app{display:flex;flex-direction:column;width:100%;max-width:960px;height:100%}
.chat{flex:1;overflow-y:auto;padding:12px max(24px,env(safe-area-inset-right)) 12px max(24px,env(safe-area-inset-left));display:flex;flex-direction:column;gap:24px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:8px}
.footer{padding:10px max(16px,env(safe-area-inset-right)) max(10px,calc(env(safe-area-inset-bottom)+6px)) max(16px,env(safe-area-inset-left));background:var(--bg);border-top:1px solid var(--footer-border)}
.footer-inner{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:4px}
.hint-bar{display:flex;gap:16px;opacity:.5;font-size:11px;color:var(--hint);user-select:none;padding:2px 4px}
.hint-bar kbd{background:var(--kbd-bg);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:10px;color:var(--text)}
.typing{padding-left:44px;display:flex;gap:4px;align-items:center;height:28px}
.dot{width:6px;height:6px;background:var(--dot);border-radius:50%;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,60%,100%{transform:scale(.6);opacity:.4}30%{transform:scale(1);opacity:1}}
.load-more{display:flex;justify-content:center;padding:4px 0}
.load-more button{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 18px;font-size:12px;font-family:'Google Sans',system-ui,sans-serif;color:var(--text-secondary);cursor:pointer;transition:background .15s}
.load-more button:hover{background:var(--btn-hover)}
.day-divider{display:flex;align-items:center;gap:10px;padding:4px 0}
.day-divider span{font-size:11px;color:var(--text-muted);white-space:nowrap}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.highlight-msg{animation:flashhl 1.8s ease}
@keyframes flashhl{0%,100%{background:transparent}20%{background:var(--highlight)}}
.toast{position:fixed;bottom:max(80px,calc(env(safe-area-inset-bottom)+80px));left:50%;transform:translateX(-50%);background:rgba(32,33,36,.95);color:#fff;padding:8px 18px;border-radius:40px;font-size:14px;font-weight:500;opacity:0;transition:.2s;pointer-events:none;z-index:3000;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="chat" id="chatEl" role="log" aria-live="off"></div>
  <div class="footer">
    <div class="footer-inner">
      <chat-input id="chatInput"></chat-input>
      <div class="hint-bar">
        <span><kbd>Enter</kbd> send</span>
        <span><kbd>Shift+Enter</kbd> newline</span>
        <span><kbd>↑</kbd> recall</span>
        <span><kbd>Ctrl+K</kbd> search</span>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>

let _db = null;
const openDB = () => new Promise((res,rej) => {
  const req = indexedDB.open(DB_NAME, DB_VER);
  req.onupgradeneeded = e => {
    const db = e.target.result;
    if(!db.objectStoreNames.contains('messages')) {
      const ms = db.createObjectStore('messages',{keyPath:'timestamp'});
      ms.createIndex('sender','sender',{unique:false});
    }
    if(!db.objectStoreNames.contains('files')) db.createObjectStore('files',{keyPath:'id'});
    if(!db.objectStoreNames.contains('settings')) db.createObjectStore('settings',{keyPath:'key'});
  };
  req.onsuccess = e => { _db=e.target.result; res(_db); };
  req.onerror = e => rej(e.target.error);
});

const dbTx = (stores,mode='readonly') => {
  const tx = _db.transaction(stores,mode);
  const get = store => tx.objectStore(store);
  const wrap = req => new Promise((res,rej)=>{ req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error); });
  return {get, wrap, tx};
};

const DB = {
  /* messages */
  async addMessage(msg) {
    const {tx,get,wrap} = dbTx(['messages'],'readwrite');
    await wrap(get('messages').put(msg));
  },
  async getMessages(lower,upper) {
    const {get,wrap} = dbTx(['messages']);
    const range = lower!=null&&upper!=null ? IDBKeyRange.bound(lower,upper)
                : lower!=null ? IDBKeyRange.lowerBound(lower)
                : upper!=null ? IDBKeyRange.upperBound(upper) : undefined;
    return wrap(get('messages').getAll(range));
  },
  async getAllMessages() { const {get,wrap}=dbTx(['messages']); return wrap(get('messages').getAll()); },
  async deleteMessage(ts) { const {get,wrap}=dbTx(['messages'],'readwrite'); await wrap(get('messages').delete(ts)); },
  async clearMessages() { const {get,wrap}=dbTx(['messages'],'readwrite'); await wrap(get('messages').clear()); },

  /* files */
  async addFile(id,blob) { const {get,wrap}=dbTx(['files'],'readwrite'); await wrap(get('files').put({id,blob})); },
  async getFile(id) { const {get,wrap}=dbTx(['files']); const r=await wrap(get('files').get(id)); return r?.blob||null; },
  async deleteFiles(ids) {
    const {get,wrap,tx}=dbTx(['files'],'readwrite');

/* ════════════════════════════════════════════
   7. DATE PARSER
   ════════════════════════════════════════════ */
function parseDateExpr(expr) {
  const s = expr.trim().toLowerCase();
  const now = Date.now();
  if(s==='now') return now;
  if(s==='today') { const d=new Date();d.setHours(0,0,0,0);return d.getTime(); }
  if(s==='yesterday') { const d=new Date();d.setDate(d.getDate()-1);d.setHours(0,0,0,0);return d.getTime(); }
  if(s==='this week') { const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d.getTime(); }
  if(s==='this month') { const d=new Date();d.setDate(1);d.setHours(0,0,0,0);return d.getTime(); }
  // relative: 2h, 30m, 7d
  const rel = s.match(/^(\d+)(m|h|d)$/);
  if(rel) { const n=+rel[1],u=rel[2]; return now-(u==='m'?n*60000:u==='h'?n*3600000:n*86400000); }
  // ISO date
  const iso = new Date(expr);
  if(!isNaN(iso)) return iso.getTime();
  return null;
}

/* ════════════════════════════════════════════
   8. CONVERSATION GROUPING (gap-based, in-memory)
   ════════════════════════════════════════════ */
function groupByGap(messages, gapMs) {
  const groups = [];
  let cur = [];
  for(const m of messages) {
    if(cur.length && m.timestamp - cur[cur.length-1].timestamp > gapMs) {
      groups.push(cur); cur=[];
    }
    cur.push(m);
  }
  if(cur.length) groups.push(cur);
  return groups;
}
function findBlockContaining(messages, timestamp, gapMs) {
  const groups = groupByGap(messages, gapMs);
  return groups.find(g => g.some(m=>m.timestamp===timestamp)) || null;
}

/* ════════════════════════════════════════════
   9. SEARCH ENGINE
   ════════════════════════════════════════════ */
function searchMessages(messages, query) {
  const q = query.toLowerCase().trim();
  if(!q) return [];
  const words = q.split(/\s+/);

  const score = msg => {
    const haystack = [
      msg.text||'',
      ...(msg.files||[]).map(f=>f.name)
    ].join(' ').toLowerCase();
    if(haystack.includes(q)) return 2;          // exact
    if(words.every(w=>haystack.includes(w))) return 1; // all words
    return 0;
  };

  return messages
    .map(m=>({msg:m, score:score(m)}))
    .filter(x=>x.score>0)
    .sort((a,b)=> b.score-a.score || b.msg.timestamp-a.msg.timestamp)
    .map(x=>x.msg);
}

function excerpt(text, query, len=80) {
  if(!text) return '';
  const i = text.toLowerCase().indexOf(query.toLowerCase());
  if(i<0) return text.slice(0,len)+(text.length>len?'…':'');
  const start = Math.max(0,i-20);
  const end = Math.min(text.length,start+len);
  return (start>0?'…':'')+text.slice(start,end)+(end<text.length?'…':'');
}

/* ════════════════════════════════════════════
   10. EXPORT / IMPORT  (fflate)
   ════════════════════════════════════════════ */
async function doExport() {
  showToast('⏳ Preparing export…');
  const [messages, fileEntries, settingsArr] = await Promise.all([
    DB.getAllMessages(), DB.getAllFileEntries(), DB.getAllSettings()
  ]);
  const enc = new TextEncoder();
  const zipInput = {
    'messages.json': enc.encode(JSON.stringify(messages,null,2)),
    'settings.json': enc.encode(JSON.stringify(settingsArr,null,2)),
  };
  for(const {id,blob} of fileEntries) {
    const ext = (() => {
      // find original name from messages
      for(const m of messages) {
        const f = (m.files||[]).find(f=>f.id===id);
        if(f) return extOf(f.name);
      }
      return '';
    })();
    zipInput[`files/${id}${ext}`] = new Uint8Array(await blobToArrayBuffer(blob));
  }
  const zipped = fflate.zipSync(zipInput, {level:6});
  downloadBlob(new Blob([zipped],{type:'application/zip'}), `chat-export-${Date.now()}.zip`);
  showToast('✓ Export downloaded');
}

async function doImport(zipBlob, mode) {
  showToast('⏳ Importing…');
  const buf = await blobToArrayBuffer(zipBlob);
  const unzipped = fflate.unzipSync(new Uint8Array(buf));
  const dec = new TextDecoder();

  const messages = JSON.parse(dec.decode(unzipped['messages.json']||new Uint8Array()));
  const settingsArr = JSON.parse(dec.decode(unzipped['settings.json']||new Uint8Array('[]')));

  // collect file blobs from zip
  const fileBlobMap = {};
  for(const [path, data] of Object.entries(unzipped)) {
    if(path.startsWith('files/')) {
      const id = path.slice(6).replace(/\.[^.]+$/,'');
      fileBlobMap[id] = new Blob([data]);
    }
  }

  if(mode==='replace') { await DB.clearMessages(); await DB.clearFiles(); await DB.clearSettings(); }

  for(const m of messages) {
    try { await DB.addMessage(m); } catch(e) { /* skip duplicate timestamps on merge */ }
  }
  for(const {key,value} of settingsArr) await DB.setSetting(key,value);
  for(const [id,blob] of Object.entries(fileBlobMap)) {
    try { await DB.addFile(id,blob); } catch(e) {}
  }
  await loadSettings();
  showToast(`✓ Import complete (${messages.length} messages)`);
  await chatView.loadLive();
}

function makeCardHeader({iconSvg,name,sub,onHeaderClick,menuItems,onDownload,showChevron=false}) {
  const header=el('div',{cls:'card-header'+(onHeaderClick?' clickable':'')});
  if(onHeaderClick) header.onclick=onHeaderClick;

  header.appendChild(meta);

  if(showChevron){chevronEl=el('div',{cls:'card-chevron',html:IC.chevR});header.appendChild(chevronEl);}

}

async function makeImageGrid(imgFiles) {
  if(imgFiles.length===1) return makeCardImage(imgFiles[0], ()=>resolveFileUrl(imgFiles[0].id));

  const resolved = await Promise.all(imgFiles.map(async f=>({src:await resolveFileUrl(f.id),alt:f.name,name:f.name})));
  const cols=Math.min(imgFiles.length,2);
  const grid=el('div',{style:`display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px`});
  imgFiles.forEach((f,i)=>{
    const src=resolved[i].src;
    const cell=el('div',{style:'position:relative;border-radius:10px;overflow:hidden;line-height:0'});
    const img=el('img',{src,alt:f.name,style:'display:block;width:100%;height:180px;object-fit:cover;cursor:zoom-in'});

    bar.appendChild(makeHoverBtn(IC.dl,'Download',()=>fetch(src).then(r=>r.blob()).then(b=>downloadBlob(b,f.name))));
    bar.appendChild(makeHoverBtn(IC.open,'Slideshow',()=>lb.openImages(resolved,i)));
    cell.appendChild(img);cell.appendChild(bar);
    cell.onmouseenter=()=>{bar.style.opacity='1';bar.style.pointerEvents='auto';};
    cell.onmouseleave=()=>{bar.style.opacity='0';bar.style.pointerEvents='none';};

  return grid;
}

async function makeMessageNode(msg) {
  const {sender,text,files=[],timestamp} = msg;
  const host=document.createElement('div');
  host.dataset.ts=timestamp;
  const shadow=host.attachShadow({mode:'open'}); adoptSheet(shadow);

  const label=sender==='me'?'Me':'You';
  shadow.appendChild(el('div',{cls:'msg-header'},makeAvatar(sender),el('span',{cls:'msg-name'},label),el('span',{style:`font-size:11px;color:var(--text-muted);margin-left:8px;font-family:${FONT}`,},fmtTS(timestamp))));

  if(text){const body=el('div',{cls:'msg-body'});body.appendChild(el('div',{cls:'md',html:renderMd(text)}));shadow.appendChild(body);}

  if(files.length){
    const fw=el('div',{style:'padding-left:44px;margin-top:10px;display:flex;flex-direction:column;gap:10px'});
    const groups=[]; let imgBuf=[];
    files.forEach(f=>{if(f.type==='image'){imgBuf.push(f);}else{if(imgBuf.length){groups.push({kind:'images',files:imgBuf});imgBuf=[];}groups.push({kind:'single',file:f});}});
    if(imgBuf.length) groups.push({kind:'images',files:imgBuf});
    for(const g of groups) {
      const node = g.kind==='images' ? await makeImageGrid(g.files) : await makeFileCard(g.file);
      fw.appendChild(node);
    }
    shadow.appendChild(fw);
  }

  const ar=el('div',{cls:'action-row'});
  if(sender==='me'){
    ar.appendChild(makeIconBtn(IC.edit,'Edit',()=>host.dispatchEvent(new CustomEvent('chat:edit',{bubbles:true,composed:true,detail:{el:host,text,files}}))));
  } else {
    const txt=()=>_text;
    let _text=text||'';
    host.setText=v=>{_text=v;const c=shadow.querySelector('.md');if(c)c.innerHTML=sanitize(marked.parse(v||''));};
    host.getText=()=>_text;
    host.finalize=()=>{
      ar.style.display='flex';
      const cpBtn=makeIconBtn(IC.copy,'Copy',()=>{navigator.clipboard.writeText(_text||'');showToast('✓ Copied');});
      const rgBtn=makeIconBtn(IC.regen,'Regenerate',()=>{
        chatView.regenerateLast();
      });
      const upBtn=makeIconBtn(IC.up,'Good',()=>{const w=upBtn.classList.contains('active-up');upBtn.classList.toggle('active-up',!w);dnBtn.classList.remove('active-dn');showToast(w?'Rating removed':'👍 Thanks!');});
      const dnBtn=makeIconBtn(IC.down,'Bad',()=>{const w=dnBtn.classList.contains('active-dn');dnBtn.classList.toggle('active-dn',!w);upBtn.classList.remove('active-up');showToast(w?'Rating removed':'👎 Noted');});
      const mBtn=makeIconBtn(IC.more,'More',e=>{
        globalMenu.items=[
          {label:'Copy',icon:IC.copy,action:()=>{navigator.clipboard.writeText(_text||'');showToast('✓ Copied');}},
          {label:'Regenerate',icon:IC.regen,action:()=>rgBtn.onclick()},
          {divider:true},
          {label:'Good response',icon:IC.up,action:()=>upBtn.onclick()},
          {label:'Bad response',icon:IC.down,action:()=>dnBtn.onclick()},
        ];
        globalMenu.open(mBtn);
      });
      [cpBtn,rgBtn,upBtn,dnBtn,mBtn].forEach(b=>ar.appendChild(b));
    };
    ar.style.display='none';
  }
  shadow.appendChild(ar);
  return host;

/* ════════════════════════════════════════════
   15. CHAT VIEW
   ════════════════════════════════════════════ */
const chatView = (() => {
  const chatEl = document.getElementById('chatEl');
  let _loadedMessages = []; // current block in memory
  let _viewMin = null, _viewMax = null; // timestamp bounds of current view
  let _allMessages = []; // full in-memory set for search
  let _generating = false, _stopRequested = false;
  let _abortCtrl = null;

  const scrollBottom = () => requestAnimationFrame(()=>chatEl.scrollTo({top:chatEl.scrollHeight,behavior:'smooth'}));

  const clear = () => { chatEl.innerHTML=''; };

  const addDivider = ts => {
    chatEl.appendChild(el('div',{cls:'day-divider'},el('span',{},fmtDay(ts))));
  };

  const addLoadEarlier = () => {
    const wrap=el('div',{cls:'load-more'});
    const btn=el('button',{},'↑ Load earlier');
    btn.onclick=async()=>{ wrap.remove(); await loadEarlier(); };
    wrap.appendChild(btn); chatEl.insertBefore(wrap,chatEl.firstChild);
  };

  const addLoadLater = () => {
    const wrap=el('div',{cls:'load-more'});
    const btn=el('button',{},'Load later ↓');
    btn.onclick=async()=>{ wrap.remove(); await loadLater(); };
    wrap.appendChild(btn); chatEl.appendChild(wrap);
  };

  const renderMessages = async (msgs, highlightTs=null) => {
    const gapMs = (settings.gap||GAP_DEFAULT)*60000;
    let lastDay = null, lastTs = null, highlightEl = null;
    for(const msg of msgs) {
      const day = new Date(msg.timestamp).toDateString();
      if(day!==lastDay){addDivider(msg.timestamp);lastDay=day;}
      else if(lastTs && msg.timestamp-lastTs > gapMs) addDivider(msg.timestamp);
      const node = await makeMessageNode(msg);
      chatEl.appendChild(node);
      if(msg.timestamp===highlightTs) highlightEl=node;
      lastTs=msg.timestamp;
    }
    return highlightEl;
  };

  const loadLive = async () => {
    revokeFileCache(); clear();
    _allMessages = await DB.getAllMessages();
    const gapMs=(settings.gap||GAP_DEFAULT)*60000;
    if(!_allMessages.length){_loadedMessages=[];_viewMin=null;_viewMax=null;return;}
    // find live block (last contiguous group)
    const groups=groupByGap(_allMessages,gapMs);
    const liveGroup=groups[groups.length-1];
    // take last BLOCK_SIZE from live group
    const slice=liveGroup.slice(-BLOCK_SIZE);
    _loadedMessages=[...slice];
    _viewMin=slice[0].timestamp; _viewMax=slice[slice.length-1].timestamp;
    await renderMessages(slice);
    if(liveGroup.length>BLOCK_SIZE||groups.length>1) addLoadEarlier();
    scrollBottom();
  };

  const loadEarlier = async () => {
    if(_viewMin==null) return;
    const earlier=_allMessages.filter(m=>m.timestamp<_viewMin);
    if(!earlier.length) return;
    const slice=earlier.slice(-BLOCK_SIZE);
    _viewMin=slice[0].timestamp;
    // prepend to DOM
    const tmp=document.createDocumentFragment();
    const placeholder=el('div');
    chatEl.insertBefore(placeholder,chatEl.firstChild);
    await renderMessages(slice);
    // move newly appended nodes before placeholder... simpler: rebuild
    const nodes=[...chatEl.children];
    const newNodes=nodes.slice(0,nodes.length-chatEl.querySelectorAll('[data-ts]').length+slice.length);
    placeholder.remove();
    if(earlier.length>BLOCK_SIZE) addLoadEarlier();
  };

  const loadLater = async () => {
    if(_viewMax==null) return;
    const later=_allMessages.filter(m=>m.timestamp>_viewMax);
    if(!later.length) return;
    const slice=later.slice(0,BLOCK_SIZE);
    _viewMax=slice[slice.length-1].timestamp;
    await renderMessages(slice);
    const remaining=_allMessages.filter(m=>m.timestamp>_viewMax);
    if(remaining.length) addLoadLater();
    scrollBottom();
  };

  const loadBlock = async (timestamp, highlightTs=null) => {
    revokeFileCache(); clear();
    const gapMs=(settings.gap||GAP_DEFAULT)*60000;
    const block=findBlockContaining(_allMessages,timestamp,gapMs)||[];
    const idx=block.findIndex(m=>m.timestamp===timestamp);
    const start=Math.max(0,idx-Math.floor(BLOCK_SIZE/2));
    const slice=block.slice(start,start+BLOCK_SIZE);
    _loadedMessages=[...slice];
    _viewMin=slice[0]?.timestamp; _viewMax=slice[slice.length-1]?.timestamp;
    const hlEl=await renderMessages(slice,highlightTs||timestamp);
    if(start>0||block[0].timestamp>(_allMessages[0]?.timestamp)) addLoadEarlier();
    const endIdx=start+BLOCK_SIZE;
    if(endIdx<block.length) addLoadLater();
    if(hlEl){ hlEl.classList.add('highlight-msg'); hlEl.scrollIntoView({behavior:'smooth',block:'center'}); }
    else scrollBottom();
  };

  const appendUserMsg = async (msg) => {
    const day=new Date(msg.timestamp).toDateString();
    const lastTs=_loadedMessages[_loadedMessages.length-1]?.timestamp;
    const lastDay=lastTs?new Date(lastTs).toDateString():null;
    if(day!==lastDay) addDivider(msg.timestamp);
    _loadedMessages.push(msg);
    _allMessages.push(msg);
    _viewMax=msg.timestamp;
    const node=await makeMessageNode(msg);
    chatEl.appendChild(node);
    scrollBottom();
    return node;
  };

  const appendDots = () => {
    const d=el('div',{cls:'typing',role:'status','aria-label':'Generating'});
    d.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chatEl.appendChild(d); scrollBottom(); return d;
  };

  const regenerateLast = async () => {
    const last=_allMessages.slice().reverse().find(m=>m.sender==='me');
    if(!last) return;
    // remove last assistant msg from DOM + DB
    const nodes=[...chatEl.querySelectorAll('[data-ts]')];
    const lastAssist=nodes.slice().reverse().find(n=>{const m=_allMessages.find(x=>x.timestamp===+n.dataset.ts);return m?.sender==='you';});
    if(lastAssist){
      const ts=+lastAssist.dataset.ts;
      lastAssist.remove();
      await DB.deleteMessage(ts);
      _allMessages=_allMessages.filter(m=>m.timestamp!==ts);
      _loadedMessages=_loadedMessages.filter(m=>m.timestamp!==ts);
    }
    await sendResponse(last.text, last.files||[]);
  };

  const STUBS=[
    "That's a great question. A few things worth considering:\n\n- **Context** always matters\n- **Trade-offs** vary significantly by scale\n- **Iteration** is almost always the safest path\n\n> *\"Perfection is the enemy of good\"* — Voltaire",
    "Sure! Here's a quick Python example:\n\n```python\ndef greet(name: str) -> str:\n    return f\"Hello, {name}!\"\n\nprint(greet(\"world\"))  # Hello, world!\n```",
    "Here's a summary:\n\n| Approach | Pros | Cons |\n|---|---|---|\n| Option A | Fast | Less flexible |\n| Option B | Scalable | More complex |\n| Option C | Best of both | Higher cost |\n\nI'd lean toward **Option B**.",
    "Interesting — a few angles:\n\n1. The **technical** perspective: largely solved\n2. The **product** angle: users care about outcomes\n3. The **long-term** view: defaults compound\n\nHappy to drill into any of these.",
  ];
  let _stubIdx=0;

  const sendResponse = async (userText, userFiles=[]) => {
    _generating=true; _stopRequested=false; _abortCtrl=new AbortController();
    const dots=appendDots();
    await new Promise(r=>setTimeout(r,600+Math.random()*400));
    dots.remove();
    if(_stopRequested){_generating=false;chatInput.setGenerating(false);showToast('Stopped');return;}

    const replyText = userFiles.length
      ? `I can see you've shared ${userFiles.length} file(s). What would you like to do with them?`
      : STUBS[_stubIdx++%STUBS.length];

    const ts=Date.now();
    const msg={timestamp:ts,sender:'you',text:replyText,files:[]};
    const host=document.createElement('div');
    host.dataset.ts=ts;
    const shadow=host.attachShadow({mode:'open'}); adoptSheet(shadow);
    shadow.appendChild(el('div',{cls:'msg-header'},makeAvatar('you'),el('span',{cls:'msg-name'},'You'),el('span',{style:`font-size:11px;color:var(--text-muted);margin-left:8px;font-family:${FONT}`},fmtTS(ts))));
    const body=el('div',{cls:'msg-body'});
    const contentEl=el('div',{cls:'md'});
    body.appendChild(contentEl); shadow.appendChild(body);
    const ar=el('div',{cls:'action-row',style:'display:none'}); shadow.appendChild(ar);
    let _text='';
    host.setText=v=>{_text=v;contentEl.innerHTML=sanitize(marked.parse(v||''));};
    host.getText=()=>_text;
    host.finalize=()=>{
      ar.style.display='flex';
      const cpBtn=makeIconBtn(IC.copy,'Copy',()=>{navigator.clipboard.writeText(_text||'');showToast('✓ Copied');});
      const rgBtn=makeIconBtn(IC.regen,'Regenerate',()=>regenerateLast());
      const upBtn=makeIconBtn(IC.up,'Good',()=>{const w=upBtn.classList.contains('active-up');upBtn.classList.toggle('active-up',!w);dnBtn.classList.remove('active-dn');showToast(w?'Rating removed':'👍 Thanks!');});
      const dnBtn=makeIconBtn(IC.down,'Bad',()=>{const w=dnBtn.classList.contains('active-dn');dnBtn.classList.toggle('active-dn',!w);upBtn.classList.remove('active-up');showToast(w?'Rating removed':'👎 Noted');});
      const mBtn=makeIconBtn(IC.more,'More',e=>{
        globalMenu.items=[{label:'Copy',icon:IC.copy,action:()=>{navigator.clipboard.writeText(_text||'');showToast('✓ Copied');}},{label:'Regenerate',icon:IC.regen,action:()=>rgBtn.onclick()},{divider:true},{label:'Good response',icon:IC.up,action:()=>upBtn.onclick()},{label:'Bad response',icon:IC.down,action:()=>dnBtn.onclick()}];
        globalMenu.open(mBtn);
      });
      [cpBtn,rgBtn,upBtn,dnBtn,mBtn].forEach(b=>ar.appendChild(b));
    };
    chatEl.appendChild(host); scrollBottom();

    for(let i=0;i<replyText.length;i++){if(_stopRequested)break;host.setText(replyText.slice(0,i+1));scrollBottom();await new Promise(r=>setTimeout(r,8));}
    if(!_stopRequested){host.setText(replyText);}
    host.finalize();
    _generating=false; chatInput.setGenerating(false); scrollBottom();
    _loadedMessages.push(msg); _allMessages.push(msg); _viewMax=ts;
    await DB.addMessage(msg);
  };

  const send = async (text, pendingFiles) => {
    const ts=Date.now();
    // persist files
    const fileMetas=[];
    for(const pf of pendingFiles){
      const fid=randId();
      await DB.addFile(fid, pf.blob);
      fileCache.set(fid, pf.objectURL);
      fileMetas.push({id:fid,name:pf.name,type:pf.type,size:pf.size});
    }
    const msg={timestamp:ts,sender:'me',text:text||null,files:fileMetas};
    await DB.addMessage(msg);
    _allMessages.push(msg);
    await appendUserMsg(msg);
    await sendResponse(text, fileMetas);
  };

  const stop = () => { if(_generating){_stopRequested=true;_abortCtrl?.abort();showToast('⏹ Stopping…');} };

  document.getElementById('chatEl').addEventListener('chat:edit', async e => {
    const {el:msgEl,text,files}=e.detail;
    const ts=+msgEl.dataset.ts;
    // remove this and all subsequent messages from DOM and DB
    const nodes=[...chatEl.querySelectorAll('[data-ts]')];
    const idx=nodes.indexOf(msgEl);
    if(idx>-1){
      const toRemove=nodes.slice(idx);
      for(const n of toRemove){
        const nts=+n.dataset.ts;
        n.remove();
        await DB.deleteMessage(nts);
        _allMessages=_allMessages.filter(m=>m.timestamp!==nts);
        _loadedMessages=_loadedMessages.filter(m=>m.timestamp!==nts);
      }
    }
    chatInput.setGenerating(false);
    chatInput.setValue(text||'');
    // restore pending files
    if(files?.length){
      const restored=[];
      for(const f of files){
        const url=await resolveFileUrl(f.id);
        if(url) restored.push({blob:await DB.getFile(f.id),objectURL:url,name:f.name,type:f.type,size:f.size});
      }
      restoreFiles(restored);
    }
  });

  return {loadLive, loadBlock, loadEarlier, loadLater, send, stop, regenerateLast, get generating(){return _generating;}, get allMessages(){return _allMessages;}};
})();

class FloatingMenu extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._items=[];this._anchor=null;this._focused=-1;}
  set items(v){this._items=v;this._focused=-1;this._render();}
  connectedCallback(){
    this._onDocClick=e=>{if(this.hasAttribute('open')&&!e.composedPath().includes(this)&&!e.composedPath().includes(this._anchor))this.close();};
    this._onDocKey=e=>this._onKey(e);
    document.addEventListener('click',this._onDocClick);document.addEventListener('keydown',this._onDocKey);
  }
  disconnectedCallback(){document.removeEventListener('click',this._onDocClick);document.removeEventListener('keydown',this._onDocKey);}
  open(anchor){this._anchor=anchor;this.setAttribute('open','');requestAnimationFrame(()=>{this._pos();this._focusItem(0);});}
  close(){this.removeAttribute('open');if(this._anchor)this._anchor.focus();}
  _pos(){if(!this._anchor)return;const r=this._anchor.getBoundingClientRect(),flip=window.innerHeight-r.bottom<200;this.style.left=`${Math.min(r.left,window.innerWidth-240)}px`;if(flip){this.style.top='auto';this.style.bottom=`${window.innerHeight-r.top+6}px`;}else{this.style.bottom='auto';this.style.top=`${r.bottom+6}px`;}}
  _onKey(e){if(!this.hasAttribute('open'))return;if(e.key==='Escape'){e.preventDefault();this.close();return;}if(e.key==='ArrowDown'){e.preventDefault();this._moveFocus(1);}if(e.key==='ArrowUp'){e.preventDefault();this._moveFocus(-1);}if(e.key==='Enter'||e.key===' '){e.preventDefault();const f=this.shadowRoot.querySelector('.item:focus');if(f){this._items[+f.dataset.i]?.action?.();this.close();}}if(e.key==='Tab'){e.preventDefault();this._moveFocus(e.shiftKey?-1:1);}}
  _moveFocus(d){const els=[...this.shadowRoot.querySelectorAll('.item')];if(!els.length)return;this._focused=(this._focused+d+els.length)%els.length;els[this._focused].focus();}
  _focusItem(i){const els=[...this.shadowRoot.querySelectorAll('.item')];if(els[i])els[i].focus();this._focused=i;}
  _select(i){this._items[i]?.action?.();this.close();}
  _render(){
    this.shadowRoot.innerHTML=`<style>
      :host{position:fixed;z-index:10000;visibility:hidden;opacity:0;transform:translateY(6px);transition:opacity .12s,transform .12s,visibility .12s;background:var(--menu-bg);border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.2),0 0 0 1px rgba(0,0,0,.07);min-width:220px;padding:5px 0;pointer-events:none;font-family:${FONT}}
      :host([open]){visibility:visible;opacity:1;transform:translateY(0);pointer-events:auto}
      .item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);fill:var(--text-secondary);outline:none;border:none;background:none;width:100%;text-align:left}
      .item:hover,.item:focus{background:var(--menu-hover)}.divider{height:1px;background:var(--border);margin:4px 0}svg{width:16px;height:16px;flex-shrink:0}
    </style>
    ${this._items.map((it,i)=>it.divider?'<div class="divider" role="separator"></div>':`<button class="item" role="menuitem" tabindex="-1" data-i="${i}">${it.icon||''}<span>${it.label}</span></button>`).join('')}`;
    this.shadowRoot.querySelectorAll('.item').forEach(e=>{e.onclick=ev=>{ev.stopPropagation();this._select(+e.dataset.i);};});
  }
}

/* ════════════════════════════════════════════
   17. COMMAND PALETTE  (unified dispatch)
   ════════════════════════════════════════════ */
class CommandPalette extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});this._mode='home';this._results=[];this._focused=0;this._importPending=null;}
  connectedCallback(){this._render();}
  open(){this.setAttribute('open','');this._setMode('home');requestAnimationFrame(()=>this.shadowRoot.getElementById('q').focus());}
  close(){this.removeAttribute('open');}

  _q(){return this.shadowRoot.getElementById('q');}
  _list(){return this.shadowRoot.getElementById('list');}

  _setMode(mode,extra={}){
    this._mode=mode; this._focused=0;
    const q=this._q(); if(!q) return;
    if(mode==='home'){q.value='';q.placeholder='Search messages or type /set /export /import…';}
    if(mode==='confirm-import'){q.value='';q.placeholder='Replace or Append existing data?';}
    this._dispatch(q.value, extra);
  }

  _dispatch(val, extra={}) {
    const v=val.trim();
    // /set
    if(v.startsWith('/set')){const rest=v.slice(4).trim();this._renderSet(rest);return;}
    // /export
    if(v==='/export'){this._renderAction('Export all data as zip?',[{label:'Export',icon:IC.export,action:async()=>{await doExport();this.close();}}]);return;}
    // /import
    if(v==='/import'){this._renderAction('Import from zip file',[{label:'Choose file…',icon:IC.import,action:()=>{document.getElementById('importInput').click();}}]);return;}
    // confirm import
    if(this._mode==='confirm-import'){this._renderImportConfirm(extra.filename);return;}
    // from:/to:
    if(v.includes('from:')||v.includes('to:')){this._renderRange(v);return;}
    // empty → conversations
    if(!v){this._renderConversations();return;}
    // search
    this._renderSearch(v);
  }

  _renderConversations() {
    const msgs=chatView.allMessages;
    const gapMs=(settings.gap||GAP_DEFAULT)*60000;
    const groups=groupByGap(msgs,gapMs);
    const now=Date.now();
    const age=ts=>{const d=now-ts;if(d<86400000)return'Today';if(d<172800000)return'Yesterday';if(d<604800000)return'This week';return'Earlier';};
    // group by age label
    const byAge={};
    groups.slice().reverse().forEach(g=>{const label=age(g[0].timestamp);if(!byAge[label])byAge[label]=[];byAge[label].push(g);});
    const items=[];
    ['Today','Yesterday','This week','Earlier'].forEach(label=>{
      if(!byAge[label]) return;
      items.push({type:'header',label});
      byAge[label].forEach(g=>{
        const first=g[0],last=g[g.length-1];
        const preview=(first.text||first.files?.[0]?.name||'').slice(0,60);
        items.push({type:'conv',label:`${fmtTS(first.timestamp)} · ${g.length} msg${g.length>1?'s':''}`,sub:preview,ts:first.timestamp,action:async()=>{await chatView.loadBlock(first.timestamp);this.close();}});
      });
    });
    this._renderItems(items.length?items:[{type:'empty',label:'No conversations yet'}]);
  }

  _renderSearch(query) {
    const msgs=chatView.allMessages;
    const results=searchMessages(msgs,query).slice(0,40);
    const items=results.map(m=>({
      type:'result',
      label:`${m.sender==='me'?'Me':'You'} · ${fmtTS(m.timestamp)}`,
      sub:excerpt(m.text||m.files?.[0]?.name||'',query),
      action:async()=>{await chatView.loadBlock(m.timestamp,m.timestamp);this.close();}
    }));
    this._renderItems(items.length?items:[{type:'empty',label:`No results for "${query}"`}]);
  }

  _renderRange(v) {
    let fromTs=null,toTs=null;
    const fm=v.match(/from:([^\s]+)/); const tm=v.match(/to:([^\s]+)/);
    if(fm) fromTs=parseDateExpr(fm[1]);
    if(tm) toTs=parseDateExpr(tm[1]);
    if(!toTs) toTs=Date.now();
    if(!fromTs) fromTs=toTs-86400000;
    const items=[{type:'result',label:`Jump to ${fmtTS(fromTs)} → ${fmtTS(toTs)}`,sub:'',action:async()=>{await chatView.loadBlock(fromTs);this.close();}}];
    this._renderItems(items);
  }

  _renderSet(rest) {
    if(!rest){
      const allSettings=Object.entries(settings).map(([k,v])=>({type:'setting',label:`${k}: ${v}`,sub:''}));
      this._renderItems(allSettings.length?allSettings:[{type:'empty',label:'No settings'}]); return;
    }
    const parts=rest.split(/\s+/);
    if(parts.length>=2){
      const [key,...vals]=parts; const value=isNaN(vals[0])?vals.join(' '):+vals[0];
      const items=[{type:'result',label:`Set ${key} = ${value}`,sub:'Press Enter to confirm',action:async()=>{await setSetting(key,value);showToast(`✓ ${key} set to ${value}`);this.close();}}];
      this._renderItems(items);
    } else {
      this._renderItems([{type:'empty',label:'Usage: /set <key> <value>'}]);
    }
  }

  _renderAction(label,actions){
    this._renderItems([{type:'header',label},...actions.map(a=>({type:'result',label:a.label,sub:'',action:a.action,icon:a.icon}))]);
  }

  _renderImportConfirm(filename){
    this._renderItems([
      {type:'header',label:`Import: ${filename}`},
      {type:'result',label:'Append (keep existing data)',sub:'Duplicate timestamps are skipped',icon:IC.import,action:async()=>{await doImport(this._importPending,'merge');this.close();}},
      {type:'result',label:'Replace (delete everything first)',sub:'This cannot be undone',icon:IC.trash,action:async()=>{await doImport(this._importPending,'replace');this.close();}},
    ]);
  }

  _renderItems(items){
    const list=this._list(); if(!list) return;
    this._results=items.filter(i=>i.action);
    list.innerHTML=items.map((it,i)=>{
      if(it.type==='header') return `<div class="grp-header">${it.label}</div>`;
      if(it.type==='empty')  return `<div class="empty">${it.label}</div>`;
      const ri=this._results.indexOf(it);
      return `<button class="item${ri===this._focused?' active':''}" data-i="${ri}">${it.icon?it.icon:''}<span class="lbl"><span class="lbl-main">${it.label}</span>${it.sub?`<span class="lbl-sub">${it.sub}</span>`:''}</span></button>`;
    }).join('');
    list.querySelectorAll('.item').forEach(e=>{
      e.onmouseenter=()=>{this._focused=+e.dataset.i;this._highlight();};
      e.onclick=()=>this._exec(+e.dataset.i);
    });
  }

  _highlight(){const its=this._list()?.querySelectorAll('.item');if(!its)return;its.forEach((e,i)=>e.classList.toggle('active',i===this._focused));its[this._focused]?.scrollIntoView({block:'nearest'});}
  _exec(i){this._results[i]?.action?.();}
  _onKey(e){
    const q=this._q();
    if(e.key==='Escape'){e.preventDefault();this.close();focusInput();return;}
    if(e.key==='ArrowDown'){e.preventDefault();this._focused=Math.min(this._focused+1,this._results.length-1);this._highlight();return;}
    if(e.key==='ArrowUp'){e.preventDefault();this._focused=Math.max(0,this._focused-1);this._highlight();return;}
    if(e.key==='Enter'){e.preventDefault();this._exec(this._focused);return;}
  }

  _render(){
    this.shadowRoot.innerHTML=`<style>
      :host{display:none;position:fixed;inset:0;z-index:9000;align-items:flex-start;justify-content:center;padding-top:max(80px,calc(env(safe-area-inset-top)+24px))}
      :host([open]){display:flex;animation:fi .1s ease}@keyframes fi{from{opacity:0}to{opacity:1}}
      .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4)}
      .modal{position:relative;background:var(--surface);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.3);width:min(600px,92vw);overflow:hidden;max-height:70vh;display:flex;flex-direction:column}
      .search{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);fill:var(--text-muted)}
      .search svg{width:20px;height:20px;flex-shrink:0}
      #q{flex:1;border:none;outline:none;font-size:15px;font-family:${FONT};color:var(--text);background:transparent}
      #q::placeholder{color:var(--text-muted)}
      #list{overflow-y:auto;padding:6px 0;background:var(--surface)}
      .item{display:flex;align-items:flex-start;gap:10px;width:100%;padding:9px 18px;border:none;background:none;cursor:pointer;text-align:left;font-family:${FONT};color:var(--text);fill:var(--text-secondary)}
      .item.active,.item:hover{background:var(--menu-hover)}
      .lbl{display:flex;flex-direction:column;flex:1;min-width:0}
      .lbl-main{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .lbl-sub{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
      .grp-header{font-size:11px;font-weight:600;color:var(--text-muted);padding:8px 18px 4px;text-transform:uppercase;letter-spacing:.05em}
      .empty{padding:20px 18px;font-size:13px;color:var(--text-muted)}
      svg{width:16px;height:16px;flex-shrink:0;margin-top:2px}
      .ftr{padding:8px 18px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);display:flex;gap:16px}
      .ftr kbd{background:var(--kbd-bg);border-radius:3px;padding:1px 5px;font-family:monospace;color:var(--text)}
    </style>
    <div class="backdrop"></div>
    <div class="modal" role="dialog" aria-label="Search and commands">
      <div class="search">${IC.search}<input id="q" placeholder="Search messages or type /set /export /import…" autocomplete="off" spellcheck="false"></div>
      <div id="list" role="listbox"></div>
      <div class="ftr"><span><kbd>↑↓</kbd> navigate</span><span><kbd>Enter</kbd> select</span><span><kbd>Esc</kbd> close</span><span><kbd>from:</kbd><kbd>to:</kbd> range</span></div>
    </div>`;
    const q=this.shadowRoot.getElementById('q');
    q.oninput=e=>this._dispatch(e.target.value);
    q.onkeydown=e=>this._onKey(e);
    this.shadowRoot.querySelector('.backdrop').onclick=()=>{this.close();focusInput();};
    this._dispatch('');
  }

  // called from import file input
  receiveImportFile(file){
    this._importPending=file;
    this.open();
    this._setMode('confirm-import',{filename:file.name});
  }
}

/* ════════════════════════════════════════════
   18. PENDING FILES STATE
   ════════════════════════════════════════════ */
let pendingFiles=[], chipListeners=[];
const onChipsChange=fn=>{chipListeners.push(fn);return()=>{chipListeners=chipListeners.filter(f=>f!==fn);};};
const notifyChips=()=>chipListeners.forEach(fn=>fn([...pendingFiles]));
const addFiles=async files=>{
  for(const f of files){
    const type=fileTypeOf(f);
    const blob=f; // keep as blob
    const objectURL=URL.createObjectURL(blob);
    pendingFiles.push({blob,objectURL,name:f.name,type,size:f.size,id:randId()});
  }
  notifyChips();
};
const restoreFiles=snaps=>{pendingFiles=snaps.map(s=>({...s,id:randId()}));notifyChips();};
const removeFile=id=>{const pf=pendingFiles.find(f=>f.id===id);if(pf)URL.revokeObjectURL(pf.objectURL);pendingFiles=pendingFiles.filter(f=>f.id!==id);notifyChips();};
const clearFiles=()=>{pendingFiles.forEach(f=>URL.revokeObjectURL(f.objectURL));pendingFiles=[];notifyChips();};

/* ════════════════════════════════════════════
   19. CHAT INPUT
   ════════════════════════════════════════════ */
class ChatInput extends HTMLElement {
  constructor(){super();this.attachShadow({mode:'open'});adoptSheet(this.shadowRoot);}
  connectedCallback(){this._render();this._setup();this._unsub=onChipsChange(f=>this._renderChips(f));requestAnimationFrame(()=>this._box()?.focus());}
  disconnectedCallback(){this._unsub?.();}
  _box(){return this.shadowRoot.getElementById('box');}
  _sendBtn(){return this.shadowRoot.getElementById('send');}
  _render(){
    const s=document.createElement('style');
    s.textContent=`.plate{background:var(--bg-input);border-radius:28px;padding:4px 8px 6px;border:1px solid transparent;transition:background .2s,box-shadow .2s}.plate:focus-within{background:var(--input-focus-bg);box-shadow:var(--input-focus-shadow)}#chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 8px 0}#chips:empty{display:none}textarea{width:100%;border:none;background:none;outline:none;padding:12px 4px 6px 12px;font-size:16px;font-family:${FONT};line-height:24px;resize:none;field-sizing:content;min-height:44px;max-height:200px;overflow-y:auto;color:var(--text)}textarea::placeholder{color:var(--text-muted)}textarea:disabled{opacity:.5;cursor:not-allowed}.bar{display:flex;justify-content:space-between;align-items:center}.ibtn{background:none;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;fill:var(--text-secondary);transition:background .15s}.ibtn:hover{background:var(--btn-hover)}#send{background:var(--send-bg);fill:white;display:none;width:36px;height:36px;border-radius:50%}#send.visible{display:flex}#send:active{transform:scale(.92)}#stop{background:var(--stop-bg);fill:var(--stop-icon);display:none;width:36px;height:36px;border-radius:50%}#stop.visible{display:flex}svg{width:22px;height:22px}`;
    this.shadowRoot.appendChild(s);
    const plate=el('div',{cls:'plate'});
    plate.appendChild(el('div',{id:'chips'}));
    plate.appendChild(el('textarea',{id:'box',placeholder:'Message…',rows:'1','aria-label':'Message input'}));
    const send=el('button',{cls:'ibtn',id:'send','aria-label':'Send',html:IC.send});
    const stop=el('button',{cls:'ibtn',id:'stop','aria-label':'Stop',html:IC.stop});
    const plus=el('button',{cls:'ibtn',id:'plus','aria-label':'Attach',html:IC.plus});
    plate.appendChild(el('div',{cls:'bar'},plus,el('div',{style:'display:flex;gap:2px;align-items:center'},send,stop)));
    this.shadowRoot.appendChild(plate);
  }
  _renderChips(files){
    const chips=this.shadowRoot.getElementById('chips');chips.innerHTML='';
    files.forEach(f=>chips.appendChild(makeFileChip(f,id=>removeFile(id))));
    this._updateSend();
  }
  _updateSend(){const s=this._sendBtn();if(s)s.classList.toggle('visible',(this._box()?.value.trim().length>0||pendingFiles.length>0)&&!this._generating);}
  setGenerating(v){this._generating=v;const box=this._box(),send=this._sendBtn(),stop=this.shadowRoot.getElementById('stop');if(box)box.disabled=v;if(send)send.classList.toggle('visible',!v);if(stop)stop.classList.toggle('visible',v);if(!v)this._updateSend();}
  setValue(text){const box=this._box();if(!box)return;box.value=text;box.disabled=false;this._autoResize();this._updateSend();box.focus();box.setSelectionRange(text.length,text.length);}
  _autoResize(){const box=this._box();if(!box)return;if(!CSS.supports('field-sizing','content')){box.style.height='auto';box.style.height=Math.min(box.scrollHeight,200)+'px';}}
  _dispatch(){
    const box=this._box(),text=box?.value.trim();
    if(!text&&pendingFiles.length===0)return;
    const snap=[...pendingFiles];
    if(text)inputHistory.push(text);inputRecall.idx=-1;
    box.value='';if(!CSS.supports('field-sizing','content'))box.style.height='';
    clearFiles();this._updateSend();this.setGenerating(true);
    chatView.send(text||null,snap);
  }
  _setup(){
    const box=this._box();
    box.addEventListener('input',()=>{this._autoResize();this._updateSend();});
    box.addEventListener('paste',async e=>{const imgs=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith('image/'));if(imgs.length){e.preventDefault();await addFiles(imgs.map(i=>i.getAsFile()).filter(Boolean));this._updateSend();}});
    const plate=this.shadowRoot.querySelector('.plate');
    plate.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
    plate.addEventListener('drop',async e=>{e.preventDefault();await addFiles([...e.dataTransfer.files]);this._updateSend();});
    this._sendBtn().onclick=()=>this._dispatch();
    this.shadowRoot.getElementById('stop').onclick=()=>chatView.stop();
    this.shadowRoot.getElementById('plus').onclick=e=>{
      e.stopPropagation();
      globalMenu.items=[
        {label:'Upload file',icon:IC.plus,action:()=>document.getElementById('fileInput').click()},
        {divider:true},
        {label:'Search & commands',icon:IC.search,action:()=>palette.open()},
        {label:'Export data',icon:IC.export,action:doExport},
        {label:'Toggle dark mode',icon:IC.moon,action:toggleDarkMode},
      ];
      globalMenu.open(this.shadowRoot.getElementById('plus'));
    };
    box.onkeydown=e=>{
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this._dispatch();return;}
      if(e.key==='Escape'){if(box.value){box.value='';this._autoResize();this._updateSend();showToast('Input cleared');}return;}
      if(e.key==='ArrowUp'&&box.value===''&&inputHistory.length){e.preventDefault();if(inputRecall.idx===-1){inputRecall.draft=box.value;inputRecall.idx=inputHistory.length-1;}else if(inputRecall.idx>0)inputRecall.idx--;box.value=inputHistory[inputRecall.idx];this._autoResize();this._updateSend();box.setSelectionRange(box.value.length,box.value.length);return;}
      if(e.key==='ArrowDown'&&inputRecall.idx!==-1){e.preventDefault();if(inputRecall.idx<inputHistory.length-1){inputRecall.idx++;box.value=inputHistory[inputRecall.idx];}else{inputRecall.idx=-1;box.value=inputRecall.draft;}this._autoResize();this._updateSend();box.setSelectionRange(box.value.length,box.value.length);return;}
    };
  }
}
customElements.define('chat-input',ChatInput);

/* file inputs */
const fileInput=el('input',{id:'fileInput',type:'file',style:'display:none',multiple:'',accept:'image/*,video/*,audio/*,.pdf,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css'});
document.body.appendChild(fileInput);
fileInput.onchange=async e=>{await addFiles([...e.target.files]);e.target.value='';};

/* ════════════════════════════════════════════
   20. GLOBAL STATE & SHORTCUTS
   ════════════════════════════════════════════ */
const inputHistory=[], inputRecall={idx:-1,draft:''};
const chatInput=document.getElementById('chatInput');

function focusInput(){document.querySelector('chat-input')?.shadowRoot?.getElementById('box')?.focus();}

document.addEventListener('keydown',e=>{
  const box=document.querySelector('chat-input')?.shadowRoot?.getElementById('box');
  const inInput=box&&(document.activeElement===box||document.activeElement?.shadowRoot?.contains(box));
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='/')){e.preventDefault();palette.open();return;}
  if(e.key==='Escape'&&palette.hasAttribute('open')){palette.close();focusInput();return;}
  if(!inInput&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1&&!palette.hasAttribute('open'))box?.focus();
});

new ResizeObserver(([entry])=>{document.getElementById('chatEl').style.paddingBottom=`${entry.contentRect.height+16}px`;}).observe(document.querySelector('.footer'));

(async()=>{
  await openDB();
  await loadSettings();
  await chatView.loadLive();
  // first run greeting
  const msgs=chatView.allMessages;
  if(!msgs.length){
    const ts=Date.now();
    const greeting={timestamp:ts,sender:'you',text:`Welcome! This chat persists in your browser's IndexedDB.\n\n**What's new:**\n- 💾 Full persistence — messages and files survive page reloads\n- 🔍 **Ctrl+K** to search, list conversations, jump by time range\n- 📦 \`/export\` and \`/import\` for zip backup/restore\n- ⚙️ \`/set gap 120\` to configure conversation gap (minutes)\n- 🖼 Images open in a slideshow lightbox with ← → navigation\n- 📄 Text/MD cards toggle inline on header click\n- 🗂 All cards: consistent \`[icon][name·type·size][⬇][⋯]\` header\n\nTry sending a message or attaching a file.`,files:[]};
    await DB.addMessage(greeting);
    await chatView.loadLive();
  }
})();
